<!doctype html>
<html lang="en" class="ds-initial-render">
  <head>
    <meta charset="utf-8" />
    <title>FlagFit Pro</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Professional flag football training and performance tracking platform"
    />

    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="#08090B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FlagFit Pro" />

    <!-- Design-system fonts are SELF-HOSTED (bundled via @fontsource in
         angular.json): Space Grotesk + Plus Jakarta Sans, and the monitoring
         report's Archivo / Archivo Narrow / JetBrains Mono. No runtime CDN font
         fetch — removes the Google Fonts 504 dependency. -->

    <!-- Preconnect to critical origins for faster loading -->
    <link
      rel="preconnect"
      href="https://grfjmnjpzvknmsxrwesx.supabase.co"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://grfjmnjpzvknmsxrwesx.supabase.co" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/icons/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/icons/apple-touch-icon-180x180.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />
    <script src="/assets/runtime-env.js"></script>

    <!-- ============================================
         CRITICAL CSS: Inline above-the-fold styles
         Reduces FCP by eliminating render-blocking CSS
         ============================================ -->
    <style>
      /* Critical CSS — inline for fastest render. Phase E: dark-default, mint
         accent, Space Grotesk + Plus Jakarta Sans. Mirrors scss/tokens/_tokens.scss
         so the pre-bootstrap paint matches the booted app (no light flash). */
      :root {
        --boot-bg: #08090b;
        --boot-text: #e6e9ef;
        --boot-accent: #00e07a;
        --boot-surface: #111317;
        --boot-border: #262a33;
        --font-family-sans:
          "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
        --font-family-display: "Space Grotesk", system-ui, sans-serif;
      }

      .route-landing {
        --font-family-sans:
          "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI",
          system-ui, sans-serif;
      }

      /* Prevent FOUC (Flash of Unstyled Content) — dark by default */
      html {
        font-family: var(--font-family-sans);
        background-color: var(--boot-bg);
        color: var(--boot-text);
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      /* Initial loading state - prevents layout shift */
      app-root:empty::before {
        content: "";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        background: linear-gradient(
          135deg,
          var(--boot-surface) 0%,
          var(--boot-bg) 100%
        );
      }

      /* Loading spinner for app-root */
      app-root:empty::after {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border: 3px solid var(--boot-border);
        border-top-color: var(--boot-accent);
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Optional light theme — only when explicitly opted in (dark is default) */
      :root[data-theme="light"] {
        --boot-bg: #f7f8fa;
        --boot-text: #16181d;
        --boot-surface: #ffffff;
        --boot-border: #e2e5ea;
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
    <noscript>
      <div
        style="
          text-align: center;
          padding: 40px;
          font-family: var(--font-family-sans);
        "
      >
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use FlagFit Pro.</p>
      </div>
    </noscript>
  </body>
</html>
