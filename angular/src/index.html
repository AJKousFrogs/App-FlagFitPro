<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FlagFit Pro</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Professional flag football training and performance tracking platform"
    />

    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="var(--p-highlight-text-color)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FlagFit Pro" />

    <!-- Preconnect to critical origins for faster loading -->
    <link
      rel="preconnect"
      href="https://grfjmnjpzvknmsxrwesx.supabase.co"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://grfjmnjpzvknmsxrwesx.supabase.co" />
    <!-- Local font assets: Preload only the critical Regular weight font -->
    <!-- Other weights will load on-demand via CSS @font-face -->
    <link
      rel="preload"
      href="/assets/fonts/Poppins-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/assets/icons/icon-192x192.svg"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/assets/icons/icon-192x192.svg"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- ============================================
         CRITICAL CSS: Inline above-the-fold styles
         Reduces FCP by eliminating render-blocking CSS
         ============================================ -->
    <style>
      /* Critical CSS - Inline for fastest render */
      :root {
        --ds-primary-green: var(--p-highlight-text-color);
        --surface-primary: #ffffff;
        --color-text-primary: var(--color-text-primary);
        --font-family-sans: "Poppins", system-ui, sans-serif;
      }

      /* Prevent FOUC (Flash of Unstyled Content) */
      html {
        font-family: var(--font-family-sans);
        background-color: var(--surface-primary);
        color: var(--color-text-primary);
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        opacity: 0;
      }

      html.fonts-ready body {
        animation: fadeIn 0.3s ease-out 0.1s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* Initial loading state - prevents layout shift */
      app-root:empty::before {
        content: "";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, var(--p-surface-50) 0%, #ffffff 100%);
      }

      /* Loading spinner for app-root */
      app-root:empty::after {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border: 3px solid var(--color-border-secondary);
        border-top-color: var(--ds-primary-green);
        border-radius: var(--radius-circle);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Dark mode critical styles */
      @media (prefers-color-scheme: dark) {
        :root {
          --surface-primary: var(--primitive-neutral-950);
          --color-text-primary: var(--neutral-50);
        }
        app-root:empty::before {
          background: linear-gradient(135deg, var(--primitive-neutral-950) 0%, var(--p-surface-0) 100%);
        }
        app-root:empty::after {
          border-color: var(--p-surface-300);
          border-top-color: var(--ds-primary-green);
        }
      }
    </style>
    <script>
      (function () {
        var root = document.documentElement;

        // Prevent transition blur on initial render
        root.classList.add("ds-initial-render");

        var markReady = function () {
          root.classList.add("fonts-ready");
          // Remove initial render class after first paint to enable transitions
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              root.classList.remove("ds-initial-render");
            });
          });
        };

        if (document.fonts && document.fonts.load) {
          // Load the Regular weight font (400) which is preloaded and most commonly used
          document.fonts
            .load("400 1em Poppins")
            .then(markReady)
            .catch(markReady);
          setTimeout(markReady, 3000);
        } else {
          markReady();
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
    <noscript>
      <div
        style="
          text-align: center;
          padding: var(--space-10);
          font-family: var(--font-family-sans);
        "
      >
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use FlagFit Pro.</p>
      </div>
    </noscript>
  </body>
</html>
