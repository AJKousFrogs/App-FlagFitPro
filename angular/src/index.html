<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FlagFit Pro</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Professional flag football training and performance tracking platform"
    />
    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FlagFit Pro" />
    
    <!-- Prevent zoom on iOS Safari (already handled in CSS, but belt-and-suspenders) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://*.supabase.co" />
    <link rel="dns-prefetch" href="https://*.supabase.co" />

    <!-- Fonts are now hosted locally in assets/fonts/poppins.css -->
    <!-- CRITICAL FIX: Using local Poppins font to fix missing 's' characters issue -->
    <!-- The font is imported in styles.scss and will work on both local dev and production (Netlify) -->
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to use FlagFit Pro.</noscript>
  </body>
</html>
