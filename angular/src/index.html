<!doctype html>
<html lang="en" class="ds-initial-render">
  <head>
    <meta charset="utf-8" />
    <title>FlagFit Pro</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Professional flag football training and performance tracking platform"
    />

    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="var(--p-highlight-text-color)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FlagFit Pro" />

    <!-- Preconnect to critical origins for faster loading -->
    <link
      rel="preconnect"
      href="https://grfjmnjpzvknmsxrwesx.supabase.co"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://grfjmnjpzvknmsxrwesx.supabase.co" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/icons/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/icons/apple-touch-icon-180x180.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />
    <script src="/assets/runtime-env.js"></script>

    <!-- ============================================
         CRITICAL CSS: Inline above-the-fold styles
         Reduces FCP by eliminating render-blocking CSS
         ============================================ -->
    <style>
      /* Critical CSS - Inline for fastest render */
      :root {
        --ds-primary-green: var(--p-highlight-text-color);
        --surface-primary: #ffffff;
        --color-text-primary: #0f1728;
        --font-family-sans: "Poppins", system-ui, sans-serif;
      }

      .route-landing {
        --font-family-sans:
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      /* Prevent FOUC (Flash of Unstyled Content) */
      html {
        font-family: var(--font-family-sans);
        background-color: var(--surface-primary);
        color: var(--color-text-primary);
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      /* Initial loading state - prevents layout shift */
      app-root:empty::before {
        content: "";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, var(--p-surface-50) 0%, #ffffff 100%);
      }

      /* Loading spinner for app-root */
      app-root:empty::after {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: var(--space-10);
        height: var(--space-10);
        margin: calc(-0.5 * var(--space-10)) 0 0 calc(-0.5 * var(--space-10));
        border: var(--border-3) solid var(--color-border-secondary);
        border-top-color: var(--ds-primary-green);
        border-radius: var(--radius-circle);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Dark mode critical styles */
      @media (prefers-color-scheme: dark) {
        :root {
          --surface-primary: var(--primitive-neutral-950);
          --color-text-primary: var(--neutral-50);
        }
        app-root:empty::before {
          background: linear-gradient(135deg, var(--primitive-neutral-950) 0%, var(--p-surface-0) 100%);
        }
        app-root:empty::after {
          border-color: var(--p-surface-300);
          border-top-color: var(--ds-primary-green);
        }
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
    <noscript>
      <div
        style="
          text-align: center;
          padding: var(--space-10);
          font-family: var(--font-family-sans);
        "
      >
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use FlagFit Pro.</p>
      </div>
    </noscript>
  </body>
</html>
