<header class="app-header-shell" role="banner">
  <div class="header-container">
    <!-- LEFT GROUP: Logo/Menu & Breadcrumbs -->
    <app-header-left
      class="header-left"
      [sidebarToggleIcon]="sidebarToggleIcon()"
      [sidebarToggleAriaLabel]="sidebarToggleAriaLabel()"
      [showLogo]="config().showLogo ?? false"
      [showBreadcrumbs]="config().showBreadcrumbs ?? false"
      (toggleSidebar)="onToggleSidebar()"
    />

    <!-- CENTER GROUP: Global Search (Hidden on Mobile) -->
    <div class="header-center">
      <app-header-search
        [placeholder]="searchPlaceholder()"
        [shortcutModifier]="searchShortcutModifier()"
        (search)="onSearch()"
      />
    </div>

    <!-- RIGHT GROUP: Actions & Utilities -->
    <app-header-actions
      class="header-right"
      (toggleNotifications)="toggleNotifications()"
    />
  </div>
</header>

<!-- Search Panel -->
<app-search-panel />

<!-- Notifications Panel -->
<app-notifications-panel #notificationsPanel />
