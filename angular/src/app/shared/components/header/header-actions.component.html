<ng-container>
  <!-- Notifications -->
  <button
    class="header-utility notifications-trigger"
    (click)="toggleNotifications.emit()"
    [pTooltip]="notificationCount() > 0 ? notificationCount() + ' unread' : 'Notifications'"
    aria-label="Notifications"
    type="button"
  >
    <div class="icon-badge-container">
      <i class="pi pi-bell" aria-hidden="true"></i>
      @if (notificationCount() > 0) {
        <span class="notification-badge">{{
          notificationCount() > 9 ? "9+" : notificationCount()
        }}</span>
      }
    </div>
  </button>

  <!-- User Avatar -->
  <button
    class="header-profile"
    (click)="toggleUserMenu($event)"
    [pTooltip]="'Account'"
    aria-label="User menu"
    aria-haspopup="menu"
    type="button"
  >
    <app-avatar
      [label]="userInitials()"
      shape="circle"
      class="user-avatar"
    />
  </button>

  <p-menu
    #userMenu
    [model]="userMenuItems()"
    [popup]="true"
    appendTo="body"
    class="user-menu-overlay"
  />
</ng-container>
