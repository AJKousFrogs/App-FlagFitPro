<div class="step-content">
  <form [formGroup]="sessionForm()" class="parameters-form">
    <div class="form-row">
      <div class="form-field">
        <div id="training-builder-duration-label" class="field-label">
          Session Duration (minutes)
        </div>
        <p-slider
          formControlName="duration"
          [min]="15"
          [max]="120"
          [step]="15"
          ariaLabelledBy="training-builder-duration-label"
        >
        </p-slider>
        <span class="duration-display"
          >{{ sessionForm().get("duration")?.value }} minutes</span
        >
      </div>
      <div class="form-field">
        <app-select
          label="Intensity Level"
          formControlName="intensity"
          [options]="$any(intensityLevels())"
          optionLabel="label"
          optionValue="value"
          placeholder="Select intensity"
        />
      </div>
    </div>

    <div class="form-field">
      <app-form-input
        label="Available Equipment (comma-separated)"
        formControlName="equipment"
        placeholder="e.g., cones, football, agility ladder"
      />
    </div>

    @if (weatherData()) {
      <app-alert
        icon="pi-sun"
        [variant]="weatherAlertVariant()"
        title="Outdoor conditions"
        [message]="weatherSummary()"
        density="compact"
        class="weather-notice"
      >
        <app-status-tag
          [value]="weatherData()?.recommendation ?? 'No recommendation'"
          [severity]="weatherSeverity()"
          size="sm"
        />
      </app-alert>
    }
  </form>

  <div class="step-actions">
    <app-button
      variant="outlined"
      iconLeft="pi-arrow-left"
      (clicked)="previous.emit()"
      >Previous</app-button
    >
    <app-button
      iconLeft="pi-sparkles"
      [disabled]="sessionForm().invalid"
      (clicked)="generate.emit()"
      >Generate Session</app-button
    >
  </div>
</div>
