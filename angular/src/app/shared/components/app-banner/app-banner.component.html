<div
  class="banner"
  [class.banner-info]="typeDisplay === 'info'"
  [class.banner-warning]="typeDisplay === 'warning'"
  [class.banner-alert]="typeDisplay === 'alert'"
  [class.banner-error]="typeDisplay === 'error'"
>
  <div class="banner-content">
    <i [class]="iconClass" class="banner-icon" aria-hidden="true"></i>
    <p class="banner-message">{{ messageDisplay }}</p>
  </div>

  @if (primaryCtaDisplay || secondaryCtaDisplay) {
    <div class="banner-actions">
      @if (primaryCtaDisplay) {
        <app-button
          [variant]="
            primaryCtaDisplay.variant === 'secondary' ? 'outlined' : 'primary'
          "
          size="sm"
          (clicked)="onCtaClick(primaryCtaDisplay!.action)"
        >
          {{ primaryCtaDisplay!.label }}
        </app-button>
      }
      @if (secondaryCtaDisplay) {
        <app-button
          variant="text"
          size="sm"
          (clicked)="onCtaClick(secondaryCtaDisplay!.action)"
        >
          {{ secondaryCtaDisplay!.label }}
        </app-button>
      }
    </div>
  }
</div>
