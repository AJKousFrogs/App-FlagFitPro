<div class="acwr-baseline">
  <div class="acwr-header">
    <span class="acwr-label">{{ labelDisplay }}</span>
    <span class="acwr-progress-text">
      Building baseline: {{ daysLoggedDisplay }}/{{ targetDaysDisplay }} days
    </span>
  </div>

  <app-progress-bar
    [value]="progressPercentDisplay"
    [showValue]="false"
    styleClass="acwr-progress-bar"
  />

  <p class="acwr-hint">Keep logging to unlock injury-risk insights</p>
</div>
