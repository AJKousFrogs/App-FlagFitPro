@if (hasProtocolSections()) {
  <section class="active-protocols-section">
    <h3 class="section-title">
      <i class="pi pi-calendar-clock" aria-hidden="true"></i>
      Active Protocols
    </h3>

    @for (section of protocolSections(); track section.title) {
      <app-card-shell
        class="protocol-group"
        density="compact"
        [title]="section.title"
        [subtitle]="section.subtitle"
      >
        <div class="protocol-players">
          @for (row of section.rows; track row.playerId) {
            <button
              type="button"
              class="protocol-player-item"
              (click)="viewPlayer.emit(row.playerId)"
              [attr.aria-label]="'View player ' + row.playerName"
            >
              <span class="player-name">{{ row.playerName }}</span>
              <app-status-tag
                class="protocol-tag"
                [value]="row.tagValue"
                [severity]="row.tagSeverity"
                size="sm"
              />
            </button>
          }
        </div>
      </app-card-shell>
    }
  </section>
}
