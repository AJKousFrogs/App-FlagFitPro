<!-- Segmented progress bar — rendered inside ob-topbar via content projection -->
<div class="ob-seg-track" role="progressbar"
     [attr.aria-valuenow]="completionStats().percent"
     aria-valuemin="0" aria-valuemax="100"
     [attr.aria-label]="'Step ' + (currentStep() + 1) + ' of ' + steps().length + ': ' + currentStepLabel()">
  @for (step of steps(); track $index) {
    <button
      class="ob-seg"
      type="button"
      [class.ob-seg--done]="$index < currentStep()"
      [class.ob-seg--active]="$index === currentStep()"
      [disabled]="!step.completed || $index === currentStep()"
      [attr.aria-label]="step.label + ($index < currentStep() ? ' (completed)' : $index === currentStep() ? ' (current)' : ' (upcoming)')"
      (click)="navigateToStep($index)"
    ></button>
  }
</div>
