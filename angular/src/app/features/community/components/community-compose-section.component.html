<div class="create-post-card">
  <div class="create-post-header">
    <app-avatar
      [label]="currentUserInitials()"
      shape="circle"
      class="user-avatar"
    />
    <div class="post-prompt">What's on your mind?</div>
  </div>

  <div class="create-post-body">
    <app-textarea
      [value]="newPostContent()"
      (valueChange)="onInput($event)"
      placeholder="Share your training progress, game highlights, or tips with the community..."
      [rows]="3"
      [autoResize]="true"
      class="post-textarea"
      ariaLabel="Create post content"
    ></app-textarea>
  </div>

  <div class="create-post-footer">
    <div class="media-options">
      <button
        type="button"
        class="media-btn"
        (click)="attachPhoto.emit()"
        pTooltip="Add Photo"
      >
        <i class="pi pi-image" aria-hidden="true"></i>
        <span>Photo</span>
      </button>
      <button
        type="button"
        class="media-btn"
        (click)="attachVideo.emit()"
        pTooltip="Add Video"
      >
        <i class="pi pi-video" aria-hidden="true"></i>
        <span>Video</span>
      </button>
      <button
        type="button"
        class="media-btn"
        (click)="createPoll.emit()"
        pTooltip="Create Poll"
      >
        <i class="pi pi-chart-bar" aria-hidden="true"></i>
        <span>Poll</span>
      </button>
      <button
        type="button"
        class="media-btn"
        (click)="addLocation.emit()"
        pTooltip="Add Location"
      >
        <i class="pi pi-map-marker" aria-hidden="true"></i>
        <span>Location</span>
      </button>
    </div>
    <app-button
      iconLeft="pi-send"
      [disabled]="!newPostContent().trim()"
      (clicked)="submitPost.emit()"
    >
      Post
    </app-button>
  </div>
</div>

@if (selectedTopic()) {
  <app-alert
    variant="info"
    density="compact"
    title="Topic Filter"
    [message]="'Showing posts about #' + selectedTopic()"
    class="filter-banner-alert"
  >
    <div class="filter-banner-actions">
      <app-button
        variant="text"
        size="sm"
        iconLeft="pi-times"
        (clicked)="clearTopicFilter.emit()"
      >
        Clear
      </app-button>
    </div>
  </app-alert>
}
