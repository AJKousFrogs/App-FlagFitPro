<app-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [closeOnEscape]="true"
  [focusOnShow]="true"
  [ariaLabel]="'Quick wellness check-in dialog'"
  shell="settings"
  dialogSize="sm"
  [scrollableContent]="true"
  [scrollMaxHeight]="
    'calc(80dvh - (var(--space-24) + var(--space-10) + var(--space-1)))'
  "
  [mobileStickyFooter]="true"
  [mobileMaxHeight]="'80dvh'"
>
  <app-dialog-header
    icon="heart"
    title="Quick Check-in"
    subtitle="A fast readiness check before training."
    (close)="close()"
  />
  <div class="quick-checkin-form">
    <p class="quick-intro">How are you feeling today? Tap to select.</p>

    <div class="quick-section">
      <span class="quick-label" id="mood-label">Overall Feeling</span>
      <div class="mood-selector" role="radiogroup" aria-labelledby="mood-label">
        @for (mood of quickMoods(); track mood.value) {
          <button
            type="button"
            class="mood-btn"
            [class.selected]="quickFormData().overallFeeling === mood.value"
            (click)="setOverallFeeling.emit(mood.value)"
            [attr.aria-label]="'Overall feeling: ' + mood.label"
            role="radio"
            [attr.aria-checked]="quickFormData().overallFeeling === mood.value"
          >
            <span class="mood-icon" aria-hidden="true"
              ><i [class]="'pi ' + mood.icon"></i
            ></span>
            <span class="mood-text">{{ mood.label }}</span>
          </button>
        }
      </div>
    </div>

    <div class="quick-section">
      <span class="quick-label" id="energy-level-label">Energy Level</span>
      <div
        class="energy-selector"
        role="radiogroup"
        aria-labelledby="energy-level-label"
      >
        @for (level of quickEnergyLevels(); track level.value) {
          <button
            type="button"
            class="energy-btn"
            [class.selected]="quickFormData().energyLevel === level.value"
            (click)="setEnergyLevel.emit(level.value)"
            [attr.aria-label]="'Energy level: ' + level.label"
            [attr.aria-pressed]="quickFormData().energyLevel === level.value"
            role="radio"
            [attr.aria-checked]="quickFormData().energyLevel === level.value"
          >
            <i
              [class]="'pi pi-bolt energy-icon--' + level.value"
              aria-hidden="true"
            ></i>
            <span>{{ level.label }}</span>
          </button>
        }
      </div>
    </div>

    <div class="quick-section">
      <span class="quick-label" id="soreness-label">Any Soreness?</span>
      <div class="soreness-selector" role="radiogroup" aria-labelledby="soreness-label">
        <button
          type="button"
          class="soreness-btn"
          [class.selected]="quickFormData().hasSoreness === false"
          (click)="setHasSoreness.emit(false)"
          aria-label="No soreness - Feeling Good"
          role="radio"
          [attr.aria-checked]="quickFormData().hasSoreness === false"
        >
          <i class="pi pi-check-circle" aria-hidden="true"></i>
          <span>Feeling Good</span>
        </button>
        <button
          type="button"
          class="soreness-btn soreness-yes"
          [class.selected]="quickFormData().hasSoreness === true"
          (click)="setHasSoreness.emit(true)"
          aria-label="Has soreness - Some Soreness"
          role="radio"
          [attr.aria-checked]="quickFormData().hasSoreness === true"
        >
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          <span>Some Soreness</span>
        </button>
      </div>
    </div>

    <div class="quick-preview" aria-live="polite" aria-atomic="true">
      <span class="preview-label" id="readiness-preview-label"
        >Estimated Readiness</span
      >
      <span
        class="preview-score"
        [class]="quickReadinessClass()"
        aria-labelledby="readiness-preview-label"
        role="status"
      >
        {{ quickReadinessScore() }}%
      </span>
    </div>
  </div>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Save"
    primaryIcon="check"
    [loading]="isSaving()"
    [disabled]="!isValid()"
    (cancel)="close()"
    (primary)="submit.emit()"
  />
</app-dialog>
