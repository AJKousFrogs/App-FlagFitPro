<div class="charts-grid">
  @defer (on viewport) {
    <app-card-shell title="Sleep Quality (7-day)" headerIcon="pi-moon">
      @if (sleepChartData()) {
        <app-lazy-chart
          type="line"
          [data]="sleepChartData()!"
          [options]="chartOptions()"
        ></app-lazy-chart>
      } @else {
        <app-empty-state
          [useCard]="false"
          icon="pi-moon"
          heading="Sleep trend unavailable"
          description="Start logging daily check-ins to unlock your sleep trend."
        />
      }
    </app-card-shell>
  } @placeholder {
    <app-card-shell title="Sleep Quality (7-day)" headerIcon="pi-moon">
      <app-loading
        [visible]="true"
        variant="skeleton"
        message="Loading sleep data..."
      />
    </app-card-shell>
  }

  @defer (on viewport) {
    <app-card-shell title="Recovery Score (7-day)" headerIcon="pi-heart">
      @if (recoveryChartData()) {
        <app-lazy-chart
          type="bar"
          [data]="recoveryChartData()!"
          [options]="chartOptions()"
        ></app-lazy-chart>
      } @else {
        <app-empty-state
          [useCard]="false"
          icon="pi-heart"
          heading="Recovery trend unavailable"
          description="Complete daily check-ins to unlock your recovery trend."
        />
      }
    </app-card-shell>
  } @placeholder {
    <app-card-shell title="Recovery Score (7-day)" headerIcon="pi-heart">
      <app-loading
        [visible]="true"
        variant="skeleton"
        message="Loading recovery data..."
      />
    </app-card-shell>
  }
</div>
