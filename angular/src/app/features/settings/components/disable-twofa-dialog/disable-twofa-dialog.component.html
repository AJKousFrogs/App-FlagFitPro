<app-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [blockScroll]="true"
  [draggable]="false"
  shell="settings"
  dialogSize="lg"
  ariaLabel="Disable two-factor authentication"
>
  <app-dialog-header
    icon="shield-slash"
    title="Disable 2FA"
    subtitle="Remove the extra layer of security"
    [danger]="true"
    (close)="closeDialog()"
  />

  <div class="twofa-content">
    <div class="step-section">
      <i class="pi pi-exclamation-triangle success-icon error-warning-icon" aria-hidden="true"></i>
      <p class="step-desc">
        Disabling 2FA will make your account less secure. Please confirm with your
        authenticator code.
      </p>

      <div class="code-input-wrapper">
        <p-inputOtp
          [length]="6"
          [ngModel]="disableCode()"
          (ngModelChange)="disableCodeChange.emit($event ?? '')"
          [integerOnly]="true"
        />
      </div>
    </div>
  </div>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Disable 2FA"
    primaryIcon="times"
    primaryVariant="danger"
    [loading]="loading()"
    [disabled]="disableCode().length !== 6"
    (cancel)="closeDialog()"
    (primary)="submit.emit()"
  />
</app-dialog>
