<app-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [blockScroll]="true"
  [draggable]="false"
  class="new-team-dialog"
  ariaLabel="Request new team"
>
  <app-dialog-header
    icon="users"
    title="Request New Team"
    subtitle="Submit a request to create a new team"
    (close)="closeDialog()"
  />

  <div class="new-team-content">
    <app-alert
      variant="info"
      density="compact"
      icon="pi pi-info-circle"
      message="New team requests require approval from a superadmin. You will be notified via email once your request has been reviewed."
      class="settings-dialog-alert"
    />

    <div class="form-field">
      <app-form-input
        label="Team Name *"
        [value]="teamName()"
        (valueChange)="teamNameChange.emit($event)"
        placeholder="Enter your team name"
        class="w-full"
      />
    </div>

    <div class="form-field">
      <app-textarea
        label="Additional Notes (Optional)"
        [value]="teamNotes()"
        (valueChange)="teamNotesChange.emit($event)"
        placeholder="Tell us about your team (e.g., location, league, number of members)"
        [rows]="3"
        class="w-full"
      />
    </div>
  </div>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Submit Request"
    primaryIcon="send"
    [loading]="loading()"
    [disabled]="!teamName().trim()"
    (cancel)="closeDialog()"
    (primary)="submit.emit()"
  />
</app-dialog>
