<app-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [blockScroll]="true"
  [draggable]="false"
  shell="settings"
  dialogSize="md"
  ariaLabel="Delete account"
>
  <app-dialog-header
    icon="trash"
    title="Delete Account"
    subtitle="This action is permanent and irreversible"
    [danger]="true"
    (close)="closeDialog()"
  />

  <div class="delete-content">
    <app-alert
      variant="error"
      icon="pi pi-exclamation-triangle"
      title="Are you absolutely sure?"
      message="All your data will be permanently deleted, including:"
      styleClass="settings-dialog-alert"
    >
      <ul class="delete-list">
        <li><i class="pi pi-chart-line"></i> Training history & progress</li>
        <li><i class="pi pi-chart-bar"></i> Performance metrics & analytics</li>
        <li><i class="pi pi-cog"></i> Settings & preferences</li>
        <li><i class="pi pi-user"></i> Profile information</li>
      </ul>
    </app-alert>

    <div class="confirm-field">
      <app-form-input
        label="Type DELETE to confirm"
        [value]="confirmText()"
        (valueChange)="confirmTextChange.emit($event)"
        placeholder="Type DELETE"
        styleClass="delete-input"
      />
    </div>
  </div>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Delete My Account"
    primaryIcon="trash"
    primaryVariant="danger"
    [loading]="loading()"
    [disabled]="confirmText() !== 'DELETE'"
    (cancel)="closeDialog()"
    (primary)="submit.emit()"
  />
</app-dialog>
