<app-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [blockScroll]="true"
  [draggable]="false"
  [breakpoints]="{ '960px': '92vw', '640px': '96vw' }"
  styleClass="password-dialog"
  ariaLabel="Change password"
>
  <app-dialog-header
    icon="lock"
    title="Change Password"
    subtitle="Update your account password"
    (close)="closeDialog()"
  />

  <form [formGroup]="passwordForm()" class="password-form form-controls-full">
    <div class="form-field">
      <label for="settings-currentPassword" class="form-label form-label--inline">
        <i class="pi pi-key"></i>
        Current Password
      </label>
      <div class="input-wrapper">
        <p-password
          inputId="settings-currentPassword"
          formControlName="currentPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Enter your current password"
          autocomplete="current-password"
        ></p-password>
      </div>
    </div>

    <div class="form-field">
      <label for="settings-newPassword" class="form-label form-label--inline">
        <i class="pi pi-shield"></i>
        New Password
      </label>
      <div class="input-wrapper">
        <p-password
          inputId="settings-newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          placeholder="Create a strong password"
          autocomplete="new-password"
        ></p-password>
      </div>
      <div class="password-requirements">
        <div
          class="requirement"
          [class.met]="passwordForm().get('newPassword')?.value?.length >= 8"
        >
          <i
            class="pi"
            [class.pi-check-circle]="
              passwordForm().get('newPassword')?.value?.length >= 8
            "
            [class.pi-circle]="
              !(passwordForm().get('newPassword')?.value?.length >= 8)
            "
          ></i>
          <span>At least 8 characters</span>
        </div>
        <div class="requirement" [class.met]="hasUppercase()">
          <i
            class="pi"
            [class.pi-check-circle]="hasUppercase()"
            [class.pi-circle]="!hasUppercase()"
          ></i>
          <span>One uppercase letter</span>
        </div>
        <div class="requirement" [class.met]="hasNumber()">
          <i
            class="pi"
            [class.pi-check-circle]="hasNumber()"
            [class.pi-circle]="!hasNumber()"
          ></i>
          <span>One number</span>
        </div>
        <div class="requirement" [class.met]="hasSpecialChar()">
          <i
            class="pi"
            [class.pi-check-circle]="hasSpecialChar()"
            [class.pi-circle]="!hasSpecialChar()"
          ></i>
          <span>One special character</span>
        </div>
      </div>
    </div>

    <div class="form-field">
      <label
        for="settings-confirmNewPassword"
        class="form-label form-label--inline"
      >
        <i class="pi pi-check-square"></i>
        Confirm New Password
      </label>
      <div class="input-wrapper">
        <p-password
          inputId="settings-confirmNewPassword"
          formControlName="confirmNewPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Confirm your new password"
          autocomplete="new-password"
        ></p-password>
      </div>
      @if (
        passwordForm().errors?.["passwordMismatch"] &&
        passwordForm().get("confirmNewPassword")?.touched
      ) {
        <app-alert
          variant="error"
          density="compact"
          message="Passwords do not match"
        />
      }
      @if (
        passwordsMatch() && passwordForm().get("confirmNewPassword")?.value
      ) {
        <app-alert
          variant="success"
          density="compact"
          message="Passwords match"
        />
      }
    </div>
  </form>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Update Password"
    primaryIcon="check"
    [loading]="loading()"
    [disabled]="passwordForm().invalid"
    (cancel)="closeDialog()"
    (primary)="submit.emit()"
  />
</app-dialog>
