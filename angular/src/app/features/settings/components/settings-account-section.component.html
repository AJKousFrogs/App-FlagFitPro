<div id="account-settings" class="settings-section ui-stack-md">
  <div class="ui-section-heading">
    <div class="ui-section-heading__content">
      <h2 class="ui-section-heading__title">
        <span class="ui-section-heading__icon">
          <i class="pi pi-user"></i>
        </span>
        Account Settings
      </h2>
      <p class="ui-section-heading__description">
        Manage your personal information and account details
      </p>
    </div>
  </div>

  <app-card-shell
    title="Profile Information"
    headerIcon="pi-user"
    class="settings-account-card"
  >
    <form [formGroup]="profileForm()" class="settings-profile-form ui-stack-md">
      <div class="form-field">
        <app-form-input
          label="Display Name"
          id="settings-displayName"
          formControlName="displayName"
          placeholder="Enter your display name"
          autocomplete="name"
        ></app-form-input>
      </div>
      <div class="form-field">
        <app-form-input
          label="Email"
          id="settings-email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          autocomplete="email"
        ></app-form-input>
      </div>
      <div class="form-field">
        <label for="settings-dob" class="form-label">Date of Birth</label>
        <div class="datepicker-with-suggestion">
          <input
            appBirthdayInputSuggestion
            id="settings-dob"
            name="dateOfBirth"
            type="date"
            [value]="getDateOfBirthInputValue()"
            (input)="onDateOfBirthInputEvent($event)"
            [max]="getMaxBirthDateInputValue()"
            placeholder="Select your date of birth"
            class="w-full"
            (inputTyped)="birthdayInputTyped.emit($event)"
            (inputBlurred)="birthdayInputBlurred.emit()"
          />
          @if (birthdaySuggestion(); as suggestion) {
            <div class="birthday-suggestion">
              <div class="suggestion-content">
                <i class="pi pi-lightbulb suggestion-icon"></i>
                <div class="suggestion-text">
                  <span class="suggestion-label">Suggested:</span>
                  <span class="suggestion-date">{{ suggestion.formatted }}</span>
                  @if (suggestion.age !== null) {
                    <span class="suggestion-age">(Age: {{ suggestion.age }} years)</span>
                  }
                </div>
              </div>
              <app-button
                variant="secondary"
                size="sm"
                iconLeft="check"
                ariaLabel="Apply suggested date"
                (clicked)="applyBirthdaySuggestion.emit()"
              >
                Apply
              </app-button>
            </div>
          }
        </div>
        @if (calculatedAge() !== null) {
          <small class="form-help age-display">Age: {{ calculatedAge() }} years</small>
        }
      </div>
      <div class="form-row two-columns">
        <div class="form-field">
          <app-select
            label="Position"
            inputId="settings-position"
            formControlName="position"
            [options]="positionOptions()"
            optionLabel="label"
            optionValue="value"
            placeholder="Select your position"
            appendTo="body"
            [attr.aria-label]="'Select your position'"
          ></app-select>
        </div>
        <div class="form-field">
          <app-form-input
            label="Jersey Number"
            id="settings-jerseyNumber"
            formControlName="jerseyNumber"
            placeholder="#55"
            maxlength="3"
            autocomplete="off"
          ></app-form-input>
        </div>
      </div>
      <div class="form-row two-columns">
        <div class="form-field">
          <app-form-input
            label="Height (cm)"
            id="settings-height"
            type="number"
            formControlName="heightCm"
            placeholder="175"
            min="100"
            max="250"
            autocomplete="off"
          ></app-form-input>
        </div>
        <div class="form-field">
          <app-form-input
            label="Weight (kg)"
            id="settings-weight"
            type="number"
            formControlName="weightKg"
            placeholder="70"
            min="30"
            max="200"
            autocomplete="off"
          ></app-form-input>
        </div>
      </div>
      <div class="form-field">
        <app-select
          label="Team"
          inputId="settings-team"
          formControlName="teamId"
          [options]="availableTeams()"
          optionLabel="label"
          optionValue="value"
          placeholder="Select your team"
          appendTo="body"
          (valueChange)="teamChange.emit($event)"
          [attr.aria-label]="'Select your team'"
          hint="Select your team or request to create a new one"
        ></app-select>
      </div>
      <div class="form-field">
        <app-form-input
          label="Phone Number"
          id="settings-phone"
          type="tel"
          formControlName="phone"
          placeholder="Enter your phone number"
          autocomplete="tel"
        ></app-form-input>
      </div>
      <div class="form-field">
        <app-select
          label="Country"
          inputId="settings-country"
          formControlName="country"
          [options]="countryOptions()"
          optionLabel="label"
          optionValue="value"
          placeholder="Select your country"
          [filter]="true"
          filterPlaceholder="Search countries..."
          appendTo="body"
        ></app-select>
      </div>
    </form>
  </app-card-shell>
</div>
