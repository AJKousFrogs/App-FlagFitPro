<app-card-shell
  title="Notification Preferences"
  headerIcon="pi-bell"
  tone="warning"
>
  <form [formGroup]="notificationForm()" class="notification-form card-stack">
    <app-control-row
      icon="envelope"
      title="Email Notifications"
      description="Receive updates and alerts via email"
    >
      <app-toggle-switch formControlName="emailNotifications"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="mobile"
      title="Push Notifications"
      description="Get instant alerts on your device"
    >
      <app-toggle-switch formControlName="pushNotifications"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="clock"
      title="Training Reminders"
      description="Daily reminders for scheduled workouts"
    >
      <app-toggle-switch formControlName="trainingReminders"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="heart"
      title="Wellness Reminders"
      description="Daily wellness check-in reminders"
    >
      <app-toggle-switch formControlName="wellnessReminders"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="flag"
      title="Game Alerts"
      description="Notifications about upcoming games"
    >
      <app-toggle-switch formControlName="gameAlerts"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="megaphone"
      title="Team Announcements"
      description="Important team news and updates"
    >
      <app-toggle-switch formControlName="teamAnnouncements"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="user"
      title="Coach Messages"
      description="Direct messages from your coach"
    >
      <app-toggle-switch formControlName="coachMessages"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="trophy"
      title="Achievement Alerts"
      description="Celebrate your milestones and badges"
    >
      <app-toggle-switch formControlName="achievementAlerts"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="star"
      title="Tournament Alerts"
      description="Bracket updates, schedules, and results"
    >
      <app-toggle-switch formControlName="tournamentAlerts"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="exclamation-triangle"
      title="Injury Risk Alerts"
      description="Warnings when overtraining is detected"
    >
      <app-toggle-switch formControlName="injuryRiskAlerts"></app-toggle-switch>
    </app-control-row>

    <app-control-row
      icon="inbox"
      title="In-App Notifications"
      description="Show notifications in the notification center"
    >
      <app-toggle-switch formControlName="inAppNotifications"></app-toggle-switch>
    </app-control-row>

    <div class="notification-section-header">
      <h4>Notification Frequency</h4>
      <p>Control how often you receive non-urgent notifications</p>
    </div>

    <app-control-row
      icon="clock"
      title="Digest Frequency"
      description="How often to bundle non-urgent notifications"
    >
      <app-select
        formControlName="digestFrequency"
        [options]="digestFrequencyOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select frequency"
      ></app-select>
    </app-control-row>

    <div class="notification-section-header">
      <h4>Do Not Disturb</h4>
      <p>Pause notifications during specific hours</p>
    </div>

    <app-control-row
      icon="moon"
      title="Enable Quiet Hours"
      description="Silence non-urgent notifications at night"
    >
      <app-toggle-switch formControlName="quietHoursEnabled"></app-toggle-switch>
    </app-control-row>

    @if (notificationForm().get("quietHoursEnabled")?.value) {
      <div class="quiet-hours-config">
        <div class="time-range">
          <div class="time-input form-field">
            <label class="form-label" for="settings-quiet-hours-start">
              Start Time
            </label>
            <input
              id="settings-quiet-hours-start"
              type="time"
              formControlName="quietHoursStart"
              class="time-picker"
              aria-label="Quiet hours start time"
            />
          </div>
          <span class="time-separator">to</span>
          <div class="time-input form-field">
            <label class="form-label" for="settings-quiet-hours-end">
              End Time
            </label>
            <input
              id="settings-quiet-hours-end"
              type="time"
              formControlName="quietHoursEnd"
              class="time-picker"
              aria-label="Quiet hours end time"
            />
          </div>
        </div>
        <p class="quiet-hours-note">
          <i class="pi pi-info-circle" aria-hidden="true"></i>
          High priority alerts (game reminders, injury risks) will still come through
        </p>
      </div>
    }
  </form>
</app-card-shell>
