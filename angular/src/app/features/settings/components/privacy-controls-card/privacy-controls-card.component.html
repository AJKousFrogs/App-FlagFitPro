<app-card title="Privacy Controls" headerIcon="pi-lock" headerIconColor="error">
  <form [formGroup]="privacyForm()">
    <div class="p-field mb-4">
      <label for="profileVisibility" class="p-label">Profile Visibility</label>
      <p-select
        id="profileVisibility"
        formControlName="profileVisibility"
        [options]="visibilityOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Select visibility"
        appendTo="body"
      >
        <ng-template #item let-option>
          <div class="visibility-option">
            <span class="visibility-label">{{ option.label }}</span>
            <span class="visibility-desc">{{ option.description }}</span>
          </div>
        </ng-template>
      </p-select>
    </div>
    <div class="p-field-checkbox mb-4">
      <label id="settings-showStats-label" class="p-label"
        >Show Statistics Publicly</label
      >
      <div class="toggle-wrapper">
        <p-toggleswitch
          formControlName="showStats"
          ariaLabelledBy="settings-showStats-label"
        ></p-toggleswitch>
      </div>
    </div>
  </form>
  <p-divider></p-divider>
  <div class="privacy-controls-link">
    <div class="link-info">
      <h4>Advanced Privacy Controls</h4>
      <p>
        Manage AI processing, team data sharing, research participation, and more.
      </p>
    </div>
    <app-button variant="outlined" icon="shield" routerLink="/settings/privacy"
      >Privacy Controls</app-button
    >
  </div>
  <p-divider></p-divider>
  <div class="privacy-controls-link">
    <div class="link-info">
      <h4>Export Your Data</h4>
      <p>
        Download a copy of all your data including training sessions, wellness
        logs, and achievements.
      </p>
    </div>
    <app-button variant="outlined" icon="download" (clicked)="exportData.emit()"
      >Export Data</app-button
    >
  </div>
</app-card>
