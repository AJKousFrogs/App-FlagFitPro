<app-card
  title="Experimental Features"
  headerIcon="pi-flask"
  headerIconColor="warning"
>
  <div class="settings-toggle-row">
    <label id="settings-nextgen-label" class="form-label">
      Next-Gen Metrics Preview
    </label>
    <div class="toggle-wrapper">
      <p-toggleswitch
        [ngModel]="nextGenMetricsPreview()"
        (ngModelChange)="onNextGenToggle($event)"
        ariaLabelledBy="settings-nextgen-label"
      ></p-toggleswitch>
    </div>
  </div>
  <p class="form-help experimental-features-help">
    Show preview readiness and workload scores in your dashboard.
  </p>
</app-card>
