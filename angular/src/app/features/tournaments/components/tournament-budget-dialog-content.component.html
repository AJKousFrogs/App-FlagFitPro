<form [formGroup]="budgetForm()" class="budget-dialog">
  <div class="form-grid">
    <div class="form-field">
      <app-input-number
        label="Registration Fee"
        formControlName="registrationFee"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field">
      <app-input-number
        label="Entry Fee Per Player"
        formControlName="entryFeePerPlayer"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field">
      <app-input-number
        label="Travel Cost (Estimated)"
        formControlName="travelCost"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field">
      <app-input-number
        label="Accommodation Per Night"
        formControlName="accommodationPerNight"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field">
      <app-input-number
        label="Number of Nights"
        formControlName="totalNights"
        [min]="0"
      ></app-input-number>
    </div>
    <div class="form-field">
      <app-input-number
        label="Per Diem Per Player"
        formControlName="perDiem"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field full-width">
      <app-input-number
        label="Other Costs"
        formControlName="otherCosts"
        mode="currency"
        currency="EUR"
      ></app-input-number>
    </div>
    <div class="form-field full-width">
      <app-form-input
        label="Other Costs Description"
        formControlName="otherCostsDescription"
        placeholder="Equipment, uniforms, etc."
        aria-label="Other costs description"
      ></app-form-input>
    </div>
  </div>

  <div class="budget-funding">
    <h4>Funding Sources</h4>
    <div class="form-grid">
      <div class="form-field">
        <app-input-number
          label="Team Contribution"
          formControlName="teamContribution"
          mode="currency"
          currency="EUR"
        ></app-input-number>
      </div>
      <div class="form-field">
        <app-input-number
          label="Sponsor Contribution"
          formControlName="sponsorContribution"
          mode="currency"
          currency="EUR"
        ></app-input-number>
      </div>
    </div>
  </div>

  <div class="budget-calculated">
    <div class="calc-row">
      <span>Total Estimated Cost:</span>
      <span class="calc-value">€{{ totalEstimatedCost() | number: "1.2-2" }}</span>
    </div>
    <div class="calc-row">
      <span>Total Funding:</span>
      <span class="calc-value">€{{ totalFunding() | number: "1.2-2" }}</span>
    </div>
    <div class="calc-row highlight">
      <span>Player Share ({{ confirmedPlayers() }} confirmed):</span>
      <span class="calc-value">€{{ playerShare() | number: "1.2-2" }}</span>
    </div>
  </div>
</form>
