<app-dialog
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [blockScroll]="true"
  [styleClass]="'tournament-dialog'"
  [ariaLabel]="dialogTitle"
>
  <app-dialog-header icon="trophy" [title]="dialogTitle" (close)="onClose()" />
  <form [formGroup]="form" class="tournament-form form-controls-full">
    @if (isPlayer && !editingTournament) {
      <div class="visibility-info-banner">
        <app-alert
          variant="warning"
          icon="pi pi-user"
          title="Personal Game Day"
          message="This will only be visible to you and your coaches. It won't affect other players' schedules or workload calculations."
          density="compact"
        />
      </div>
    }
    @if (isCoachOrAdmin && !editingTournament) {
      <div class="visibility-info-banner">
        <app-alert
          variant="info"
          icon="pi pi-users"
          title="Team Tournament"
          message="This will be visible to all team members and will affect everyone's training schedule and workload calculations."
          density="compact"
        />
      </div>
    }
    @if (editingTournament && isPersonalTournament) {
      <div class="visibility-info-banner">
        <app-alert
          variant="warning"
          icon="pi pi-user"
          title="Personal Game Day"
          message="Only visible to the player who created it and coaches."
          density="compact"
        />
      </div>
    }

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-trophy"></i>
        <span>Basic Information</span>
      </div>
      <div class="form-row">
        <div class="form-field full-width">
          <label for="tournament-name">
            <i class="pi pi-tag"></i>
            {{ isPlayer ? "Game Day Name" : "Tournament Name" }}
            <span class="required">*</span>
          </label>
          <input pInputText id="tournament-name" formControlName="name" placeholder="e.g., Adria Bowl 2026" class="w-full" autocomplete="off" />
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-shortName"><i class="pi pi-bookmark"></i> Short Name</label>
          <input pInputText id="tournament-shortName" formControlName="short_name" placeholder="e.g., Adria Bowl" autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="tournament-teams"><i class="pi pi-users"></i> Expected Teams</label>
          <p-inputNumber inputId="tournament-teams" formControlName="expected_teams" [min]="2" [max]="100" placeholder="Number of teams" class="w-full"></p-inputNumber>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-map-marker"></i>
        <span>Location</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-country"><i class="pi pi-globe"></i> Country</label>
          <input pInputText id="tournament-country" formControlName="country" placeholder="e.g., Croatia" autocomplete="country-name" />
        </div>
        <div class="form-field">
          <label for="tournament-location"><i class="pi pi-building"></i> City</label>
          <input pInputText id="tournament-location" formControlName="location" placeholder="e.g., Zagreb" autocomplete="address-level2" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full-width">
          <label for="tournament-venue"><i class="pi pi-home"></i> Venue / Stadium</label>
          <input pInputText id="tournament-venue" formControlName="venue" placeholder="e.g., Stadium Name or Sports Complex" autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-calendar"></i>
        <span>Dates</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-startDate"><i class="pi pi-calendar-plus"></i> Start Date <span class="required">*</span></label>
          <input
            id="tournament-startDate"
            type="date"
            [value]="getDateInputValue('start_date_obj')"
            (input)="onDateInput('start_date_obj', $any($event.target).value)"
            class="w-full"
          />
        </div>
        <div class="form-field">
          <label for="tournament-endDate"><i class="pi pi-calendar-minus"></i> End Date</label>
          <input
            id="tournament-endDate"
            type="date"
            [value]="getDateInputValue('end_date_obj')"
            (input)="onDateInput('end_date_obj', $any($event.target).value)"
            class="w-full"
          />
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full-width">
          <label for="tournament-deadline"><i class="pi pi-clock"></i> Registration Deadline</label>
          <input
            id="tournament-deadline"
            type="date"
            [value]="getDateInputValue('registration_deadline_obj')"
            (input)="onDateInput('registration_deadline_obj', $any($event.target).value)"
            class="w-full"
          />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-sliders-h"></i>
        <span>Classification</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-type"><i class="pi pi-flag"></i> Tournament Type</label>
          <p-select inputId="tournament-type" formControlName="tournament_type" [options]="tournamentTypes" optionLabel="label" optionValue="value" placeholder="Select type" class="w-full" appendTo="body"></p-select>
        </div>
        <div class="form-field">
          <label for="tournament-level"><i class="pi pi-star"></i> Competition Level</label>
          <p-select inputId="tournament-level" formControlName="competition_level" [options]="competitionLevels" optionLabel="label" optionValue="value" placeholder="Select level" class="w-full" appendTo="body"></p-select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full-width checkbox-field">
          <p-checkbox formControlName="is_home_tournament" [binary]="true" variant="filled" inputId="homeTournament"></p-checkbox>
          <label for="homeTournament" class="checkbox-label"><i class="pi pi-home"></i> This is a home tournament (we are hosting)</label>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-link"></i>
        <span>Links & Social Media</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-website"><i class="pi pi-globe"></i> Official Website</label>
          <input pInputText id="tournament-website" formControlName="website_url" placeholder="https://tournament-website.com" autocomplete="url" />
        </div>
        <div class="form-field">
          <label for="tournament-instagram"><i class="pi pi-instagram"></i> Instagram</label>
          <input pInputText id="tournament-instagram" formControlName="instagram_url" placeholder="https://instagram.com/tournament" autocomplete="off" />
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-facebook"><i class="pi pi-facebook"></i> Facebook</label>
          <input pInputText id="tournament-facebook" formControlName="facebook_url" placeholder="https://facebook.com/event/..." autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="tournament-registration"><i class="pi pi-file-edit"></i> Registration Link</label>
          <input pInputText id="tournament-registration" formControlName="registration_url" placeholder="https://registration-form.com" autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-map"></i>
        <span>Venue & Accommodation</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-venue-map"><i class="pi pi-map-marker"></i> Venue Location (Google Maps)</label>
          <input pInputText id="tournament-venue-map" formControlName="venue_maps_url" placeholder="https://maps.google.com/..." autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="tournament-hotel-map"><i class="pi pi-building"></i> Hotel Location (Google Maps)</label>
          <input pInputText id="tournament-hotel-map" formControlName="hotel_maps_url" placeholder="https://maps.google.com/..." autocomplete="off" />
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-hotel-name"><i class="pi pi-home"></i> Recommended Hotel</label>
          <input pInputText id="tournament-hotel-name" formControlName="hotel_name" placeholder="e.g., Hotel Ambassador" autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="tournament-hotel-booking"><i class="pi pi-external-link"></i> Hotel Booking Link</label>
          <input pInputText id="tournament-hotel-booking" formControlName="hotel_booking_url" placeholder="https://booking.com/..." autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <i class="pi pi-info-circle"></i>
        <span>Contact & Notes</span>
      </div>
      <div class="form-row two-col">
        <div class="form-field">
          <label for="tournament-contact-name"><i class="pi pi-user"></i> Contact Person</label>
          <input pInputText id="tournament-contact-name" formControlName="contact_name" placeholder="e.g., John Smith" autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="tournament-contact-email"><i class="pi pi-envelope"></i> Contact Email</label>
          <input pInputText id="tournament-contact-email" formControlName="contact_email" placeholder="contact@tournament.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full-width">
          <label for="tournament-notes"><i class="pi pi-pencil"></i> Notes & Additional Information</label>
          <textarea pTextarea id="tournament-notes" formControlName="notes" rows="3" placeholder="Travel tips, dress code, parking info, special requirements..." class="w-full" autocomplete="off"></textarea>
        </div>
      </div>
    </div>
  </form>

  <app-dialog-footer
    dialogFooter
    cancelLabel="Cancel"
    primaryLabel="Save"
    primaryIcon="check"
    [loading]="loading"
    (primary)="save.emit()"
    (cancel)="onClose()"
  />
</app-dialog>
