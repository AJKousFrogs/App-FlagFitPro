<app-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  dialogSize="sm"
>
  <app-dialog-header
    icon="plus-circle"
    title="Create New Channel"
    subtitle="Set up a space for a team, group, or position room."
    (close)="onClose()"
  />

  <div class="create-channel-form">
    <div class="form-field">
      <app-form-input
        label="Channel Name"
        [value]="channelName"
        (valueChange)="onChannelNameInput($event)"
        placeholder="e.g., qb-room"
      />
    </div>

    <div class="form-field">
      <app-textarea
        label="Description"
        [value]="channelDescription"
        (valueChange)="onChannelDescriptionInput($event)"
        [rows]="2"
        placeholder="What's this channel about?"
      />
    </div>

    <div class="form-field">
      <app-select
        label="Channel Type"
        (onChange)="onChannelTypeSelect($event)"
        [options]="channelTypeOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Select type"
        class="w-full"
        appendTo="body"
      />
    </div>

    @if (channelType === "position_group") {
      <div class="form-field">
        <app-select
          label="Position"
          (onChange)="onChannelPositionSelect($event)"
          [options]="positionOptions()"
          optionLabel="label"
          optionValue="value"
          placeholder="Select position"
          class="w-full"
          appendTo="body"
        />
      </div>
    }
  </div>

  <app-dialog-footer
    cancelLabel="Cancel"
    primaryLabel="Create Channel"
    primaryIcon="check"
    [disabled]="!channelName.trim()"
    (cancel)="onClose()"
    (primary)="onCreate()"
  />
</app-dialog>
