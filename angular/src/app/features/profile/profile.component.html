<app-main-layout>
    <div class="profile-page bento-grid ui-page-shell">
      <!-- Profile Header (Full Width) -->
      <div class="bento-item full-width no-padding header-bento">
        <app-profile-header-section
          [avatarUrl]="avatarUrl()"
          [userInitials]="userInitials()"
          [isUploadingAvatar]="isUploadingAvatar()"
          [jerseyNumber]="jerseyNumber()"
          [userName]="userName()"
          [userPosition]="userPosition()"
          [teamName]="teamName()"
          [userEmail]="userEmail()"
          [memberSince]="memberSince()"
          [profileCompletionPercentage]="profileCompletion().percentage"
          [profileCompletionMissingFields]="profileCompletion().missingFields"
          [missingFieldsPreviewCount]="UI_LIMITS.MISSING_FIELDS_PREVIEW"
          [deletionPending]="deletionPending()"
          (fileSelected)="onFileSelected($event)"
          (shareProfile)="shareProfile()"
        />
      </div>

      <!-- Quick Bio/Status (Span 1) -->
      <div class="bento-item bio-bento">
        <h3 class="bento-title"><i class="pi pi-id-card"></i> Athlete Identity</h3>
        <div class="bio-content">
          <div class="jersey-badge">#{{ jerseyNumber() || '00' }}</div>
          <p class="position-tag">{{ userPosition() }}</p>
          <div class="team-link"><i class="pi pi-users"></i> {{ teamName() }}</div>
        </div>
      </div>

      <!-- Profile Stats (Span 2) -->
      <div class="bento-item span-2 stats-bento no-padding">
        <app-stats-grid [stats]="stats()"></app-stats-grid>
      </div>

      <!-- Main Profile Tabs (Full Width) -->
      <div class="bento-item full-width no-padding tabs-bento">
        <app-tabs [value]="activeTab()" (valueChange)="activeTab.set($event.toString())">
          <div *appTabPanel="let panel; header: 'Overview'; value: 'overview'; icon: 'pi-chart-line'">
              @defer (when activeTab() === 'overview') {
                <app-profile-overview-section [activities]="activities()" />
              } @placeholder {
                <app-loading
                  [visible]="true"
                  variant="skeleton"
                  message="Loading overview…"
                />
              }
          </div>
          <div *appTabPanel="let panel; header: 'Achievements'; value: 'achievements'; icon: 'pi-trophy'">
              @defer (when activeTab() === 'achievements') {
                <app-profile-achievements-section [achievements]="achievements()" />
              } @placeholder {
                <app-loading
                  [visible]="true"
                  variant="skeleton"
                  message="Loading achievements…"
                />
              }
          </div>
          <div *appTabPanel="let panel; header: 'Statistics'; value: 'statistics'; icon: 'pi-chart-bar'">
              @defer (when activeTab() === 'statistics') {
                <app-profile-statistics-section [performanceStats]="performanceStats()" />
              } @placeholder {
                <app-loading
                  [visible]="true"
                  variant="skeleton"
                  message="Loading statistics…"
                />
              }
          </div>
        </app-tabs>
      </div>
    </div>
    </app-main-layout>
