<app-main-layout>
        <div class="profile-page elite-phase2-shell ui-page-shell ui-page-stack">
        <!-- Deletion Pending Banner - Using Centralized UX Copy -->
        @if (deletionPending()) {
          <app-alert
            variant="warning"
            [icon]="deletionMessage.icon || null"
            [title]="deletionMessage.title"
            [message]="getDeletionReason()"
            styleClass="profile-deletion-alert"
          >
            <div class="deletion-alert-actions">
              <app-button
                variant="secondary"
                size="sm"
                iconLeft="pi-times"
                [loading]="cancellingDeletion()"
                (clicked)="cancelDeletion()"
              >
                Cancel Deletion
              </app-button>
              <a [href]="deletionMessage.helpLink" class="deletion-help-link">
                Learn More
              </a>
            </div>
          </app-alert>
        }

        <!-- Loading State -->
        @if (isLoading()) {
          <app-loading message="Loading profile..." variant="inline" />
        }

        <!-- Error State -->
        @else if (hasError()) {
          <app-page-error-state
            title="Unable to load profile"
            [message]="errorMessage()"
            (retry)="retryLoad()"
          ></app-page-error-state>
        } @else {
          <app-profile-header-section
            [avatarUrl]="avatarUrl()"
            [userInitials]="userInitials()"
            [isUploadingAvatar]="isUploadingAvatar()"
            [jerseyNumber]="jerseyNumber()"
            [userName]="userName()"
            [userPosition]="userPosition()"
            [teamName]="teamName()"
            [userEmail]="userEmail()"
            [memberSince]="memberSince()"
            [profileCompletionPercentage]="profileCompletion().percentage"
            [profileCompletionMissingFields]="profileCompletion().missingFields"
            [missingFieldsPreviewCount]="UI_LIMITS.MISSING_FIELDS_PREVIEW"
            [deletionPending]="deletionPending()"
            (fileSelected)="onFileSelected($event)"
            (shareProfile)="shareProfile()"
          />

          <!-- Profile Stats -->
          <app-stats-grid [stats]="stats()"></app-stats-grid>

          <!-- Profile Tabs -->
          <div class="profile-tabs-container">
            <p-tabs [(value)]="activeTab">
              <p-tablist>
                <p-tab value="overview">
                  <i class="pi pi-chart-line"></i>
                  <span class="tab-label">Overview</span>
                </p-tab>
                <p-tab value="achievements">
                  <i class="pi pi-trophy"></i>
                  <span class="tab-label">Achievements</span>
                </p-tab>
                <p-tab value="statistics">
                  <i class="pi pi-chart-bar"></i>
                  <span class="tab-label">Statistics</span>
                </p-tab>
                <p-tab value="invitations">
                  <i class="pi pi-envelope"></i>
                  <span class="tab-label">Invitations</span>
                  @if (pendingInvitations().length > 0) {
                    <span class="invitation-badge">{{
                      pendingInvitations().length
                    }}</span>
                  }
                </p-tab>
              </p-tablist>
              <p-tabpanels>
                <p-tabpanel value="overview">
                  <app-profile-overview-section [activities]="activities()" />
                </p-tabpanel>
                <p-tabpanel value="achievements">
                  <app-profile-achievements-section
                    [achievements]="achievements()"
                  />
                </p-tabpanel>
                <p-tabpanel value="statistics">
                  <app-profile-statistics-section
                    [performanceStats]="performanceStats()"
                  />
                </p-tabpanel>
                <p-tabpanel value="invitations">
                  <app-profile-invitations-section
                    [loading]="loadingInvitations()"
                    [invitations]="pendingInvitations()"
                    [processingInvitationId]="processingInvitation()"
                    (acceptInvitation)="acceptInvitation($event)"
                    (declineInvitation)="declineInvitation($event)"
                    (requestNewInvitation)="requestNewInvitation($event)"
                  />
                </p-tabpanel>
              </p-tabpanels>
            </p-tabs>
          </div>
        }
      </div>
    </app-main-layout>
