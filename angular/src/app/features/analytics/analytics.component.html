<app-main-layout>
  <div class="analytics-page bento-grid ui-page-shell">
    <!-- Header (Full Width) -->
    <div class="bento-item full-width no-padding header-bento">
      <app-page-header
        title="Athlete Analytics"
        subtitle="Performance trends, benchmarks, and progress monitoring"
        icon="pi-chart-bar"
      ></app-page-header>
    </div>

    <!-- Data Status (Full Width) -->
    <div class="bento-item full-width data-info-bento">
      <app-data-source-banner
        [dataState]="analyticsDataState()"
        [currentData_points]="analyticsDataPoints()"
        [minimumRequired]="analyticsMinimumRequired"
        metricName="analytics"
        [showWhenReal]="true"
      />
      <div class="data-freshness">
        <span class="data-source">Source: Training & Wellness Data.</span>
        @if (lastRefreshed()) {
          <span class="data-updated">Last updated: {{ lastRefreshed() | date: "short" }}</span>
        }
      </div>
    </div>

    <!-- Overview Section (Full Width Top) -->
    @defer (on idle) {
      <div class="bento-item full-width overview-bento no-padding">
        <app-analytics-overview-section
          [developmentGoals]="developmentGoals()"
          [metrics]="metrics()"
          [goalsPreviewCount]="UI_LIMITS.GOALS_PREVIEW_COUNT"
        />
      </div>
    }

    <!-- Primary Charts (Span 2) -->
    @defer (on viewport) {
      <div class="bento-item span-2 charts-bento">
        <h3 class="bento-title"><i class="pi pi-chart-line"></i> Performance Dynamics</h3>
        <app-analytics-charts-section
          [performanceChartData]="performanceChartData()"
          [chemistryChartData]="chemistryChartData()"
          [distributionChartData]="distributionChartData()"
          [positionChartData]="positionChartData()"
          [speedChartData]="speedChartData()"
          [acwrData]="acwrData()"
          [noDataMessage]="noDataMessage"
          [gapAnalysisData]="gapAnalysisData()"
          [gapAnalysisSummary]="gapAnalysisSummary()"
          [speedInsights]="speedInsights()"
          [timePeriods]="timePeriods"
          [metricOptions]="metricOptions"
          [lineChartOptions]="lineChartOptions"
          [radarChartOptions]="radarChartOptions"
          [doughnutChartOptions]="DOUGHNUT_CHART_OPTIONS"
          [barChartOptions]="BAR_CHART_OPTIONS"
          (resetPerformanceChart)="resetChartZoom('performance')"
          (exportPerformanceChart)="exportChart('performance')"
          (selectedTimePeriodChange)="onSelectedTimePeriodChange($event)"
          (selectedMetricChange)="onSelectedMetricChange($event)"
        />
      </div>
    }

    <!-- Player Stats Summary (Span 1) -->
    @defer (on viewport) {
      <div class="bento-item stats-summary-bento">
        <h3 class="bento-title"><i class="pi pi-user"></i> Athlete Profile Stats</h3>
        <app-analytics-player-stats-section
          [playerGameStats]="playerGameStats()"
          [playerSeasonStats]="playerSeasonStats()"
          [playerMultiSeasonStats]="playerMultiSeasonStats()"
          [gamesMissed]="gamesMissed()"
          [attendanceRate]="attendanceRate()"
        />
      </div>
    }
  </div>
</app-main-layout>
