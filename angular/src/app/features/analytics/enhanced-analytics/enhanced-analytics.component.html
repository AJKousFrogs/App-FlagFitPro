    <app-main-layout>
      <div class="enhanced-analytics-page ui-page-shell ui-page-shell--content-lg ui-page-stack">
        <app-page-header
          title="Advanced Performance"
          subtitle="Advanced insights, risk signals, and prediction readiness"
          icon="pi-chart-line"
        >
          <app-button
            variant="outlined"
            iconLeft="pi-download"
            (clicked)="exportReport()"
            >Export Report</app-button
          >
        </app-page-header>

        <p-tabs>
          <p-tabpanel header="Performance Trends">
            <app-card-shell title="7-Week Performance Trend">
              @if (hasNoData()) {
                <app-empty-state
                  [useCard]="false"
                  [icon]="noDataMessage.icon || null"
                  [heading]="noDataMessage.title"
                  [description]="noDataMessage.reason"
                  [actionLabel]="noDataMessage.actionLabel || 'Log Training'"
                  [actionLink]="noDataMessage.helpLink || null"
                  actionIcon="pi-plus"
                />
              } @else if (performanceChartData()) {
                <app-lazy-chart
                  type="line"
                  [data]="performanceChartData()"
                  [options]="chartOptions"
                ></app-lazy-chart>
              }
            </app-card-shell>
          </p-tabpanel>

          <p-tabpanel header="Injury Risk">
            <app-card-shell title="Injury Risk Analysis">
              @if (hasInsufficientDataForInjuryRisk()) {
                <app-empty-state
                  [useCard]="false"
                  [icon]="injuryRiskInsufficientMessage.icon || null"
                  [heading]="injuryRiskInsufficientMessage.title"
                  [description]="injuryRiskInsufficientMessage.reason"
                  [actionLabel]="
                    injuryRiskInsufficientMessage.actionLabel ||
                    'Learn More'
                  "
                  [actionLink]="injuryRiskInsufficientMessage.helpLink || null"
                  actionIcon="pi-info-circle"
                />
              } @else {
                <div class="risk-analysis">
                  <p>
                    Based on your training load and wellness data, your current
                    injury risk is:
                  </p>
                  <div class="risk-score">
                    <span class="score-value">{{ injuryRisk() }}%</span>
                    <span class="score-label">{{ getRiskLabel() }}</span>
                  </div>
                </div>
              }
            </app-card-shell>
          </p-tabpanel>

          <p-tabpanel header="Predictions">
            <app-card-shell title="Performance Predictions">
              <!-- AI consent check for predictions -->
              @if (!aiEnabled()) {
                <app-ai-consent-required></app-ai-consent-required>
              } @else {
                <app-empty-state
                  [useCard]="false"
                  icon="pi-sparkles"
                  heading="Predictions are not available yet"
                  description="We need more validated training and wellness history before showing prediction insights here."
                />
              }
            </app-card-shell>
          </p-tabpanel>
        </p-tabs>
      </div>
    </app-main-layout>
