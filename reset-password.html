<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Reset Password</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- New Modular CSS Architecture -->
    <link rel="stylesheet" href="./src/css/main.css" />
    <!-- Auth footer styles -->
    <link rel="stylesheet" href="./src/css/components/footer-auth.css" />
    <!-- Page-specific styles -->
    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./src/icon-helper.js" defer></script>
    <script src="./src/theme-switcher.js" defer></script>
    <!-- Universal Components -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- Universal Form Validator -->
    <script type="module" src="./src/js/components/universal-form-validator.js" defer></script>
    <!-- Footer Loader (Dynamic Component) -->
    <script type="module" src="./src/js/components/footer-loader.js" defer></script>
  </head>
  <body class="u-display-flex u-align-center u-justify-center u-padding-20">
    <div
      class="reset-container u-radius-xl u-shadow-lg u-padding-40 u-width-full u-text-center"
    >
      <div class="logo u-text-display-lg u-margin-bottom-10">🔐</div>
      <h1
        class="title u-text-heading-xl u-font-weight-700 u-text-primary u-margin-bottom-10"
      >
        Reset Password
      </h1>
      <p
        class="subtitle u-text-body-sm u-text-secondary u-margin-bottom-30"
        style="line-height: 1.5"
      >
        Enter your email address and we'll send you a link to reset your
        password.
      </p>

      <div
        class="info-box u-bg-info u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-info u-radius-md u-text-left"
        id="demoInfo"
        style="display: none; border: 1px solid var(--color-status-info)"
      >
        <strong>Demo Mode:</strong> Email service not configured. Using mock
        responses.
      </div>

      <div
        class="info-box u-bg-info u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-info u-radius-md u-text-left"
        id="emailInfo"
        style="display: none; border: 1px solid var(--color-status-info)"
      >
        <strong>Email Service Active:</strong> Real password reset emails will
        be sent to your inbox.
      </div>

      <div
        class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md"
        id="successMessage"
        style="display: none; border: 1px solid var(--color-status-success)"
      ></div>
      <div
        class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md"
        id="errorMessage"
        style="display: none; border: 1px solid var(--color-status-error)"
      ></div>

      <form id="resetForm">
        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="email" class="form-label required">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter your email address"
            required
            autocomplete="email"
            aria-describedby="email-error email-success"
            aria-invalid="false"
          />
          <div
            id="email-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small id="email-success" class="form-success" style="display: none"
            >Valid email</small
          >
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-md"
          id="resetBtn"
          style="width: 100%; margin-bottom: var(--space-5)"
        >
          Send Reset Link
        </button>
      </form>

      <a
        href="/login.html"
        class="back-link u-text-brand u-font-weight-500 u-text-label-sm"
        style="text-decoration: none"
        ><i
          data-lucide="chevron-left"
          style="
            width: 16px;
            height: 16px;
            display: inline-block;
            vertical-align: middle;
          "
        ></i>
        Back to Sign In</a
      >
    </div>

    <script type="module">
      import { validateEmail as validateEmailUtil } from "./src/js/utils/shared.js";

      // Initialize page
      document.addEventListener("DOMContentLoaded", function () {
        // Check if email service is available
        checkEmailService();

        // Form validation is handled by UniversalFormValidator (auto-initialized)
      });

      async function checkEmailService() {
        try {
          const response = await fetch(
            "/.netlify/functions/auth-reset-password",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: "test@example.com",
                action: "test",
              }),
            },
          );

          if (response.ok) {
            document.getElementById("emailInfo").style.display = "block";
          } else {
            document.getElementById("demoInfo").style.display = "block";
          }
        } catch (error) {
          document.getElementById("demoInfo").style.display = "block";
        }
      }

      document
        .getElementById("resetForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const resetBtn = document.getElementById("resetBtn");
          const originalText = resetBtn.textContent;

          // Clear previous messages
          hideMessage("errorMessage");
          hideMessage("successMessage");

          // Validate email
          if (!validateEmail(email)) {
            return;
          }

          // Show loading state
          resetBtn.innerHTML =
            '<span class="spinner-mini" style="display: inline-block; margin-right: 8px;"></span> Sending...';
          resetBtn.disabled = true;

          try {
            // Call password reset API
            const response = await fetch(
              "/.netlify/functions/auth-reset-password",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  email: email,
                  action: "request",
                }),
              },
            );

            const result = await response.json();

            if (response.ok && result.success) {
              showMessage(
                "successMessage",
                `Password reset link sent to ${email}. Please check your inbox and follow the instructions.`,
              );
              // Clear form on success
              document.getElementById("email").value = "";
            } else {
              showMessage(
                "errorMessage",
                result.message ||
                  result.error ||
                  "Failed to send reset email. Please try again.",
              );
            }
          } catch (error) {
            console.error("Password reset error:", error);
            showMessage(
              "errorMessage",
              "Network error. Please check your connection and try again.",
            );
          } finally {
            // Reset button state
            resetBtn.textContent = originalText;
            resetBtn.disabled = false;
          }
        });

      // Form validation is handled by UniversalFormValidator
      function validateEmail(email) {
        // Basic validation - detailed validation handled by UniversalFormValidator
        if (!email || email.trim() === "") {
          showMessage("errorMessage", "Please enter your email address.");
          return false;
        }
        if (!validateEmailUtil(email)) {
          showMessage("errorMessage", "Please enter a valid email address.");
          return false;
        }
        return true;
      }

      function showMessage(elementId, message) {
        const element = document.getElementById(elementId);
        element.textContent = message;
        element.style.display = "block";

        // Auto-hide success messages after 10 seconds
        if (elementId === "successMessage") {
          setTimeout(() => {
            element.style.display = "none";
          }, 10000);
        }
      }

      function hideMessage(elementId) {
        const element = document.getElementById(elementId);
        element.style.display = "none";
      }

      // SECURITY: Add URL parameter handling with validation
      const urlParams = new URLSearchParams(window.location.search);
      const rawToken = urlParams.get("token");

      // Validate token format before use
      function isValidToken(token) {
        if (!token || typeof token !== 'string') return false;
        // Token should be alphanumeric with hyphens/underscores, reasonable length
        if (token.length < 10 || token.length > 500) return false;
        // Only allow safe characters (alphanumeric, hyphens, underscores)
        return /^[a-zA-Z0-9_-]+$/.test(token);
      }

      if (rawToken && isValidToken(rawToken)) {
        // If there's a valid token in the URL, show password reset form
        showPasswordResetForm(rawToken);
      } else if (rawToken) {
        // Invalid token format
        showMessage("errorMessage", "Invalid reset link format. Please request a new password reset.");
      }

      async function showPasswordResetForm(token) {
        // Verify the token first
        try {
          const response = await fetch(
            "/.netlify/functions/auth-reset-password",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: "",
                action: "verify",
                token: token,
              }),
            },
          );

          const result = await response.json();

          if (result.valid) {
            // Show new password form
            document.querySelector(".reset-container").innerHTML = `
                        <div class="logo u-text-display-lg u-margin-bottom-10">🔐</div>
                        <h1 class="title u-text-heading-xl u-font-weight-700 u-text-primary u-margin-bottom-10">Set New Password</h1>
                        <p class="subtitle u-text-body-sm u-text-secondary u-margin-bottom-30" style="line-height: 1.5;">Enter your new password below.</p>
                        
                        <div class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md" id="successMessage" style="display: none; border: 1px solid var(--color-status-success);"></div>
                        <div class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md" id="errorMessage" style="display: none; border: 1px solid var(--color-status-error);"></div>
                        
                        <form id="newPasswordForm">
                            <div class="form-group u-margin-bottom-20 u-text-left">
                                <label for="newPassword" class="form-label required">New Password</label>
                                <input type="password" id="newPassword" name="newPassword" class="form-input" placeholder="Enter new password" required autocomplete="new-password" aria-describedby="newPassword-error newPassword-success passwordStrength">
                                <div id="newPassword-error" class="form-error" role="alert" style="display: none;"></div>
                                <small id="newPassword-success" class="form-success" style="display: none;">Password is valid</small>
                                <div id="passwordStrength" class="password-strength u-margin-top-8 u-text-caption u-padding-8 u-radius-sm u-bg-secondary" style="display: none;"></div>
                            </div>
                            
                            <div class="form-group u-margin-bottom-20 u-text-left">
                                <label for="confirmPassword" class="form-label required">Confirm Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm new password" required autocomplete="new-password" aria-describedby="confirmPassword-error confirmPassword-success">
                                <div id="confirmPassword-error" class="form-error" role="alert" style="display: none;"></div>
                                <small id="confirmPassword-success" class="form-success" style="display: none;">Passwords match</small>
                            </div>

                            <button type="submit" class="btn btn-primary btn-md" id="resetBtn" style="width: 100%; margin-bottom: var(--space-5);">
                                Update Password
                            </button>
                        </form>

                        <a href="/login.html" class="back-link u-text-brand u-font-weight-500 u-text-label-sm" style="text-decoration: none;"><i data-lucide="chevron-left" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Back to Sign In</a>
                    `;

            // Form validation is handled by UniversalFormValidator (auto-initialized)

            // Handle new password form submission
            document
              .getElementById("newPasswordForm")
              .addEventListener("submit", async function (e) {
                e.preventDefault();

                const newPassword =
                  document.getElementById("newPassword").value;
                const confirmPassword =
                  document.getElementById("confirmPassword").value;
                const resetBtn = document.getElementById("resetBtn");
                const originalText = resetBtn.textContent;

                // Clear previous messages
                hideMessage("errorMessage");
                hideMessage("successMessage");

                // Validate passwords
                if (!validateNewPassword(newPassword, confirmPassword)) {
                  return;
                }

                // Show loading state
                resetBtn.innerHTML = "<span>⏳</span> Updating...";
                resetBtn.disabled = true;

                try {
                  const response = await fetch(
                    "/.netlify/functions/auth-reset-password",
                    {
                      method: "POST",
                      headers: {
                        "Content-Type": "application/json",
                      },
                      body: JSON.stringify({
                        email: result.email,
                        action: "reset",
                        token: token,
                        newPassword: newPassword,
                      }),
                    },
                  );

                  const resetResult = await response.json();

                  if (response.ok && resetResult.success) {
                    showMessage(
                      "successMessage",
                      "Password updated successfully! You can now sign in with your new password.",
                    );

                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                      window.location.href = "/login.html";
                    }, 3000);
                  } else {
                    showMessage(
                      "errorMessage",
                      resetResult.message ||
                        resetResult.error ||
                        "Failed to update password. Please try again.",
                    );
                    resetBtn.textContent = originalText;
                    resetBtn.disabled = false;
                  }
                } catch (error) {
                  console.error("Password update error:", error);
                  showMessage(
                    "errorMessage",
                    "Network error. Please try again.",
                  );
                  resetBtn.textContent = originalText;
                  resetBtn.disabled = false;
                }
              });
          } else {
            showMessage(
              "errorMessage",
              "Invalid or expired reset link. Please request a new password reset.",
            );
          }
        } catch (error) {
          console.error("Token verification error:", error);
          showMessage(
            "errorMessage",
            "Failed to verify reset link. Please try again.",
          );
        }
      }

      // Password validation is handled by UniversalFormValidator
      function validateNewPassword(password, confirmPassword) {
        // Basic validation - detailed validation handled by UniversalFormValidator
        if (!password || password.trim() === "") {
          showMessage("errorMessage", "Please enter a new password.");
          return false;
        }
        if (password !== confirmPassword) {
          showMessage("errorMessage", "Passwords do not match.");
          return false;
        }
        return true;
      }
    </script>

        <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
</html>
