<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagFit Pro - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #10c96b 0%, #0ab85a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: var(--dark-text-primary);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #10c96b;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #10c96b 0%, #0ab85a 100%);
            color: var(--dark-text-primary);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            color: #10c96b;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .success-message, .error-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .success-message {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            color: #2e7d32;
        }

        .error-message {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
        }

        .info-box {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #1565c0;
            text-align: left;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 0.8rem;
            padding: 8px;
            border-radius: 4px;
            background: #f5f5f5;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./src/comprehensive-design-system.css">
    <link rel="stylesheet" href="./src/spacing-system.css">
</head>
<body>
    <div class="reset-container">
        <div class="logo">🔐</div>
        <h1 class="title">Reset Password</h1>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
        
        <div class="info-box" id="demoInfo" style="display: none;">
            <strong>Demo Mode:</strong> Email service not configured. Using mock responses.
        </div>
        
        <div class="info-box" id="emailInfo" style="display: none;">
            <strong>Email Service Active:</strong> Real password reset emails will be sent to your inbox.
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <button type="submit" class="reset-btn" id="resetBtn">
                Send Reset Link
            </button>
        </form>

        <a href="/login.html" class="back-link"><i data-lucide="chevron-left" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Back to Sign In</a>
    </div>

    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Lucide icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            
            // Check if email service is available
            checkEmailService();
        });
        
        async function checkEmailService() {
            try {
                const response = await fetch('/.netlify/functions/auth-reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        action: 'test'
                    })
                });
                
                if (response.ok) {
                    document.getElementById('emailInfo').style.display = 'block';
                } else {
                    document.getElementById('demoInfo').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('demoInfo').style.display = 'block';
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const resetBtn = document.getElementById('resetBtn');
            const originalText = resetBtn.textContent;
            
            // Clear previous messages
            hideMessage('errorMessage');
            hideMessage('successMessage');
            
            // Validate email
            if (!validateEmail(email)) {
                return;
            }
            
            // Show loading state
            resetBtn.innerHTML = '<span>⏳</span> Sending...';
            resetBtn.disabled = true;
            
            try {
                // Call password reset API
                const response = await fetch('/.netlify/functions/auth-reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        action: 'request'
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showMessage('successMessage', `Password reset link sent to ${email}. Please check your inbox and follow the instructions.`);
                    // Clear form on success
                    document.getElementById('email').value = '';
                } else {
                    showMessage('errorMessage', result.message || result.error || 'Failed to send reset email. Please try again.');
                }
            } catch (error) {
                console.error('Password reset error:', error);
                showMessage('errorMessage', 'Network error. Please check your connection and try again.');
            } finally {
                // Reset button state
                resetBtn.textContent = originalText;
                resetBtn.disabled = false;
            }
        });

        function validateEmail(email) {
            if (!email || email.trim() === '') {
                showMessage('errorMessage', 'Please enter your email address.');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('errorMessage', 'Please enter a valid email address.');
                return false;
            }
            
            return true;
        }

        function showMessage(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            
            // Auto-hide success messages after 10 seconds
            if (elementId === 'successMessage') {
                setTimeout(() => {
                    element.style.display = 'none';
                }, 10000);
            }
        }
        
        function hideMessage(elementId) {
            const element = document.getElementById(elementId);
            element.style.display = 'none';
        }
        
        // Add URL parameter handling for token verification
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            // If there's a token in the URL, show password reset form
            showPasswordResetForm(token);
        }
        
        async function showPasswordResetForm(token) {
            // Verify the token first
            try {
                const response = await fetch('/.netlify/functions/auth-reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: '',
                        action: 'verify',
                        token: token
                    })
                });
                
                const result = await response.json();
                
                if (result.valid) {
                    // Show new password form
                    document.querySelector('.reset-container').innerHTML = `
                        <div class="logo">🔐</div>
                        <h1 class="title">Set New Password</h1>
                        <p class="subtitle">Enter your new password below.</p>
                        
                        <div class="success-message" id="successMessage"></div>
                        <div class="error-message" id="errorMessage"></div>
                        
                        <form id="newPasswordForm">
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                                <div id="passwordStrength" class="password-strength" style="display: none;"></div>
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                            </div>

                            <button type="submit" class="reset-btn" id="resetBtn">
                                Update Password
                            </button>
                        </form>

                        <a href="/login.html" class="back-link"><i data-lucide="chevron-left" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Back to Sign In</a>
                    `;
                    
                    // Re-initialize Lucide icons
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    }
                    
                    // Add password strength checking
                    document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);
                    
                    // Handle new password form submission
                    document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        
                        const newPassword = document.getElementById('newPassword').value;
                        const confirmPassword = document.getElementById('confirmPassword').value;
                        const resetBtn = document.getElementById('resetBtn');
                        const originalText = resetBtn.textContent;
                        
                        // Clear previous messages
                        hideMessage('errorMessage');
                        hideMessage('successMessage');
                        
                        // Validate passwords
                        if (!validateNewPassword(newPassword, confirmPassword)) {
                            return;
                        }
                        
                        // Show loading state
                        resetBtn.innerHTML = '<span>⏳</span> Updating...';
                        resetBtn.disabled = true;
                        
                        try {
                            const response = await fetch('/.netlify/functions/auth-reset-password', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({
                                    email: result.email,
                                    action: 'reset',
                                    token: token,
                                    newPassword: newPassword
                                })
                            });
                            
                            const resetResult = await response.json();
                            
                            if (response.ok && resetResult.success) {
                                showMessage('successMessage', 'Password updated successfully! You can now sign in with your new password.');
                                
                                // Redirect to login after 3 seconds
                                setTimeout(() => {
                                    window.location.href = '/login.html';
                                }, 3000);
                            } else {
                                showMessage('errorMessage', resetResult.message || resetResult.error || 'Failed to update password. Please try again.');
                                resetBtn.textContent = originalText;
                                resetBtn.disabled = false;
                            }
                        } catch (error) {
                            console.error('Password update error:', error);
                            showMessage('errorMessage', 'Network error. Please try again.');
                            resetBtn.textContent = originalText;
                            resetBtn.disabled = false;
                        }
                    });
                } else {
                    showMessage('errorMessage', 'Invalid or expired reset link. Please request a new password reset.');
                }
            } catch (error) {
                console.error('Token verification error:', error);
                showMessage('errorMessage', 'Failed to verify reset link. Please try again.');
            }
        }
        
        function validateNewPassword(password, confirmPassword) {
            if (!password || password.trim() === '') {
                showMessage('errorMessage', 'Please enter a new password.');
                return false;
            }
            
            if (password.length < 8) {
                showMessage('errorMessage', 'Password must be at least 8 characters long.');
                return false;
            }
            
            // Enhanced password complexity validation
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                showMessage('errorMessage', 'Password must contain uppercase, lowercase, number, and special character.');
                return false;
            }
            
            if (password !== confirmPassword) {
                showMessage('errorMessage', 'Passwords do not match.');
                return false;
            }
            
            return true;
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            let strength = 0;
            let feedback = [];
            
            // Length check
            if (password.length >= 8) strength++;
            else feedback.push('At least 8 characters');
            
            // Uppercase check
            if (/[A-Z]/.test(password)) strength++;
            else feedback.push('Uppercase letter');
            
            // Lowercase check  
            if (/[a-z]/.test(password)) strength++;
            else feedback.push('Lowercase letter');
            
            // Number check
            if (/\d/.test(password)) strength++;
            else feedback.push('Number');
            
            // Special character check
            if (/[@$!%*?&]/.test(password)) strength++;
            else feedback.push('Special character');
            
            strengthDiv.style.display = 'block';
            
            if (strength <= 2) {
                strengthDiv.innerHTML = `<span style="color: #f44336;">Weak: Missing ${feedback.join(', ')}</span>`;
            } else if (strength <= 4) {
                strengthDiv.innerHTML = `<span style="color: #ff9800;">Medium: Missing ${feedback.join(', ')}</span>`;
            } else {
                strengthDiv.innerHTML = `<span style="color: #4caf50;">Strong password!</span>`;
            }
        }
    </script>
</body>
</html>
