<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Team Roster</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- New Modular CSS Architecture -->
    <link rel="stylesheet" href="./src/css/main.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="./src/css/pages/roster.css" />
    <!-- Chatbot Component Styles -->
    <link rel="stylesheet" href="./src/css/components/chatbot.css" />

    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./src/icon-helper.js" defer></script>
    <script src="./src/theme-switcher.js" defer></script>
    <script src="./src/nav-highlight.js" defer></script>
    <script src="./src/components/organisms/top-bar/top-bar.js" defer></script>
    <!-- Universal Components -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- Preload Chatbot Component -->
    <script type="module">
      // Preload chatbot for faster access
      import("./src/js/components/chatbot.js")
        .then((module) => {
          // Ensure chatbot is available globally
          if (module.flagFitChatbot) {
            window.flagFitChatbot = module.flagFitChatbot;
            console.log("Chatbot loaded successfully");
          }
        })
        .catch((error) => {
          console.warn("Chatbot preload failed:", error);
        });
    </script>
    <!-- Common Component Loaders (Sidebar, Top Bar, Footer) -->
    <script type="module" src="./src/js/components/common-loaders.js" defer></script>
    <!-- AI Chat Bubble Loader (Dynamic Component) -->
    <script type="module" src="./src/js/components/ai-chat-bubble-loader.js" defer></script>
  
    <!-- Supabase Configuration (Centralized) -->
    <script src="./src/js/config/supabase-config.js"></script>
    
    <!-- Supabase JS SDK from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.88.0"></script>

  </head>
  <body>
    <div class="dashboard-container">
            <!-- Unified Sidebar Navigation (Loaded Dynamically) -->
      <div data-sidebar-container></div>
        <!-- Top Bar (Loaded Dynamically) -->
        <div data-topbar-container></div>

      <main class="main-content u-flex-1 u-min-width-0 u-bg-primary">
        <!-- Team Header Card -->
        <div class="card card-elevated">
          <div class="card-body">
            <div
              class="u-text-body-sm u-text-secondary u-margin-bottom-4"
              style="line-height: 1.4; font-weight: 500"
            >
              <span>International</span>
              <span style="margin: 0 var(--space-1, 4px); opacity: 0.5">•</span>
              <span>Flag Football</span>
            </div>
            <h2 class="text-heading-xl text-primary space-normal">
              International Flag Football Team
            </h2>
            <p class="text-body-md text-secondary leading-relaxed">
              Meet our world-class athletes and coaching staff representing 12
              countries
            </p>
          </div>
        </div>

        <!-- Team Overview Stats -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title text-heading-lg text-primary u-display-flex u-align-center u-gap-8 u-margin-0">
              <i
                data-lucide="trophy"
                class="icon-20"
                style="color: var(--color-brand-primary)"
              ></i>
              Team Overview
            </h2>
          </div>
          <div class="card-body">
            <div
              class="team-overview u-display-grid"
              id="team-overview"
              style="
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
              "
            >
              <!-- Stats will be populated by JavaScript -->
            </div>
          </div>
        </div>

        <!-- Roster Controls -->
        <div class="card" id="roster-controls" style="display: none;">
          <div class="card-body">
            <div style="display: flex; flex-wrap: wrap; gap: 16px; align-items: center;">
              <!-- Search -->
              <div style="flex: 1; min-width: 200px;">
                <div style="position: relative;">
                  <i
                    data-lucide="search"
                    class="icon-18"
                    style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none;"
                  ></i>
                  <input
                    type="text"
                    id="roster-search"
                    placeholder="Search players..."
                    style="width: 100%; padding: 10px 12px 10px 40px; border: 2px solid var(--color-border-secondary); border-radius: 8px; font-size: 0.95rem; background: var(--surface-primary); color: var(--text-primary);"
                  />
                </div>
              </div>

              <!-- Position Filter -->
              <div>
                <select
                  id="position-filter"
                  style="padding: 10px 32px 10px 12px; border: 2px solid var(--color-border-secondary); border-radius: 8px; font-size: 0.95rem; background: var(--surface-primary); color: var(--text-primary); cursor: pointer;"
                >
                  <option value="all">All Positions</option>
                  <!-- Options will be populated dynamically -->
                </select>
              </div>

              <!-- View Toggle -->
              <div style="display: flex; gap: 4px; background: var(--surface-secondary); padding: 4px; border-radius: 8px;">
                <button
                  id="view-grid"
                  class="view-toggle-btn active"
                  aria-label="Grid view"
                  style="padding: 8px 12px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s;"
                >
                  <i data-lucide="grid" class="icon-18"></i>
                </button>
                <button
                  id="view-table"
                  class="view-toggle-btn"
                  aria-label="Table view"
                  style="padding: 8px 12px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s;"
                >
                  <i data-lucide="list" class="icon-18"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Coaching Staff -->
        <div class="position-section" id="coaching-section" style="display: none;">
          <h2
            class="u-text-heading-xl u-font-weight-700 u-text-primary u-display-flex u-align-center u-gap-8"
          >
            <i
              data-lucide="users"
              class="icon-24"
              style="color: var(--color-brand-primary)"
            ></i>
            Coaching Staff & Support
          </h2>
          <div
            class="roster-grid u-display-grid"
            id="coaching-staff"
            style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr))"
          >
            <!-- Staff cards will be populated by JavaScript -->
          </div>
        </div>

        <!-- Players by Position -->
        <div id="players-by-position">
          <!-- Position sections will be populated by JavaScript -->
        </div>

        <!-- Table View -->
        <div class="card" id="roster-table-view" style="display: none;">
          <div class="card-body">
            <div class="table-wrapper" style="overflow-x: auto;">
              <table class="roster-table" role="table" style="width: 100%; border-collapse: collapse;">
                <thead>
                  <tr style="border-bottom: 2px solid var(--color-border-secondary);">
                    <th style="text-align: left; padding: 12px; font-weight: 600; color: var(--text-primary); font-size: 0.875rem;">
                      Player
                    </th>
                    <th style="text-align: left; padding: 12px; font-weight: 600; color: var(--text-primary); font-size: 0.875rem;">
                      Position
                    </th>
                    <th style="text-align: center; padding: 12px; font-weight: 600; color: var(--text-primary); font-size: 0.875rem;">
                      Number
                    </th>
                    <th style="text-align: left; padding: 12px; font-weight: 600; color: var(--text-primary); font-size: 0.875rem;">
                      Role
                    </th>
                    <th style="text-align: center; padding: 12px; font-weight: 600; color: var(--text-primary); font-size: 0.875rem;">
                      Status
                    </th>
                  </tr>
                </thead>
                <tbody id="roster-table-body">
                  <!-- Table rows will be populated by JavaScript -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- AI Chat Floating Bubble (Loaded Dynamically) -->
        <div data-ai-chat-container></div>
      </main>
    </div>

    <script type="module">
      import { authManager } from "./src/auth-manager.js";
      import { storageService } from "./src/js/services/storage-service-unified.js";
      import { getSupabase } from "./src/js/services/supabase-client.js";
      import { getInitials, groupBy, debounce, initializeLucideIcons } from "./src/js/utils/shared.js";

      /**
       * Helper: Safely clear and set text content
       */
      function setTextContent(element, text) {
        if (!element) return;
        element.textContent = text || '';
      }

      /**
       * Helper: Create element with classes and text
       */
      function createElement(tag, className, textContent) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (textContent) el.textContent = textContent;
        return el;
      }

      /**
       * Helper: Set button loading state safely
       */
      function setButtonLoading(button, loadingText) {
        if (!button) return;
        button.disabled = true;
        button.textContent = '';
        const spinner = document.createElement('span');
        spinner.style.cssText = 'display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px;';
        const text = document.createTextNode(loadingText || 'Loading...');
        button.appendChild(spinner);
        button.appendChild(text);
      }

      /**
       * Helper: Restore button state
       */
      function restoreButton(button, originalHTML) {
        if (!button) return;
        button.disabled = false;
        if (originalHTML && originalHTML.includes('<i')) {
          // For buttons with icons, use a temporary container
          const temp = document.createElement('div');
          temp.innerHTML = originalHTML;
          button.textContent = '';
          while (temp.firstChild) {
            button.appendChild(temp.firstChild);
          }
          if (typeof lucide !== 'undefined') lucide.createIcons(button);
        } else {
          button.textContent = originalHTML || '';
        }
      }

      let currentTeam = null;
      let allMembers = [];
      let filteredMembers = [];
      let viewMode = 'grid'; // 'grid' or 'table'
      let searchQuery = '';
      window.positionFilter = 'all';

      // Initialize roster page
      document.addEventListener("DOMContentLoaded", async function () {
        console.log(
          '<i data-lucide="activity" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Team Roster page loading...',
        );

        // Wait for auth manager to initialize
        await authManager.waitForInit();

        // Check authentication - allow demo access in development
        const isDevelopment =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        const isAuthenticated = authManager.isAuthenticated();

        if (!isAuthenticated && !isDevelopment) {
          console.log(
            '<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> User not authenticated, redirecting to login',
          );
          window.location.href = "/login.html";
          return;
        }

        if (!isAuthenticated && isDevelopment) {
          console.log(
            '<i data-lucide="info" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Development mode: Loading roster without authentication',
          );
        }

        console.log('✅ User authenticated, loading roster');

        try {
          // Try to load user's team
          await loadUserTeam();
        } catch (error) {
          console.error('❌ Error loading roster:', error);
          showEmptyState();
        }
      });

      function showEmptyState() {
        // Get user role to show appropriate empty state
        const user = storageService.get("userData", {}, { usePrefix: false });
        const userRole = user?.role || 'player';
        const isCoach = userRole === 'coach';

        // Update team header
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;

        mainContent.innerHTML = `
          <div class="card card-elevated" style="text-align: center; padding: 60px 40px;">
            <div style="font-size: 4rem; margin-bottom: 24px;">🏈</div>
            <h2 class="u-text-heading-xl u-font-weight-700 u-text-primary u-margin-bottom-16">
              ${isCoach ? 'Create Your Team' : 'No Team Yet'}
            </h2>
            <p class="u-text-body-lg u-text-secondary u-margin-bottom-32" style="max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6;">
              ${isCoach
                ? 'Get started by creating your team and inviting players via email. Build your roster and start training together!'
                : 'You haven\'t been added to a team yet. Ask your coach to send you an invitation to join their team.'}
            </p>
            ${isCoach
              ? `<button
                  class="btn btn-primary"
                  style="padding: 16px 32px; font-size: 1.1rem; font-weight: 600;"
                  onclick="window.location.href='/team-create.html'"
                >
                  <i data-lucide="plus" class="icon-20" style="margin-right: 8px;"></i>
                  Create Team
                </button>`
              : `<div class="u-text-body-md u-text-secondary" style="background: var(--surface-secondary); padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto;">
                  <i data-lucide="info" class="icon-18" style="margin-right: 8px; vertical-align: middle;"></i>
                  <strong>Note:</strong> Only coaches can create teams and invite players
                </div>`
            }
          </div>

          ${isCoach
            ? `<div class="card" style="margin-top: 24px;">
                <div class="card-header">
                  <h3 class="card-title u-margin-0">How It Works</h3>
                </div>
                <div class="card-body">
                  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">1</div>
                      <div>
                        <h4 class="text-heading-sm text-primary font-semibold space-tight">Create Your Team</h4>
                        <p class="text-body-sm text-secondary">Set up your team name, league, and basic information</p>
                      </div>
                    </div>
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">2</div>
                      <div>
                        <h4 class="text-heading-sm text-primary font-semibold space-tight">Invite Players</h4>
                        <p class="text-body-sm text-secondary">Send email invitations to your players to join</p>
                      </div>
                    </div>
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">3</div>
                      <div>
                        <h4 class="text-heading-sm text-primary font-semibold space-tight">Start Training</h4>
                        <p class="text-body-sm text-secondary">Assign training programs and track progress</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="card" style="margin-top: 24px; display: none;" id="inviteCard">
                <div class="card-header">
                  <h3 class="card-title u-margin-0">
                    <i data-lucide="mail" class="icon-20" style="margin-right: 8px;"></i>
                    Invite Players to Your Team
                  </h3>
                </div>
                <div class="card-body">
                  <form id="inviteForm">
                    <div style="margin-bottom: 16px;">
                      <label style="display: block; font-weight: 600; margin-bottom: 8px;">Player Email</label>
                      <input type="email" id="inviteEmail" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="player@example.com" required />
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                      <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Role</label>
                        <select id="inviteRole" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;">
                          <option value="player">Player</option>
                          <option value="assistant_coach">Assistant Coach</option>
                        </select>
                      </div>
                      <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Position (Optional)</label>
                        <input type="text" id="invitePosition" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="e.g., QB, WR" />
                      </div>
                    </div>
                    <div style="margin-bottom: 16px;">
                      <label style="display: block; font-weight: 600; margin-bottom: 8px;">Personal Message (Optional)</label>
                      <textarea id="inviteMessage" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="Welcome to the team!" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="sendInviteBtn" style="width: 100%;">
                      <i data-lucide="send" class="icon-18" style="margin-right: 8px;"></i>
                      Send Invitation
                    </button>
                  </form>
                  <div id="pendingInvitations" style="margin-top: 24px; display: none;"></div>
                </div>
              </div>`
            : ''
          }

          <!-- AI Chat Floating Bubble (Loaded Dynamically) -->
          <div data-ai-chat-container></div>
        `;

        // Reinitialize Lucide icons for the new content
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // If coach has a team, set up invitation form
        if (isCoach && currentTeam) {
          setupInvitationForm();
        }
      }

      async function loadUserTeam() {
        const supabase = getSupabase();
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
          showEmptyState();
          return;
        }

        // Check if user is a coach with a team
        const { data: teams, error: teamsError } = await supabase
          .from('teams')
          .select('*')
          .eq('coach_id', user.id)
          .limit(1);

        if (teamsError) {
          console.error('Error loading team:', teamsError);
          showEmptyState();
          return;
        }

        if (teams && teams.length > 0) {
          currentTeam = teams[0];
          console.log('✅ Coach has team:', currentTeam);
          showEmptyState(); // Will show invitation form since currentTeam is set
          return;
        }

        // Check if user is a team member
        const { data: memberships, error: memberError } = await supabase
          .from('team_members')
          .select('team_id, teams(*)')
          .eq('user_id', user.id)
          .eq('status', 'active')
          .limit(1);

        if (memberError) {
          console.error('Error loading team membership:', memberError);
          showEmptyState();
          return;
        }

        if (memberships && memberships.length > 0) {
          currentTeam = memberships[0].teams;
          console.log('✅ User is team member:', currentTeam);
          await loadTeamRoster();
          return;
        }

        // No team found
        showEmptyState();
      }

      async function loadTeamRoster() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent || !currentTeam) return;

        // Update team header
        const teamHeader = document.querySelector('.card.card-elevated .card-body');
        if (teamHeader) {
          teamHeader.textContent = '';
          
          const metaDiv = createElement('div', 'u-text-body-sm u-text-secondary u-margin-bottom-4', '');
          metaDiv.style.cssText = 'line-height: 1.4; font-weight: 500';
          
          const leagueSpan = createElement('span', '', currentTeam.league || 'Flag Football');
          const dotSpan = createElement('span', '', '•');
          dotSpan.style.cssText = 'margin: 0 var(--space-1, 4px); opacity: 0.5';
          const seasonSpan = createElement('span', '', currentTeam.season || 'Season');
          
          metaDiv.appendChild(leagueSpan);
          metaDiv.appendChild(dotSpan);
          metaDiv.appendChild(seasonSpan);
          
          const h2 = createElement('h2', 'u-text-heading-lg u-font-weight-700 u-text-primary u-margin-bottom-8', currentTeam.name);
          
          const p = createElement('p', 'text-body-md text-secondary leading-relaxed', currentTeam.description || 'Team roster and member information');
          
          teamHeader.appendChild(metaDiv);
          teamHeader.appendChild(h2);
          teamHeader.appendChild(p);
        }

        // Show loading state
        const controlsCard = document.getElementById('roster-controls');
        const playersContainer = document.getElementById('players-by-position');
        const coachingSection = document.getElementById('coaching-section');
        const tableView = document.getElementById('roster-table-view');
        
        if (playersContainer) {
          playersContainer.textContent = '';
          const loadingDiv = createElement('div', '', '');
          loadingDiv.style.cssText = 'text-align: center; padding: 60px 40px; color: var(--text-secondary);';
          
          const icon = createElement('i', 'icon-32', '');
          icon.setAttribute('data-lucide', 'loader');
          icon.style.cssText = 'animation: spin 1s linear infinite; opacity: 0.5;';
          
          const p = createElement('p', '', 'Loading team roster...');
          p.style.cssText = 'margin-top: 16px; font-size: 1rem;';
          
          loadingDiv.appendChild(icon);
          loadingDiv.appendChild(p);
          playersContainer.appendChild(loadingDiv);
          
          if (typeof lucide !== 'undefined') lucide.createIcons(loadingDiv);
        }

        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // Load team members
        const supabase = getSupabase();
        const { data: members, error } = await supabase
          .from('team_members')
          .select(`
            id,
            role,
            position,
            jersey_number,
            status,
            users:user_id (
              id,
              email,
              raw_user_meta_data
            )
          `)
          .eq('team_id', currentTeam.id)
          .eq('status', 'active');

        if (error) {
          console.error('Error loading team members:', error);
          if (playersContainer) {
            playersContainer.textContent = '';
            const errorDiv = createElement('div', '', '');
            errorDiv.style.cssText = 'text-align: center; padding: 40px; color: var(--text-error);';
            
            const icon = createElement('i', 'icon-48', '');
            icon.setAttribute('data-lucide', 'alert-circle');
            
            const p = createElement('p', '', 'Error loading roster. Please try again.');
            p.style.cssText = 'margin-top: 16px;';
            
            errorDiv.appendChild(icon);
            errorDiv.appendChild(p);
            playersContainer.appendChild(errorDiv);
            
            if (typeof lucide !== 'undefined') lucide.createIcons(errorDiv);
          }
          return;
        }

        if (!members || members.length === 0) {
          if (playersContainer) {
            playersContainer.textContent = '';
            const emptyDiv = createElement('div', '', '');
            emptyDiv.style.cssText = 'text-align: center; padding: 60px 40px; color: var(--text-secondary);';
            
            const icon = createElement('i', 'icon-64', '');
            icon.setAttribute('data-lucide', 'users');
            icon.style.opacity = '0.3';
            
            const h3 = createElement('h3', '', 'No team members yet');
            h3.style.cssText = 'margin-top: 24px; color: var(--text-primary); font-size: 1.25rem;';
            
            const p = createElement('p', '', 'Start building your roster by inviting players.');
            p.style.cssText = 'margin-top: 8px;';
            
            emptyDiv.appendChild(icon);
            emptyDiv.appendChild(h3);
            emptyDiv.appendChild(p);
            playersContainer.appendChild(emptyDiv);
            
            if (typeof lucide !== 'undefined') lucide.createIcons(emptyDiv);
          }
          return;
        }

        // Store all members
        allMembers = members.map(member => ({
          ...member,
          name: member.users?.raw_user_meta_data?.name || member.users?.email?.split('@')[0] || 'Unknown',
          email: member.users?.email || '',
          displayName: member.users?.raw_user_meta_data?.name || member.users?.email || 'Unknown'
        }));

        // Initialize filters

          'DB': 'Defensive Backs',

      function populatePositionFilter() {
        const positionFilter = document.getElementById('position-filter');
        if (!positionFilter) return;

        // Get unique positions from players
        const players = allMembers.filter(m => m.role === 'player');
        const positions = [...new Set(players.map(p => p.position).filter(Boolean))].sort();
        
        const positionMap = {
          'QB': 'Quarterback',
          'WR': 'Wide Receiver',
          'RB': 'Running Back',
          'C': 'Center',
          'DB': 'Defensive Back',
          'LB': 'Linebacker'
        };

        // Keep "All Positions" option, then add available positions
        positionFilter.textContent = '';
        const allOption = createElement('option', '', 'All Positions');
        allOption.value = 'all';
        positionFilter.appendChild(allOption);
        
        positions.forEach(pos => {
          const option = document.createElement('option');
          option.value = pos;
          option.textContent = positionMap[pos] || pos;
          positionFilter.appendChild(option);
        });

      function setupRosterControls() {
        const searchInput = document.getElementById('roster-search');
        const positionFilterEl = document.getElementById('position-filter');
        const viewGridBtn = document.getElementById('view-grid');
        const viewTableBtn = document.getElementById('view-table');
        const playersContainer = document.getElementById('players-by-position');
        const tableView = document.getElementById('roster-table-view');

        // Search functionality
        if (searchInput) {
          const debouncedSearch = debounce(() => {
            searchQuery = searchInput.value.toLowerCase().trim();
            applyFilters();
          }, 300);
          
          searchInput.addEventListener('input', debouncedSearch);
        }

        // Position filter
        if (positionFilterEl) {
          positionFilterEl.addEventListener('change', (e) => {
            window.positionFilter = e.target.value;
            applyFilters();
          });
        }

        // View toggle
        if (viewGridBtn && viewTableBtn) {
          viewGridBtn.addEventListener('click', () => {
            viewMode = 'grid';
            viewGridBtn.classList.add('active');
            viewTableBtn.classList.remove('active');
            viewGridBtn.style.background = 'var(--color-brand-primary)';
            viewGridBtn.style.color = 'white';
            viewTableBtn.style.background = 'transparent';
            viewTableBtn.style.color = 'var(--text-secondary)';
            
            if (tableView) tableView.style.display = 'none';
            if (playersContainer) playersContainer.style.display = 'block';
            const coachingSection = document.getElementById('coaching-section');
            if (coachingSection) coachingSection.style.display = 'block';
          });

          viewTableBtn.addEventListener('click', () => {
            viewMode = 'table';
            viewTableBtn.classList.add('active');
            viewGridBtn.classList.remove('active');
            viewTableBtn.style.background = 'var(--color-brand-primary)';
            viewTableBtn.style.color = 'white';
            viewGridBtn.style.background = 'transparent';
            viewGridBtn.style.color = 'var(--text-secondary)';
            
            renderTableView();
          });

          // Set initial active state
          viewGridBtn.style.background = 'var(--color-brand-primary)';
          viewGridBtn.style.color = 'white';
        }
      }

      function applyFilters() {
        filteredMembers = allMembers.filter(member => {
          // Search filter
          if (searchQuery) {
            const searchLower = searchQuery.toLowerCase();
            const matchesSearch = 
              member.displayName.toLowerCase().includes(searchLower) ||
              member.email.toLowerCase().includes(searchLower) ||
              (member.position && member.position.toLowerCase().includes(searchLower));
            
            if (!matchesSearch) return false;
          }

          // Position filter
          if (window.positionFilter && window.positionFilter !== 'all') {
            if (member.position !== window.positionFilter) return false;
          }

          return true;
        });

        renderRoster();
      }

      function setupInvitationForm() {
        const inviteCard = document.getElementById('inviteCard');
        const inviteForm = document.getElementById('inviteForm');

        if (!inviteCard || !inviteForm) return;

        // Show the invitation card
        inviteCard.style.display = 'block';

        // Set up form submit handler
        inviteForm.addEventListener('submit', handleInviteSubmit);

        // Load pending invitations
        loadPendingInvitations();

        // Reinitialize icons

          lucide.createIcons();
        }

      async function handleInviteSubmit(e) {
        e.preventDefault();

        const email = document.getElementById('inviteEmail').value.trim();
        const role = document.getElementById('inviteRole').value;
        const position = document.getElementById('invitePosition').value.trim();
        const message = document.getElementById('inviteMessage').value.trim();
        const sendBtn = document.getElementById('sendInviteBtn');

        if (!email) {
          showMessage('Please enter an email address', 'error');
          return;
        }

        if (!currentTeam) {
          showMessage('No team found. Please create a team first.', 'error');
          return;
        }

        try {
          // Disable button and show loading
          sendBtn.disabled = true;
          setButtonLoading(sendBtn, 'Sending...');

          const supabase = getSupabase();
          const { data: { session } } = await supabase.auth.getSession();

          if (!session) {
            throw new Error('Not authenticated');
          }

          const response = await fetch('/.netlify/functions/team-invite', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({
              teamId: currentTeam.id,
              email: email,
              role: role,
              position: position || null,
              jerseyNumber: null,
              coachMessage: message || null
            })
          });

          const data = await response.json();

          if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to send invitation');
          }

          showMessage('✅ Invitation sent successfully!', 'success');

          // Reset form
          document.getElementById('inviteForm').reset();

          // Reload pending invitations
          loadPendingInvitations();

        } catch (error) {
          console.error('Error sending invitation:', error);
          showMessage(error.message || 'Failed to send invitation. Please try again.', 'error');
        } finally {
          // Re-enable button
          restoreButton(sendBtn, '<i data-lucide="send" class="icon-18" style="margin-right: 8px;"></i> Send Invitation');
        }
      }

      async function loadPendingInvitations() {
        if (!currentTeam) return;

        const container = document.getElementById('pendingInvitations');
        if (!container) return;

        try {
          const supabase = getSupabase();
          const { data: invitations, error } = await supabase
            .from('team_invitations')
            .select('*')
            .eq('team_id', currentTeam.id)
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

          if (error) {
            console.error('Error loading invitations:', error);
            return;
          }

          if (!invitations || invitations.length === 0) {
            container.style.display = 'none';
            return;
          }

          container.style.display = 'block';
          container.textContent = '';
          
          const wrapper = createElement('div', '', '');
          wrapper.style.cssText = 'border-top: 1px solid var(--color-border-secondary); padding-top: 24px;';
          
          const h4 = createElement('h4', '', '');
          h4.style.cssText = 'margin: 0 0 16px 0; font-weight: 600; color: var(--text-primary);';
          const icon = createElement('i', 'icon-18', '');
          icon.setAttribute('data-lucide', 'clock');
          icon.style.cssText = 'margin-right: 8px; vertical-align: middle;';
          const text = document.createTextNode(` Pending Invitations (${invitations.length})`);
          h4.appendChild(icon);
          h4.appendChild(text);
          
          const grid = createElement('div', '', '');
          grid.style.cssText = 'display: grid; gap: 12px;';
          
          invitations.forEach(inv => {
            const expiresAt = new Date(inv.expires_at);
            const daysLeft = Math.ceil((expiresAt - new Date()) / (1000 * 60 * 60 * 24));
            
            const item = createElement('div', '', '');
            item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-secondary); border-radius: 6px;';
            
            const left = createElement('div', '', '');
            const email = createElement('div', '', inv.email);
            email.style.cssText = 'font-weight: 500; color: var(--text-primary);';
            const role = createElement('div', '', '');
            role.style.cssText = 'font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;';
            const roleText = inv.role === 'assistant_coach' ? 'Assistant Coach' : 'Player';
            role.textContent = inv.position ? `${roleText} • ${inv.position}` : roleText;
            
            left.appendChild(email);
            left.appendChild(role);
            
            const right = createElement('div', '', '');
            right.style.cssText = 'text-align: right; font-size: 0.85rem; color: var(--text-secondary);';
            right.textContent = daysLeft > 0 ? `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left` : 'Expired';
            
            item.appendChild(left);
            item.appendChild(right);
            grid.appendChild(item);
          });
          
          wrapper.appendChild(h4);
          wrapper.appendChild(grid);
          container.appendChild(wrapper);
          
          if (typeof lucide !== 'undefined') lucide.createIcons(container);

          if (typeof lucide !== 'undefined') {
            lucide.createIcons();
          }

        } catch (error) {
          console.error('Error loading pending invitations:', error);
        }
      }

      function showMessage(message, type = 'info') {
        // Create or update message element
        let messageEl = document.getElementById('inviteMessage');

        if (!messageEl) {
          messageEl = document.createElement('div');
          messageEl.id = 'inviteMessage';
          messageEl.style.cssText = 'margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-weight: 500;';
          const form = document.getElementById('inviteForm');
          if (form && form.parentNode) {
            form.parentNode.insertBefore(messageEl, form.nextSibling);
          }
        }

        // Set message content and style
        messageEl.textContent = message;

        if (type === 'success') {
          messageEl.style.background = '#d4edda';
          messageEl.style.color = '#155724';
          messageEl.style.border = '1px solid #c3e6cb';
        } else if (type === 'error') {
          messageEl.style.background = '#f8d7da';
          messageEl.style.color = '#721c24';
          messageEl.style.border = '1px solid #f5c6cb';
        } else {
          messageEl.style.background = '#d1ecf1';
          messageEl.style.color = '#0c5460';
          messageEl.style.border = '1px solid #bee5eb';
        }

        messageEl.style.display = 'block';

        // Auto-hide after 5 seconds
        setTimeout(() => {
          if (messageEl) {
            messageEl.style.display = 'none';
          }
        }, 5000);
      }

                    <div class="card-body">
                        <div class="player-header u-display-flex u-align-center u-gap-16 u-margin-bottom-16">
                            <div class="player-jersey u-radius-full u-display-flex u-align-center u-justify-center u-font-weight-700 u-text-body-lg" style="width: 56px; height: 56px; background: var(--gradient-primary); color: white;">
                                ${member.name
                                  .split(" ")
                                  .map((n) => n[0])
                                  .join("")}
                            </div>
                            <div class="player-info u-flex-1">
                                <h3 class="u-text-heading-md u-font-weight-600 u-text-primary u-margin-0">
                                    ${member.name}
                                </h3>
                                <div class="player-position u-text-body-sm u-text-secondary u-margin-top-4">${member.position}</div>
                                <div class="u-text-body-sm u-text-secondary u-margin-top-2">${member.experience} experience</div>
                            </div>
                        </div>
                        
                        <div class="stats-grid u-display-grid u-gap-12 u-margin-top-16" style="grid-template-columns: 1fr 1fr;">
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${member.experience.split(" ")[0]}</div>
                                <div class="stat-label u-text-caption u-text-secondary">Years</div>
                            </div>
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${member.country}</div>
                                <div class="stat-label u-text-caption u-text-secondary">Country</div>
                            </div>
                        </div>
                        
                        ${
                          member.achievements && member.achievements.length > 0
                            ? `
                            <div class="u-margin-top-16 u-padding-top-16" style="border-top: 1px solid var(--color-border-secondary);">
                                <div class="u-text-caption u-text-secondary u-margin-bottom-8 u-font-weight-500">Key Achievements:</div>
                                ${member.achievements
                                  .slice(0, 2)
                                  .map(
                                    (achievement) =>
                                      `<div class="u-text-caption u-text-primary u-margin-bottom-4">• ${achievement}</div>`,
                                  )
                                  .join("")}
                            </div>
                        `
                            : ""
                        }
                    </div>
                </div>
            `,
          )
          .join("");
        console.log(
          '<i data-lucide="check-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Coaching staff loaded',
        );
      }

      function loadPlayersByPosition() {
        console.log(
          '<i data-lucide="activity" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Loading players by position...',
        );
        const container = document.getElementById("players-by-position");

        if (!container) {
          console.error(
            '<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Players container not found',
          );
          return;
        }

        const positions = [
          {
            key: "quarterback",
            title: "Quarterbacks",
            icon: '<i data-lucide="target" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>',
          },
          {
            key: "center",
            title: "Centers",
            icon: '<i data-lucide="zap" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>',
          },
          { key: "wideReceivers", title: "Wide Receivers", icon: "🏃‍♂️" },
          { key: "defensive", title: "Defensive Players", icon: "🛡️" },
        ];

        let html = "";
        let totalPlayersLoaded = 0;

        positions.forEach((position) => {
          const players = REAL_TEAM_DATA.players[position.key];
          console.log(
            `<i data-lucide="clipboard-list" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> ${position.title}:`,
            players,
          );

          if (players && players.length > 0) {
            totalPlayersLoaded += players.length;
            html += `
                        <div class="position-section">
                            <h2 class="u-text-heading-xl u-font-weight-700 u-text-primary u-display-flex u-align-center u-gap-8">
                                ${position.icon}
                                ${position.title} (${players.length})
                            </h2>
                            <div class="roster-grid u-display-grid" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
                                ${players.map((player) => createPlayerCard(player)).join("")}
                            </div>
                        </div>
                    `;
          } else {
            console.warn(`⚠️ No players found for position: ${position.title}`);
          }
        });

        if (html === "") {
          html =
            '<div style="text-align: center; padding: 2rem; color: var(--dark-text-muted);">No player data available</div>';
          console.error(
            '<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> No players loaded',
          );
        } else {
          console.log(
            `<i data-lucide="check-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> ${totalPlayersLoaded} players loaded across ${positions.length} positions`,
          );
        }

        container.innerHTML = html;
      }

      function createPlayerCard(player) {
        const primaryStat = getPlayerPrimaryStat(player);
        const secondaryStat = getPlayerSecondaryStat(player);

        return `
                <div class="card card-interactive u-position-relative">
                    ${player.isPrimary ? `<div class="card-accent-bar"></div>` : ""}
                    <div class="card-body">
                        <div class="player-header u-display-flex u-align-center u-gap-16 u-margin-bottom-16">
                            <div class="player-jersey u-radius-full u-display-flex u-align-center u-justify-center u-font-weight-700 u-text-body-lg" style="width: 56px; height: 56px; background: var(--gradient-primary); color: white;">
                                ${player.jersey}
                            </div>
                            <div class="player-info u-flex-1">
                                <h3 class="u-text-heading-md u-font-weight-600 u-text-primary u-margin-0">${player.name}</h3>
                                <div class="player-position u-text-body-sm u-text-secondary u-margin-top-4">${player.position}</div>
                                <div class="player-nationality u-text-body-sm u-text-secondary u-margin-top-2">${player.country} ${player.nationality}</div>
                            </div>
                            ${
                              player.isPrimary
                                ? `
                                <div class="u-padding-y-2 u-padding-x-6 u-radius-sm u-text-caption u-font-weight-700" style="background: var(--color-brand-primary); color: white;">
                                    STARTER
                                </div>
                            `
                                : ""
                            }
                        </div>
                        
                        <div class="stats-grid u-display-grid u-gap-12 u-margin-top-16" style="grid-template-columns: 1fr 1fr;">
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${primaryStat.value}</div>
                                <div class="stat-label u-text-caption u-text-secondary" style="text-transform: uppercase; letter-spacing: 0.05em;">${primaryStat.label}</div>
                            </div>
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${secondaryStat.value}</div>
                                <div class="stat-label u-text-caption u-text-secondary" style="text-transform: uppercase; letter-spacing: 0.05em;">${secondaryStat.label}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
      }

      function getPlayerPrimaryStat(player) {
        const stats = player.stats;

        if (stats.completionPercentage) {
          return {
            value: `${stats.completionPercentage}%`,
            label: "Completion",
          };
        } else if (stats.receptions) {
          return { value: stats.receptions, label: "Receptions" };
        } else if (stats.interceptions) {
          return { value: stats.interceptions, label: "Interceptions" };
        } else if (stats.snapAccuracy) {
          return { value: `${stats.snapAccuracy}%`, label: "Snap Accuracy" };
        } else if (stats.sacks) {
          return { value: stats.sacks, label: "Sacks" };
        }

        return { value: "—", label: "Primary Stat" };
      }

      function getPlayerSecondaryStat(player) {
        const stats = player.stats;

        if (stats.touchdownPasses) {
          return { value: stats.touchdownPasses, label: "TD Passes" };
        } else if (stats.receivingYards) {
          return { value: stats.receivingYards, label: "Rec Yards" };
        } else if (stats.tackles) {
          return { value: stats.tackles, label: "Tackles" };
        } else if (stats.protectionRating) {
          return { value: stats.protectionRating, label: "Protection" };
        } else if (stats.touchdowns) {
          return { value: stats.touchdowns, label: "Touchdowns" };
        }

        return { value: "—", label: "Secondary Stat" };
      }

      // Sidebar toggle functionality for mobile menu
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebar-overlay");
        const toggleBtn = document.getElementById("mobile-menu-toggle");

        if (!sidebar) return;

        const isOpen =
          sidebar.classList.contains("open") ||
          sidebar.classList.contains("mobile-open");

        if (isOpen) {
          sidebar.classList.remove("open", "mobile-open");
          if (overlay) overlay.classList.remove("active");
          document.body.classList.remove("sidebar-open", "menu-open");
          if (toggleBtn) {
            toggleBtn.setAttribute("aria-expanded", "false");
          }
          // Return focus to toggle button
          if (toggleBtn) toggleBtn.focus();
        } else {
          sidebar.classList.add("open", "mobile-open");
          if (overlay) overlay.classList.add("active");
          document.body.classList.add("sidebar-open", "menu-open");
          if (toggleBtn) {
            toggleBtn.setAttribute("aria-expanded", "true");
          }
          // Focus first nav item for accessibility
          const firstNavItem = sidebar.querySelector(".nav-item");
          if (firstNavItem) firstNavItem.focus();
        }
      }

      // Alias for menu-scrim close functionality
      function closeMenu() {
        toggleSidebar();
      }

      // Make functions globally available for onclick handlers
      window.toggleSidebar = toggleSidebar;
      window.closeMenu = closeMenu;

    </script>

        <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
</html>
