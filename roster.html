    <script type="module">
      import { authManager } from "./src/auth-manager.js";
      import { storageService } from "./src/js/services/storage-service-unified.js";
      import { getSupabase } from "./src/js/services/supabase-client.js";

      // Mock data disabled - will be replaced with real team data from Supabase
      // import { REAL_TEAM_DATA } from "./src/real-team-data.js";

      let currentTeam = null;

      // Initialize roster page
      document.addEventListener("DOMContentLoaded", async function () {
        console.log(
          '<i data-lucide="activity" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Team Roster page loading...',
        );

        // Wait for auth manager to initialize
        await authManager.waitForInit();

        // Check authentication - allow demo access in development
        const isDevelopment =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        const isAuthenticated = authManager.isAuthenticated();

        if (!isAuthenticated && !isDevelopment) {
          console.log(
            '<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> User not authenticated, redirecting to login',
          );
          window.location.href = "/login.html";
          return;
        }

        if (!isAuthenticated && isDevelopment) {
          console.log(
            '<i data-lucide="info" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Development mode: Loading roster without authentication',
          );
        }

        console.log('✅ User authenticated, loading roster');

        try {
          // Try to load user's team
          await loadUserTeam();
        } catch (error) {
          console.error('❌ Error loading roster:', error);
          showEmptyState();
        }
      });

      function showEmptyState() {
        // Get user role to show appropriate empty state
        const user = storageService.get("userData", {}, { usePrefix: false });
        const userRole = user?.role || 'player';
        const isCoach = userRole === 'coach';

        // Update team header
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;

        mainContent.innerHTML = `
          <div class="card card-elevated" style="text-align: center; padding: 60px 40px;">
            <div style="font-size: 4rem; margin-bottom: 24px;">🏈</div>
            <h2 class="u-text-heading-xl u-font-weight-700 u-text-primary u-margin-bottom-16">
              ${isCoach ? 'Create Your Team' : 'No Team Yet'}
            </h2>
            <p class="u-text-body-lg u-text-secondary u-margin-bottom-32" style="max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6;">
              ${isCoach
                ? 'Get started by creating your team and inviting players via email. Build your roster and start training together!'
                : 'You haven\'t been added to a team yet. Ask your coach to send you an invitation to join their team.'}
            </p>
            ${isCoach
              ? `<button
                  class="btn btn-primary"
                  style="padding: 16px 32px; font-size: 1.1rem; font-weight: 600;"
                  onclick="window.location.href='/team-create.html'"
                >
                  <i data-lucide="plus" class="icon-20" style="margin-right: 8px;"></i>
                  Create Team
                </button>`
              : `<div class="u-text-body-md u-text-secondary" style="background: var(--surface-secondary); padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto;">
                  <i data-lucide="info" class="icon-18" style="margin-right: 8px; vertical-align: middle;"></i>
                  <strong>Note:</strong> Only coaches can create teams and invite players
                </div>`
            }
          </div>

          ${isCoach
            ? `<div class="card" style="margin-top: 24px;">
                <div class="card-header">
                  <h3 class="card-title u-margin-0">How It Works</h3>
                </div>
                <div class="card-body">
                  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">1</div>
                      <div>
                        <h4 style="margin: 0 0 8px 0; font-weight: 600;">Create Your Team</h4>
                        <p style="margin: 0; color: var(--text-secondary); font-size: 0.95rem;">Set up your team name, league, and basic information</p>
                      </div>
                    </div>
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">2</div>
                      <div>
                        <h4 style="margin: 0 0 8px 0; font-weight: 600;">Invite Players</h4>
                        <p style="margin: 0; color: var(--text-secondary); font-size: 0.95rem;">Send email invitations to your players to join</p>
                      </div>
                    </div>
                    <div style="display: flex; gap: 16px;">
                      <div style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">3</div>
                      <div>
                        <h4 style="margin: 0 0 8px 0; font-weight: 600;">Start Training</h4>
                        <p style="margin: 0; color: var(--text-secondary); font-size: 0.95rem;">Assign training programs and track progress</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="card" style="margin-top: 24px; display: none;" id="inviteCard">
                <div class="card-header">
                  <h3 class="card-title u-margin-0">
                    <i data-lucide="mail" class="icon-20" style="margin-right: 8px;"></i>
                    Invite Players to Your Team
                  </h3>
                </div>
                <div class="card-body">
                  <form id="inviteForm">
                    <div style="margin-bottom: 16px;">
                      <label style="display: block; font-weight: 600; margin-bottom: 8px;">Player Email</label>
                      <input type="email" id="inviteEmail" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="player@example.com" required />
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                      <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Role</label>
                        <select id="inviteRole" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;">
                          <option value="player">Player</option>
                          <option value="assistant_coach">Assistant Coach</option>
                        </select>
                      </div>
                      <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Position (Optional)</label>
                        <input type="text" id="invitePosition" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="e.g., QB, WR" />
                      </div>
                    </div>
                    <div style="margin-bottom: 16px;">
                      <label style="display: block; font-weight: 600; margin-bottom: 8px;">Personal Message (Optional)</label>
                      <textarea id="inviteMessage" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" placeholder="Welcome to the team!" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="sendInviteBtn" style="width: 100%;">
                      <i data-lucide="send" class="icon-18" style="margin-right: 8px;"></i>
                      Send Invitation
                    </button>
                  </form>
                  <div id="pendingInvitations" style="margin-top: 24px; display: none;"></div>
                </div>
              </div>`
            : ''
          }

          <!-- AI Chat Floating Bubble (Loaded Dynamically) -->
          <div data-ai-chat-container></div>
        `;

        // Reinitialize Lucide icons for the new content
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // If coach has a team, set up invitation form
        if (isCoach && currentTeam) {
          setupInvitationForm();
        }
      }

      async function loadUserTeam() {
        const supabase = getSupabase();
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
          showEmptyState();
          return;
        }

        // Check if user is a coach with a team
        const { data: teams, error: teamsError } = await supabase
          .from('teams')
          .select('*')
          .eq('coach_id', user.id)
          .limit(1);

        if (teamsError) {
          console.error('Error loading team:', teamsError);
          showEmptyState();
          return;
        }

        if (teams && teams.length > 0) {
          currentTeam = teams[0];
          console.log('✅ Coach has team:', currentTeam);
          showEmptyState(); // Will show invitation form since currentTeam is set
          return;
        }

        // Check if user is a team member
        const { data: memberships, error: memberError } = await supabase
          .from('team_members')
          .select('team_id, teams(*)')
          .eq('user_id', user.id)
          .eq('status', 'active')
          .limit(1);

        if (memberError) {
          console.error('Error loading team membership:', memberError);
          showEmptyState();
          return;
        }

        if (memberships && memberships.length > 0) {
          currentTeam = memberships[0].teams;
          console.log('✅ User is team member:', currentTeam);
          await loadTeamRoster();
          return;
        }

        // No team found
        showEmptyState();
      }

      async function loadTeamRoster() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent || !currentTeam) return;

        mainContent.innerHTML = `
          <div class="card card-elevated">
            <div class="card-body">
              <div class="u-text-body-sm u-text-secondary u-margin-bottom-4" style="line-height: 1.4; font-weight: 500">
                <span>${currentTeam.league || 'Flag Football'}</span>
                <span style="margin: 0 var(--space-1, 4px); opacity: 0.5">•</span>
                <span>${currentTeam.season || 'Season'}</span>
              </div>
              <h2 class="u-text-heading-lg u-font-weight-700 u-text-primary u-margin-bottom-8">
                ${currentTeam.name}
              </h2>
              <p class="u-text-body-md u-text-secondary u-margin-0" style="line-height: 1.6">
                ${currentTeam.description || 'Team roster and member information'}
              </p>
            </div>
          </div>

          <div class="card" style="margin-top: 24px;">
            <div class="card-header">
              <h3 class="card-title u-margin-0">
                <i data-lucide="users" class="icon-20" style="margin-right: 8px;"></i>
                Team Members
              </h3>
            </div>
            <div class="card-body" id="teamMembersContainer">
              <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                <i data-lucide="loader" class="icon-24" style="animation: spin 1s linear infinite;"></i>
                <p style="margin-top: 16px;">Loading team members...</p>
              </div>
            </div>
          </div>

          <!-- AI Chat Floating Bubble (Loaded Dynamically) -->
          <div data-ai-chat-container></div>
        `;

        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // Load team members
        const supabase = getSupabase();
        const { data: members, error } = await supabase
          .from('team_members')
          .select(`
            id,
            role,
            position,
            jersey_number,
            status,
            users:user_id (
              id,
              email,
              raw_user_meta_data
            )
          `)
          .eq('team_id', currentTeam.id)
          .eq('status', 'active');

        const container = document.getElementById('teamMembersContainer');
        if (!container) return;

        if (error || !members || members.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
              <i data-lucide="users" class="icon-48" style="opacity: 0.3;"></i>
              <p style="margin-top: 16px;">No team members yet</p>
            </div>
          `;
          if (typeof lucide !== 'undefined') lucide.createIcons();
          return;
        }

        container.innerHTML = `
          <div style="display: grid; gap: 16px;">
            ${members.map(member => `
              <div style="display: flex; align-items: center; padding: 16px; background: var(--surface-secondary); border-radius: 8px;">
                <div style="flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.2rem;">
                  ${member.jersey_number || '?'}
                </div>
                <div style="flex: 1; margin-left: 16px;">
                  <div style="font-weight: 600; color: var(--text-primary);">${member.users?.raw_user_meta_data?.name || member.users?.email || 'Unknown'}</div>
                  <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 4px;">
                    ${member.position || member.role === 'assistant_coach' ? 'Assistant Coach' : 'Player'}
                    ${member.position ? ` • ${member.position}` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;

        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      }

      function setupInvitationForm() {
        const inviteCard = document.getElementById('inviteCard');
        const inviteForm = document.getElementById('inviteForm');

        if (!inviteCard || !inviteForm) return;

        // Show the invitation card
        inviteCard.style.display = 'block';

        // Set up form submit handler
        inviteForm.addEventListener('submit', handleInviteSubmit);

        // Load pending invitations
        loadPendingInvitations();

        // Reinitialize icons
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      }

      async function handleInviteSubmit(e) {
        e.preventDefault();

        const email = document.getElementById('inviteEmail').value.trim();
        const role = document.getElementById('inviteRole').value;
        const position = document.getElementById('invitePosition').value.trim();
        const message = document.getElementById('inviteMessage').value.trim();
        const sendBtn = document.getElementById('sendInviteBtn');

        if (!email) {
          showMessage('Please enter an email address', 'error');
          return;
        }

        if (!currentTeam) {
          showMessage('No team found. Please create a team first.', 'error');
          return;
        }

        try {
          // Disable button and show loading
          sendBtn.disabled = true;
          sendBtn.innerHTML = '<span style="display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px;"></span> Sending...';

          const supabase = getSupabase();
          const { data: { session } } = await supabase.auth.getSession();

          if (!session) {
            throw new Error('Not authenticated');
          }

          const response = await fetch('/.netlify/functions/team-invite', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({
              teamId: currentTeam.id,
              email: email,
              role: role,
              position: position || null,
              jerseyNumber: null,
              coachMessage: message || null
            })
          });

          const data = await response.json();

          if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to send invitation');
          }

          showMessage('✅ Invitation sent successfully!', 'success');

          // Reset form
          document.getElementById('inviteForm').reset();

          // Reload pending invitations
          loadPendingInvitations();

        } catch (error) {
          console.error('Error sending invitation:', error);
          showMessage(error.message || 'Failed to send invitation. Please try again.', 'error');
        } finally {
          // Re-enable button
          sendBtn.disabled = false;
          sendBtn.innerHTML = '<i data-lucide="send" class="icon-18" style="margin-right: 8px;"></i> Send Invitation';
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }
      }

      async function loadPendingInvitations() {
        if (!currentTeam) return;

        const container = document.getElementById('pendingInvitations');
        if (!container) return;

        try {
          const supabase = getSupabase();
          const { data: invitations, error } = await supabase
            .from('team_invitations')
            .select('*')
            .eq('team_id', currentTeam.id)
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

          if (error) {
            console.error('Error loading invitations:', error);
            return;
          }

          if (!invitations || invitations.length === 0) {
            container.style.display = 'none';
            return;
          }

          container.style.display = 'block';
          container.innerHTML = `
            <div style="border-top: 1px solid var(--color-border-secondary); padding-top: 24px;">
              <h4 style="margin: 0 0 16px 0; font-weight: 600; color: var(--text-primary);">
                <i data-lucide="clock" class="icon-18" style="margin-right: 8px; vertical-align: middle;"></i>
                Pending Invitations (${invitations.length})
              </h4>
              <div style="display: grid; gap: 12px;">
                ${invitations.map(inv => {
                  const expiresAt = new Date(inv.expires_at);
                  const daysLeft = Math.ceil((expiresAt - new Date()) / (1000 * 60 * 60 * 24));
                  return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-secondary); border-radius: 6px;">
                      <div>
                        <div style="font-weight: 500; color: var(--text-primary);">${inv.email}</div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">
                          ${inv.role === 'assistant_coach' ? 'Assistant Coach' : 'Player'}
                          ${inv.position ? ` • ${inv.position}` : ''}
                        </div>
                      </div>
                      <div style="text-align: right; font-size: 0.85rem; color: var(--text-secondary);">
                        ${daysLeft > 0 ? `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left` : 'Expired'}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;

          if (typeof lucide !== 'undefined') {
            lucide.createIcons();
          }

        } catch (error) {
          console.error('Error loading pending invitations:', error);
        }
      }

      function showMessage(message, type = 'info') {
        // Create or update message element
        let messageEl = document.getElementById('inviteMessage');

        if (!messageEl) {
          messageEl = document.createElement('div');
          messageEl.id = 'inviteMessage';
          messageEl.style.cssText = 'margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-weight: 500;';
          const form = document.getElementById('inviteForm');
          if (form && form.parentNode) {
            form.parentNode.insertBefore(messageEl, form.nextSibling);
          }
        }

        // Set message content and style
        messageEl.textContent = message;

        if (type === 'success') {
          messageEl.style.background = '#d4edda';
          messageEl.style.color = '#155724';
          messageEl.style.border = '1px solid #c3e6cb';
        } else if (type === 'error') {
          messageEl.style.background = '#f8d7da';
          messageEl.style.color = '#721c24';
          messageEl.style.border = '1px solid #f5c6cb';
        } else {
          messageEl.style.background = '#d1ecf1';
          messageEl.style.color = '#0c5460';
          messageEl.style.border = '1px solid #bee5eb';
        }

        messageEl.style.display = 'block';

        // Auto-hide after 5 seconds
        setTimeout(() => {
          if (messageEl) {
            messageEl.style.display = 'none';
          }
        }, 5000);
      }

      function loadPlayersByPosition() {

            '<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Players container not found',

      function createPlayerCard(player) {
        const primaryStat = getPlayerPrimaryStat(player);
        const secondaryStat = getPlayerSecondaryStat(player);

        return `
                <div class="card card-interactive u-position-relative">
                    ${player.isPrimary ? `<div class="card-accent-bar"></div>` : ""}
                    <div class="card-body">
                        <div class="player-header u-display-flex u-align-center u-gap-16 u-margin-bottom-16">
                            <div class="player-jersey u-radius-full u-display-flex u-align-center u-justify-center u-font-weight-700 u-text-body-lg" style="width: 56px; height: 56px; background: var(--gradient-primary); color: white;">
                                ${player.jersey}
                            </div>
                            <div class="player-info u-flex-1">
                                <h3 class="u-text-heading-md u-font-weight-600 u-text-primary u-margin-0">${player.name}</h3>
                                <div class="player-position u-text-body-sm u-text-secondary u-margin-top-4">${player.position}</div>
                                <div class="player-nationality u-text-body-sm u-text-secondary u-margin-top-2">${player.country} ${player.nationality}</div>
                            </div>
                            ${
                              player.isPrimary
                                ? `
                                <div class="u-padding-y-2 u-padding-x-6 u-radius-sm u-text-caption u-font-weight-700" style="background: var(--color-brand-primary); color: white;">
                                    STARTER
                                </div>
                            `
                                : ""
                            }
                        </div>
                        
                        <div class="stats-grid u-display-grid u-gap-12 u-margin-top-16" style="grid-template-columns: 1fr 1fr;">
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${primaryStat.value}</div>
                                <div class="stat-label u-text-caption u-text-secondary" style="text-transform: uppercase; letter-spacing: 0.05em;">${primaryStat.label}</div>
                            </div>
                            <div class="stat-item u-text-center u-padding-12 u-radius-lg" style="background: var(--surface-secondary);">
                                <div class="stat-value u-font-weight-700 u-text-body-lg u-text-brand u-margin-bottom-4">${secondaryStat.value}</div>
                                <div class="stat-label u-text-caption u-text-secondary" style="text-transform: uppercase; letter-spacing: 0.05em;">${secondaryStat.label}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
      }

      function getPlayerPrimaryStat(player) {
        const stats = player.stats;

        if (stats.completionPercentage) {
          return {
            value: `${stats.completionPercentage}%`,
            label: "Completion",
          };
        } else if (stats.receptions) {
          return { value: stats.receptions, label: "Receptions" };
        } else if (stats.interceptions) {
          return { value: stats.interceptions, label: "Interceptions" };
        } else if (stats.snapAccuracy) {
          return { value: `${stats.snapAccuracy}%`, label: "Snap Accuracy" };
        } else if (stats.sacks) {
          return { value: stats.sacks, label: "Sacks" };
        }

        return { value: "—", label: "Primary Stat" };
      }

      function getPlayerSecondaryStat(player) {
        const stats = player.stats;

        if (stats.touchdownPasses) {
          return { value: stats.touchdownPasses, label: "TD Passes" };
        } else if (stats.receivingYards) {
          return { value: stats.receivingYards, label: "Rec Yards" };
        } else if (stats.tackles) {
          return { value: stats.tackles, label: "Tackles" };
        } else if (stats.protectionRating) {
          return { value: stats.protectionRating, label: "Protection" };
        } else if (stats.touchdowns) {
          return { value: stats.touchdowns, label: "Touchdowns" };
        }

        return { value: "—", label: "Secondary Stat" };
      }

      // Sidebar toggle functionality for mobile menu
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebar-overlay");
        const toggleBtn = document.getElementById("mobile-menu-toggle");

        if (!sidebar) return;

        const isOpen =
          sidebar.classList.contains("open") ||
          sidebar.classList.contains("mobile-open");

        if (isOpen) {
          sidebar.classList.remove("open", "mobile-open");
          if (overlay) overlay.classList.remove("active");
          document.body.classList.remove("sidebar-open", "menu-open");
          if (toggleBtn) {
            toggleBtn.setAttribute("aria-expanded", "false");
          }
          // Return focus to toggle button
          if (toggleBtn) toggleBtn.focus();
        } else {
          sidebar.classList.add("open", "mobile-open");
          if (overlay) overlay.classList.add("active");
          document.body.classList.add("sidebar-open", "menu-open");
          if (toggleBtn) {
            toggleBtn.setAttribute("aria-expanded", "true");
          }
          // Focus first nav item for accessibility
          const firstNavItem = sidebar.querySelector(".nav-item");
          if (firstNavItem) firstNavItem.focus();
        }
      }

      // Alias for menu-scrim close functionality
      function closeMenu() {
        toggleSidebar();
      }

      // Make functions globally available for onclick handlers
      window.toggleSidebar = toggleSidebar;
      window.closeMenu = closeMenu;

    </script>
