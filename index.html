<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Redirecting...</title>
    <meta
      http-equiv="refresh"
      content="0; url=./angular/dist/flagfit-pro/browser/index.html"
    />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #089949 0%, #06c956 100%);
        color: white;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid white;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .redirect-note {
        font-size: 14px;
        opacity: 0.8;
      }
      .redirect-link {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <h1>🏈 FlagFit Pro</h1>
      <p>Redirecting to application...</p>
      <p class="redirect-note">
        If you're not redirected,
        <a
          href="./angular/dist/flagfit-pro/browser/index.html"
          class="redirect-link"
          >click here</a
        >
      </p>
    </div>
    <script>
      // Immediate redirect (backup to meta refresh)
      window.location.href = "./angular/dist/flagfit-pro/browser/index.html";
    </script>
  </body>
</html>
