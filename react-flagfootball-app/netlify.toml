[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_APP_ENVIRONMENT = "production"
  VITE_APP_NAME = "FlagFit Pro"
  VITE_APP_VERSION = "1.0.3"
  VITE_POCKETBASE_URL = "https://your-pocketbase-instance.com"
  VITE_ENABLE_ANALYTICS = "false"
  VITE_ENABLE_SENTRY = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true