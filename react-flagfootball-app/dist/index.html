    <!-- Comprehensive Performance API Polyfill for React Scheduler -->
    <script>
      // Initialize performance object with comprehensive timing API support
      (function() {
        // Ensure performance object exists
        if (!window.performance) {
          window.performance = {};
        }

        // Polyfill performance.now() with high precision timing
        if (!window.performance.now) {
          const startTime = Date.now();
          window.performance.now = window.performance.webkitNow || 
            window.performance.mozNow || 
            window.performance.msNow || 
            function() { return Date.now() - startTime; };
        }

        // Polyfill performance.timeOrigin for React scheduler
        if (typeof window.performance.timeOrigin === 'undefined') {
          window.performance.timeOrigin = window.performance.timing ? 
            window.performance.timing.navigationStart : 
            Date.now() - window.performance.now();
        }

        // Polyfill performance.mark() for React profiling
        if (!window.performance.mark) {
          const marks = {};
          window.performance.mark = function(name) {
            marks[name] = window.performance.now();
          };
          window.performance.getEntriesByName = function(name) {
            return marks[name] ? [{ name: name, startTime: marks[name] }] : [];
          };
          window.performance.measure = function(name, startMark, endMark) {
            const start = marks[startMark] || 0;
            const end = marks[endMark] || window.performance.now();
            return { name: name, duration: end - start };
          };
          window.performance.clearMarks = function(name) {
            if (name) delete marks[name];
            else Object.keys(marks).forEach(key => delete marks[key]);
          };
        }

        // Polyfill requestIdleCallback for React scheduler
        if (!window.requestIdleCallback) {
          window.requestIdleCallback = function(callback, options) {
            const timeout = (options && options.timeout) || 50;
            const start = window.performance.now();
            
            return setTimeout(function() {
              callback({
                didTimeout: false,
                timeRemaining: function() {
                  return Math.max(0, timeout - (window.performance.now() - start));
                }
              });
            }, 1);
          };
          
          window.cancelIdleCallback = function(id) {
            clearTimeout(id);
          };
        }

        // Polyfill MessageChannel for React scheduler
        if (!window.MessageChannel) {
          window.MessageChannel = function() {
            const callbacks = [];
            this.port1 = {
              postMessage: function(data) {
                setTimeout(function() {
                  callbacks.forEach(function(callback) {
                    callback({ data: data });
                  });
                }, 0);
              },
              addEventListener: function(type, callback) {
                if (type === 'message') callbacks.push(callback);
              },
              removeEventListener: function(type, callback) {
                const index = callbacks.indexOf(callback);
                if (index > -1) callbacks.splice(index, 1);
              }
            };
            this.port2 = this.port1;
          };
        }

        // Ensure all timing methods are bound to performance object
        ['now', 'mark', 'measure', 'clearMarks', 'getEntriesByName'].forEach(function(method) {
          if (window.performance[method]) {
            window.performance[method] = window.performance[method].bind(window.performance);
          }
        });
      })();
    </script>
