<!DOCTYPE html>
<html>
<head>
    <title>FlagFit Pro Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .preview { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .icon-preview { border: 1px solid #ccc; padding: 10px; text-align: center; }
        canvas { border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>FlagFit Pro Icon Generator</h1>
    <p>This tool generates all the missing icon sizes for the PWA manifest.</p>
    
    <button onclick="generateAllIcons()">Generate All Icons</button>
    <button onclick="downloadAllIcons()">Download All Icons</button>
    
    <div class="preview" id="preview"></div>
    
    <script>
        // Generate PWA icons programmatically
        const sizes = [96, 128, 144, 152, 384];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        function generateIcon(size) {
            canvas.width = size;
            canvas.height = size;
            
            // Create gradient background matching the SVG
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#4a7c59'); // Green
            gradient.addColorStop(1, '#3B82F6'); // Blue
            
            // Draw rounded rectangle background
            const radius = size * 0.125; // 64px for 512px icon
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Draw circle overlay
            const circleRadius = size * 0.35; // 180px for 512px icon
            ctx.beginPath();
            ctx.arc(size/2, size/2, circleRadius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = size * 0.008; // 4px for 512px icon
            ctx.stroke();
            
            // Fill circle with semi-transparent white
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fill();
            
            // Draw "FF" text
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.23}px Arial`; // 120px for 512px icon
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('FF', size/2, size/2 - size * 0.14); // 280px for 512px icon
            
            // Draw "Pro" text
            ctx.font = `${size * 0.078}px Arial`; // 40px for 512px icon
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillText('Pro', size/2, size/2 + size * 0.18); // 350px for 512px icon
            
            return canvas;
        }
        
        function generateAllIcons() {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            
            sizes.forEach((size, index) => {
                const canvas = generateIcon(size);
                const div = document.createElement('div');
                div.className = 'icon-preview';
                div.innerHTML = `
                    <h3>${size}x${size}</h3>
                    <canvas width="${size}" height="${size}"></canvas>
                `;
                const previewCanvas = div.querySelector('canvas');
                const previewCtx = previewCanvas.getContext('2d');
                previewCtx.drawImage(canvas, 0, 0);
                preview.appendChild(div);
            });
        }
        
        function downloadAllIcons() {
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    const canvas = generateIcon(size);
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `icon-${size}x${size}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                }, index * 200);
            });
        }
        
        // Auto-generate preview on load
        window.onload = generateAllIcons;
    </script>
</body>
</html>
