  <body>
    <div id="root"></div>
    
    <!-- Performance API Polyfill for React Scheduler -->
    <script>
      // Ensure performance.now() is available for React scheduler
      if (!window.performance || !window.performance.now) {
        window.performance = window.performance || {};
        window.performance.now = window.performance.now || 
          window.performance.webkitNow || 
          window.performance.mozNow || 
          window.performance.msNow || 
          function() { return new Date().getTime(); };
      }
      
      // Ensure requestIdleCallback is available or provide fallback
      if (!window.requestIdleCallback) {
        window.requestIdleCallback = function(callback, options) {
          return setTimeout(callback, (options && options.timeout) || 16);
        };
        window.cancelIdleCallback = function(id) {
          clearTimeout(id);
        };
      }
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered successfully:', registration.scope);
            })
            .catch((error) => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
