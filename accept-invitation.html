<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accept Team Invitation - FlagFit Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" crossorigin="anonymous" defer></script>
    <script src="./src/icon-helper.js" defer></script>
    <!-- Event Handlers (Phase 2 - Replaces inline onclick handlers) -->
    <script type="module" src="./src/js/utils/event-handlers.js" defer></script>
    <!-- Supabase Configuration (Centralized) -->
    <script src="./src/js/config/supabase-config.js" defer></script>
    
    <!-- Supabase JS SDK from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.88.0" defer></script>
    <style>
      body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
      .invitation-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 600px; width: 100%; padding: 40px; }
      .header { text-align: center; margin-bottom: 40px; }
      .header-icon { font-size: 4rem; margin-bottom: 16px; }
      h1 { font-size: 2rem; color: #1a1a1a; margin: 0 0 12px 0; font-weight: 700; }
      .subtitle { color: #666; font-size: 1rem; margin: 0; }
      .team-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; text-align: center; margin: 30px 0; }
      .team-name { font-size: 1.8rem; font-weight: 700; margin: 0 0 12px 0; }
      .team-info { font-size: 1rem; opacity: 0.9; }
      .info-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; }
      .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e0e0e0; }
      .info-row:last-child { border-bottom: none; }
      .info-label { font-weight: 600; color: #666; }
      .info-value { color: #1a1a1a; }
      .btn { padding: 16px 32px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Poppins', sans-serif; width: 100%; margin: 10px 0; }
      .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
      .btn-secondary { background: #f0f0f0; color: #333; }
      .btn-secondary:hover { background: #e0e0e0; }
      .message { padding: 16px; border-radius: 8px; margin: 20px 0; display: none; }
      .message-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .message-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      .message-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
      .loading-spinner { display: none; text-align: center; padding: 20px; }
      .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="invitation-container">
      <div class="header">
        <div class="header-icon">🏈</div>
        <h1>Team Invitation</h1>
        <p class="subtitle">You've been invited to join a team!</p>
      </div>
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Loading invitation...</p>
      </div>
      <div class="message message-error" id="errorMessage"></div>
      <div class="message message-success" id="successMessage"></div>
      <div class="message message-info" id="infoMessage"></div>
      <div id="invitationContent" class="hidden">
        <div class="team-badge">
          <div class="team-name" id="teamName">Team Name</div>
          <div class="team-info" id="teamInfo">League • Season</div>
        </div>
        <div class="info-section">
          <div class="info-row"><span class="info-label">Your Role:</span><span class="info-value" id="roleValue">Player</span></div>
          <div class="info-row" id="positionRow"><span class="info-label">Position:</span><span class="info-value" id="positionValue">-</span></div>
          <div class="info-row" id="jerseyRow"><span class="info-label">Jersey Number:</span><span class="info-value" id="jerseyValue">-</span></div>
          <div class="info-row"><span class="info-label">Invitation Email:</span><span class="info-value" id="emailValue">-</span></div>
        </div>
        <div id="actionButtons">
          <button type="button" class="btn btn-primary" id="acceptBtn"><i data-lucide="check" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;"></i> Accept Invitation</button>
          <button type="button" class="btn btn-secondary" data-action="decline" data-target="/dashboard.html" aria-label="Decline invitation and return to dashboard">Decline</button>
        </div>
      </div>
      <div id="authRequired" class="hidden">
        <div class="message message-info" style="display: block;">You need to sign in or create an account to accept this invitation.</div>
        <button type="button" class="btn btn-primary" id="loginBtn">Sign In</button>
        <button type="button" class="btn btn-secondary" id="registerBtn">Create Account</button>
      </div>
    </div>
    <script type="module">
      import { authManager } from './src/auth-manager.js';
      import { getSupabase } from './src/js/services/supabase-client.js';
      let invitationToken = null;
      let invitationData = null;
      document.addEventListener('DOMContentLoaded', async () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
        const urlParams = new URLSearchParams(window.location.search);
        invitationToken = urlParams.get('token');
        if (!invitationToken) { showError('Invalid invitation link. No token provided.'); return; }
        await authManager.waitForInit();
        const isAuthenticated = authManager.isAuthenticated();
        if (!isAuthenticated) {
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('authRequired').classList.remove('hidden');
          sessionStorage.setItem('pendingInvitationToken', invitationToken);
          document.getElementById('loginBtn').addEventListener('click', () => {
            window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
          });
          document.getElementById('registerBtn').addEventListener('click', () => {
            window.location.href = `/register.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
          });
          return;
        }
        await validateInvitation();
      });
      async function validateInvitation() {
        try {
          document.getElementById('loadingSpinner').style.display = 'block';
          const response = await fetch(`/.netlify/functions/validate-invitation?token=${invitationToken}`);
          const data = await response.json();
          document.getElementById('loadingSpinner').style.display = 'none';
          if (!response.ok || !data.success) { showError(data.error || 'Failed to validate invitation'); return; }
          invitationData = data.data.invitation;
          displayInvitation(invitationData);
        } catch (error) {
          document.getElementById('loadingSpinner').style.display = 'none';
          console.error('Error validating invitation:', error);
          showError('Failed to load invitation. Please try again.');
        }
      }
      function displayInvitation(invitation) {
        document.getElementById('teamName').textContent = invitation.team.name;
        const teamInfoParts = [];
        if (invitation.team.league) teamInfoParts.push(invitation.team.league);
        if (invitation.team.season) teamInfoParts.push(invitation.team.season);
        if (invitation.team.home_city) teamInfoParts.push(invitation.team.home_city);
        document.getElementById('teamInfo').textContent = teamInfoParts.join(' • ') || 'Flag Football Team';
        document.getElementById('roleValue').textContent = invitation.role === 'assistant_coach' ? 'Assistant Coach' : 'Player';
        document.getElementById('emailValue').textContent = invitation.email;
        if (invitation.position) document.getElementById('positionValue').textContent = invitation.position;
        else document.getElementById('positionRow').style.display = 'none';
        if (invitation.jerseyNumber) document.getElementById('jerseyValue').textContent = invitation.jerseyNumber;
        else document.getElementById('jerseyRow').style.display = 'none';
        document.getElementById('invitationContent').classList.remove('hidden');
        document.getElementById('acceptBtn').addEventListener('click', acceptInvitation);
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
      async function acceptInvitation() {
        try {
          const acceptBtn = document.getElementById('acceptBtn');
          acceptBtn.disabled = true;
          acceptBtn.innerHTML = '<span class="spinner" style="width: 20px; height: 20px; margin-right: 8px; border-width: 2px;"></span> Accepting...';
          const supabase = getSupabase();
          const { data: { session } } = await supabase.auth.getSession();
          if (!session) { showError('You must be logged in to accept this invitation'); acceptBtn.disabled = false; acceptBtn.innerHTML = '<i data-lucide="check" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;"></i> Accept Invitation'; return; }
          const response = await fetch('/.netlify/functions/accept-invitation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
            body: JSON.stringify({ token: invitationToken })
          });
          const data = await response.json();
          if (!response.ok || !data.success) throw new Error(data.error || 'Failed to accept invitation');
          showSuccess('Successfully joined the team!');
          document.getElementById('actionButtons').style.display = 'none';
          setTimeout(() => { window.location.href = '/roster.html'; }, 2000);
        } catch (error) {
          console.error('Error accepting invitation:', error);
          showError(error.message || 'Failed to accept invitation. Please try again.');
          const acceptBtn = document.getElementById('acceptBtn');
          acceptBtn.disabled = false;
          acceptBtn.innerHTML = '<i data-lucide="check" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;"></i> Accept Invitation';
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }
      }
      function showError(message) { const errorEl = document.getElementById('errorMessage'); errorEl.textContent = message; errorEl.style.display = 'block'; hideMessage('successMessage'); hideMessage('infoMessage'); }
      function showSuccess(message) { const successEl = document.getElementById('successMessage'); successEl.textContent = message; successEl.style.display = 'block'; hideMessage('errorMessage'); hideMessage('infoMessage'); }
      function hideMessage(id) { document.getElementById(id).style.display = 'none'; }
    </script>
  </body>
</html>
