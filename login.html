<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagFit Pro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: #999;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e1e5e9;
        }

        .divider span {
            padding: 0 15px;
        }

        .create-account {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .create-account:hover {
            text-decoration: underline;
        }

        .sponsors {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e1e5e9;
        }

        .sponsors-title {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 20px;
        }

        .sponsor-logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sponsor-logo {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            padding: 8px 16px;
            border: 1px solid #e1e5e9;
            border-radius: 20px;
            background: #f8f9fa;
        }

        .demo-note {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #1976d2;
        }

        .demo-note strong {
            color: #1565c0;
        }

        .error-message {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #c62828;
            display: none;
        }

        .success-message {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #2e7d32;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏈</div>
        <h1 class="title">Sign in to FlagFit Pro</h1>
        
        <div class="demo-note">
            <strong>Demo Mode:</strong> This login accepts any email and password for testing purposes.
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <!-- Manual redirect button (backup) -->
        <div id="manualRedirect" style="display: none; margin: 20px 0; padding: 15px; background: #e3f2fd; border-radius: 8px; border-left: 4px solid #2196f3;">
            <p style="margin: 0 0 10px 0; color: #1976d2; font-weight: 500;">✅ Login successful!</p>
            <button type="button" id="goDashboard" style="background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 500;">
                Go to Dashboard →
            </button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot your password?</a>
            </div>

            <button type="submit" class="login-btn">
                <span>🔒</span>
                Sign in
            </button>
        </form>

        <div class="divider">
            <span>Or</span>
        </div>

        <a href="#" class="create-account">create a new account</a>

        <div class="sponsors">
            <div class="sponsors-title">Proudly sponsored by</div>
            <div class="sponsor-logos">
                <div class="sponsor-logo">LA PRIMAFIT</div>
                <div class="sponsor-logo">Chemius</div>
                <div class="sponsor-logo">GEAR XPRO</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { authManager } from './src/auth-manager.js';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            console.log('📝 Login form submitted');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('📧 Email entered:', email);
            console.log('🔑 Password length:', password ? password.length : 0);
            
            try {
                const result = await authManager.login(email, password);
                
                console.log('📋 Login result:', result);
                
                if (result.success) {
                    console.log('✅ Login successful! Auth manager will handle redirect...');
                    
                    // Show manual redirect button as backup after 3 seconds
                    setTimeout(() => {
                        console.log('⏰ Showing manual redirect button as backup...');
                        document.getElementById('manualRedirect').style.display = 'block';
                    }, 3000);
                    
                    // Note: authManager.login() already handles the redirect internally
                    // No need to call redirectToDashboard() here again
                } else {
                    console.error('❌ Login failed:', result.error);
                }
            } catch (error) {
                console.error('❌ Login error:', error);
            }
        });

        // Manual redirect button event listener
        document.getElementById('goDashboard').addEventListener('click', function() {
            console.log('🔘 Manual redirect button clicked');
            console.log('🔍 Auth state check:');
            console.log('   - Is authenticated:', authManager.isAuthenticated());
            console.log('   - Current user:', authManager.getCurrentUser());
            
            if (authManager.isAuthenticated()) {
                authManager.redirectToDashboard();
            } else {
                console.error('❌ Not authenticated, cannot redirect');
                alert('Please log in first');
            }
        });

        // Pre-fill with demo credentials for easy testing
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').value = 'test@flagfitpro.com';
            document.getElementById('password').value = 'demo123';
            
            console.log('🔍 Page loaded, checking for existing auth...');
            if (authManager.isAuthenticated()) {
                console.log('👤 User already logged in, redirecting to dashboard...');
                authManager.redirectToDashboard();
            }
        });
    </script>
</body>
</html>
