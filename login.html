<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagFit Pro - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/comprehensive-design-system.css">
    <link rel="stylesheet" href="./src/hover-effects.css">
    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./src/icon-helper.js"></script>
    <style>
        body {
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-component-lg);
        }

        .login-container {
            background: var(--surface-primary);
            border-radius: var(--radius-component-xl);
            box-shadow: var(--elevation-highest);
            padding: var(--spacing-layout-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-size: var(--typography-display-sm-size);
            margin-bottom: var(--spacing-component-sm);
            color: var(--color-brand-primary);
        }

        .login-title {
            font-size: var(--typography-heading-xl-size);
            font-weight: var(--typography-heading-xl-weight);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-component-xl);
        }

        .login-form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-component-xl);
            font-size: var(--typography-body-sm-size);
        }
        
        .login-checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-component-xs);
        }
        
        .login-forgot-link {
            color: var(--color-brand-primary);
            text-decoration: none;
            font-weight: var(--typography-label-md-weight);
        }
        
        .login-forgot-link:hover {
            text-decoration: underline;
        }

        .login-divider {
            margin: var(--spacing-component-xl) 0;
            display: flex;
            align-items: center;
            color: var(--color-text-muted);
            font-size: var(--typography-body-sm-size);
        }
        
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border-secondary);
        }
        
        .login-divider span {
            padding: 0 var(--spacing-component-md);
        }

        .login-create-link {
            color: var(--color-brand-primary);
            text-decoration: none;
            font-weight: var(--typography-label-md-weight);
        }
        
        .login-create-link:hover {
            text-decoration: underline;
        }

        .login-sponsors {
            margin-top: var(--spacing-layout-lg);
            padding-top: var(--spacing-component-xl);
            border-top: 1px solid var(--color-border-secondary);
        }
        
        .login-sponsors-title {
            font-size: var(--typography-body-sm-size);
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-component-lg);
        }
        
        .login-sponsor-logos {
            display: flex;
            justify-content: center;
            gap: var(--spacing-component-lg);
            flex-wrap: wrap;
        }
        
        .login-sponsor-logo {
            font-size: var(--typography-caption-size);
            font-weight: var(--typography-caption-weight);
            color: var(--color-text-tertiary);
            padding: var(--spacing-component-xs) var(--spacing-component-md);
            border: 1px solid var(--color-border-secondary);
            border-radius: var(--radius-component-full);
            background: var(--surface-secondary);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-component-xl) var(--spacing-component-lg);
            }
            
            .login-title {
                font-size: var(--typography-heading-lg-size);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <i data-lucide="football"></i>
        </div>
        <h1 class="login-title">Sign in to FlagFit Pro</h1>
        
        <div class="alert alert-info" id="demoNote" style="display: none;">
            <strong>Demo Mode:</strong> This login accepts any email and password for testing purposes.
        </div>

        <div class="alert alert-error" id="errorMessage" style="display: none;"></div>
        <div class="alert alert-success" id="successMessage" style="display: none;"></div>
        
        <!-- Manual redirect button (backup) -->
        <div class="alert alert-success" id="manualRedirect" style="display: none;">
            <p class="mb-3">
                <i data-lucide="check-circle"></i> Login successful!
            </p>
            <button type="button" id="goDashboard" class="btn btn-primary btn-sm">
                Go to Dashboard <i data-lucide="chevron-right"></i>
            </button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-input" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" name="password" placeholder="Enter your password" required>
            </div>

            <div class="login-form-options">
                <div class="login-checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="/reset-password.html" class="login-forgot-link">Forgot your password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">
                <i data-lucide="lock"></i>
                Sign in
            </button>
        </form>

        <div class="login-divider">
            <span>Or</span>
        </div>

        <a href="/register.html" class="login-create-link">create a new account</a>

        <div class="login-sponsors">
            <div class="login-sponsors-title">Proudly sponsored by</div>
            <div class="login-sponsor-logos">
                <div class="login-sponsor-logo">LA PRIMAFIT</div>
                <div class="login-sponsor-logo">Chemius</div>
                <div class="login-sponsor-logo">GEAR XPRO</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { authManager } from './src/auth-manager.js';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            console.log('📝 Login form submitted');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Clear previous error messages
            hideMessage('errorMessage');
            hideMessage('successMessage');
            
            // Validate form inputs
            if (!validateLoginForm(email, password)) {
                return;
            }
            
            // Show loading state
            const submitButton = this.querySelector('button[type="submit"]');
            const originalText = submitButton.innerHTML;
            submitButton.innerHTML = '<span>⏳</span> Signing in...';
            submitButton.disabled = true;
            
            if (window.location.hostname === 'localhost') {
                console.log('📧 Email entered:', email);
                console.log('🔑 Password length:', password ? password.length : 0);
            }
            
            try {
                const result = await authManager.login(email, password);
                
                console.log('<i data-lucide="clipboard-list" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Login result:', result);
                
                if (result.success) {
                    console.log('<i data-lucide="check-circle" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Login successful! Auth manager will handle redirect...');
                    
                    // Show manual redirect button as backup after 3 seconds
                    setTimeout(() => {
                        console.log('⏰ Showing manual redirect button as backup...');
                        document.getElementById('manualRedirect').style.display = 'block';
                    }, 3000);
                    
                    // Note: authManager.login() already handles the redirect internally
                    // No need to call redirectToDashboard() here again
                } else {
                    console.error('<i data-lucide="x-circle" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Login failed:', result.error);
                }
            } catch (error) {
                console.error('<i data-lucide="x-circle" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Login error:', error);
            }
        });

        // Manual redirect button event listener
        document.getElementById('goDashboard').addEventListener('click', function() {
            console.log('🔘 Manual redirect button clicked');
            console.log('<i data-lucide="search" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Auth state check:');
            console.log('   - Is authenticated:', authManager.isAuthenticated());
            console.log('   - Current user:', authManager.getCurrentUser());
            
            if (authManager.isAuthenticated()) {
                authManager.redirectToDashboard();
            } else {
                console.error('<i data-lucide="x-circle" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Not authenticated, cannot redirect');
                alert('Please log in first');
            }
        });

        // Initialize login page
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Lucide icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            // Check if we're in demo mode (localhost or development)
            const isDemoMode = window.location.hostname === 'localhost' || 
                              window.location.hostname === '127.0.0.1' ||
                              window.location.search.includes('demo=true');
            
            if (isDemoMode) {
                // Show demo note and pre-fill credentials for development
                document.getElementById('demoNote').style.display = 'block';
                document.getElementById('email').value = 'test@flagfitpro.com';
                document.getElementById('password').value = 'demo123';
            }
            
            console.log('<i data-lucide="search" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Page loaded, checking for existing auth...');
            if (authManager.isAuthenticated()) {
                console.log('👤 User already logged in, redirecting to dashboard...');
                authManager.redirectToDashboard();
            }
        });

        // Form validation functions
        function validateLoginForm(email, password) {
            // Email validation
            if (!email || email.trim() === '') {
                showMessage('errorMessage', 'Please enter your email address.');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('errorMessage', 'Please enter a valid email address.');
                return false;
            }
            
            // Password validation
            if (!password || password.trim() === '') {
                showMessage('errorMessage', 'Please enter your password.');
                return false;
            }
            
            if (password.length < 6) {
                showMessage('errorMessage', 'Password must be at least 6 characters long.');
                return false;
            }
            
            return true;
        }
        
        function showMessage(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
        
        function hideMessage(elementId) {
            const element = document.getElementById(elementId);
            element.style.display = 'none';
        }
    </script>
</body>
</html>
