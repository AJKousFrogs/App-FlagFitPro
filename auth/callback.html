  <style>

<body>
  <div class="callback-container">
    <div class="logo">🔐</div>
    <h1 class="title">Signing you in...</h1>
    <p class="subtitle">Please wait while we complete your sign-in.</p>

    <div class="spinner" id="spinner"></div>

    <div class="error-message" id="errorMessage"></div>

    <div id="errorActions" style="display: none;">
      <a href="/login.html" class="btn">Return to Login</a>
    </div>
  </div>

  <script type="module">
    import { getSupabase } from '../src/js/services/supabase-client.js';
    import { authManager } from '../src/auth-manager.js';

    async function handleOAuthCallback() {
      const spinner = document.getElementById('spinner');
      const errorMessage = document.getElementById('errorMessage');
      const errorActions = document.getElementById('errorActions');

      try {
        const supabase = getSupabase();

        if (!supabase) {
          throw new Error('Unable to connect to authentication service');
        }

        // Supabase automatically handles the OAuth callback
        // The session listener in auth-manager will pick it up

        // Wait a moment for the session to be established
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Check if authenticated
        const { data: { session }, error } = await supabase.auth.getSession();

        if (error) {
          throw error;
        }

        if (session) {
          console.log('✅ OAuth authentication successful');

          // Check if user needs to complete onboarding
          const user = session.user;
          const hasCompletedOnboarding = user.user_metadata?.onboarding_completed;

          if (hasCompletedOnboarding) {
            // Redirect to dashboard
            window.location.href = '/dashboard.html';
          } else {
            // Redirect to onboarding
            window.location.href = '/onboarding.html';
          }
        } else {
          throw new Error('No session found after OAuth callback');
        }
      } catch (error) {
        console.error('OAuth callback error:', error);
        spinner.style.display = 'none';
        errorMessage.textContent = error.message || 'Authentication failed. Please try again.';
        errorMessage.style.display = 'block';
        errorActions.style.display = 'block';
      }
    }

    handleOAuthCallback();
  </script>
</body>
