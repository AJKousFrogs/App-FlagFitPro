<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Your Team - FlagFit Pro</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Design System CSS -->
    <link rel="stylesheet" href="./src/css/main.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="./src/css/pages/auth.css" />
    <link rel="stylesheet" href="./src/css/pages/team-create.css" />

    <!-- Lucide Icons -->
    <script
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./src/icon-helper.js" defer></script>
    <script src="./src/theme-switcher.js" defer></script>

    <!-- Supabase Configuration (Centralized) -->
    <script src="./src/js/config/supabase-config.js" defer></script>

    <!-- Supabase JS SDK from CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.88.0"
      defer
    ></script>

    <!-- Universal Components -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- Universal Form Validator -->
    <script
      type="module"
      src="./src/js/components/universal-form-validator.js"
      defer
    ></script>
    <!-- Footer Loader (Dynamic Component) -->
    <script
      type="module"
      src="./src/js/components/footer-loader.js"
      defer
    ></script>
    <!-- Event Handlers (Phase 2 - Replaces inline onclick handlers) -->
    <script type="module" src="./src/js/utils/event-handlers.js" defer></script>
  </head>
  <body class="page-auth">
    <div class="create-team-container card card-elevated">
      <div class="header">
        <div class="header-icon" aria-hidden="true">🏈</div>
        <h1 class="text-heading-2xl text-primary space-relaxed">
          Create Your Team
        </h1>
        <p class="subtitle text-body-md text-secondary">
          Set up your team and start inviting players
        </p>
      </div>

      <div
        class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md"
        id="errorMessage"
        role="alert"
        aria-live="assertive"
        style="display: none; border: 1px solid var(--color-status-error)"
      ></div>
      <div
        class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md"
        id="successMessage"
        role="status"
        aria-live="polite"
        style="display: none; border: 1px solid var(--color-status-success)"
      ></div>

      <form id="createTeamForm" novalidate>
        <div class="form-group u-margin-bottom-24 u-text-left">
          <label for="teamName" class="form-label required">
            Team Name
            <span class="required-indicator" aria-label="required">*</span>
          </label>
          <input
            type="text"
            id="teamName"
            name="teamName"
            class="form-input"
            required
            placeholder="Enter your team name"
            maxlength="255"
            autocomplete="organization"
            aria-describedby="teamName-error teamName-help"
            aria-invalid="false"
          />
          <div
            id="teamName-error"
            class="form-error"
            role="alert"
            aria-live="polite"
            style="display: none"
          ></div>
          <small id="teamName-help" class="form-hint"
            >This will be displayed to all team members</small
          >
        </div>

        <div
          class="form-row u-display-grid u-grid-cols-2 u-gap-20 u-margin-bottom-24"
        >
          <div class="form-group u-text-left">
            <label for="league" class="form-label">League/Competition</label>
            <input
              type="text"
              id="league"
              name="league"
              class="form-input"
              placeholder="e.g., City League"
              maxlength="255"
              autocomplete="organization-title"
              aria-describedby="league-error"
            />
            <div
              id="league-error"
              class="form-error"
              role="alert"
              style="display: none"
            ></div>
          </div>

          <div class="form-group u-text-left">
            <label for="season" class="form-label">Season</label>
            <input
              type="text"
              id="season"
              name="season"
              class="form-input"
              placeholder="e.g., 2025 Spring"
              maxlength="100"
              autocomplete="off"
              aria-describedby="season-error"
            />
            <div
              id="season-error"
              class="form-error"
              role="alert"
              style="display: none"
            ></div>
          </div>
        </div>

        <div
          class="form-row u-display-grid u-grid-cols-2 u-gap-20 u-margin-bottom-24"
        >
          <div class="form-group u-text-left">
            <label for="homeCity" class="form-label">Home City</label>
            <input
              type="text"
              id="homeCity"
              name="homeCity"
              class="form-input"
              placeholder="e.g., Ljubljana"
              maxlength="255"
              autocomplete="address-level2"
              aria-describedby="homeCity-error"
            />
            <div
              id="homeCity-error"
              class="form-error"
              role="alert"
              style="display: none"
            ></div>
          </div>

          <div class="form-group u-text-left">
            <label for="foundedYear" class="form-label">Founded Year</label>
            <input
              type="number"
              id="foundedYear"
              name="foundedYear"
              class="form-input"
              placeholder="2025"
              min="1900"
              max="2100"
              autocomplete="off"
              aria-describedby="foundedYear-error"
            />
            <div
              id="foundedYear-error"
              class="form-error"
              role="alert"
              style="display: none"
            ></div>
          </div>
        </div>

        <div class="form-group u-margin-bottom-24 u-text-left">
          <label for="motto" class="form-label">Team Motto</label>
          <input
            type="text"
            id="motto"
            name="motto"
            class="form-input"
            placeholder="e.g., Unity Through Sport"
            maxlength="500"
            autocomplete="off"
            aria-describedby="motto-error"
          />
          <div
            id="motto-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
        </div>

        <div class="form-group u-margin-bottom-24 u-text-left">
          <label for="description" class="form-label">Team Description</label>
          <textarea
            id="description"
            name="description"
            class="form-input"
            placeholder="Tell us about your team, goals, and vision..."
            rows="4"
            aria-describedby="description-error"
          ></textarea>
          <div
            id="description-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
        </div>

        <div
          class="form-row u-display-grid u-grid-cols-2 u-gap-20 u-margin-bottom-24"
        >
          <div class="form-group u-text-left">
            <label for="primaryColor" class="form-label">Primary Color</label>
            <div class="color-picker-group">
              <input
                type="color"
                id="primaryColor"
                name="primaryColor"
                value="#667eea"
                aria-label="Primary team color"
              />
              <div
                class="color-preview"
                id="primaryPreview"
                style="background: #667eea"
              >
                Primary
              </div>
            </div>
          </div>

          <div class="form-group u-text-left">
            <label for="secondaryColor" class="form-label"
              >Secondary Color</label
            >
            <div class="color-picker-group">
              <input
                type="color"
                id="secondaryColor"
                name="secondaryColor"
                value="#764ba2"
                aria-label="Secondary team color"
              />
              <div
                class="color-preview"
                id="secondaryPreview"
                style="background: #764ba2"
              >
                Secondary
              </div>
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary u-width-full u-padding-16 u-margin-bottom-12"
          id="submitBtn"
          aria-label="Create team"
        >
          <i
            data-lucide="check"
            aria-hidden="true"
            style="
              width: 20px;
              height: 20px;
              vertical-align: middle;
              margin-right: 8px;
            "
          ></i>
          <span>Create Team</span>
        </button>

        <button
          type="button"
          class="btn btn-secondary u-width-full"
          data-action="decline"
          data-target="/dashboard.html"
          aria-label="Cancel and return to dashboard"
        >
          Cancel
        </button>
      </form>
    </div>

    <script type="module">
      import { authManager } from "./src/auth-manager.js";
      import { getSupabase } from "./src/js/services/supabase-client.js";
      import {
        showMessage,
        hideMessage,
        clearMessages,
        showSuccess,
        showError,
      } from "./src/js/utils/message-utils.js";

      // Wait for DOM and auth
      document.addEventListener("DOMContentLoaded", async () => {
        await authManager.waitForInit();

        // Check if user is authenticated and is a coach
        if (!authManager.isAuthenticated()) {
          window.location.href = "/login.html";
          return;
        }

        const user = authManager.getCurrentUser();
        const userRole = user?.user_metadata?.role || user?.role || "player";

        if (userRole !== "coach") {
          showError("errorMessage", "Only coaches can create teams");
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 2000);
          return;
        }

        // Initialize Lucide icons
        if (typeof lucide !== "undefined") {
          lucide.createIcons();
        }

        // Initialize Universal Form Validator
        const form = document.getElementById("createTeamForm");
        if (form && typeof UniversalFormValidator !== "undefined") {
          new UniversalFormValidator(form, {
            validateOnInput: true,
            validateOnBlur: true,
            showSuccessStates: true,
            announceErrors: true,
          });
        }

        // Color preview updates
        const primaryColorInput = document.getElementById("primaryColor");
        const secondaryColorInput = document.getElementById("secondaryColor");
        const primaryPreview = document.getElementById("primaryPreview");
        const secondaryPreview = document.getElementById("secondaryPreview");

        if (primaryColorInput && primaryPreview) {
          primaryColorInput.addEventListener("input", (e) => {
            primaryPreview.style.background = e.target.value;
          });
        }

        if (secondaryColorInput && secondaryPreview) {
          secondaryColorInput.addEventListener("input", (e) => {
            secondaryPreview.style.background = e.target.value;
          });
        }

        // Form submission
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const errorMessage = document.getElementById("errorMessage");
          const successMessage = document.getElementById("successMessage");

          // Hide previous messages
          clearMessages("errorMessage", "successMessage");

          // Validate form
          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }

          // Disable submit button and show loading state
          const originalBtnContent = submitBtn.innerHTML;
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<i data-lucide="loader" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px; animation: spin 1s linear infinite;"></i> Creating Team...';

          // Re-initialize icons for the loader
          if (typeof lucide !== "undefined") {
            lucide.createIcons();
          }

          try {
            const formData = new FormData(form);
            const supabase = getSupabase();

            if (!supabase) {
              throw new Error("Unable to connect to database");
            }

            // Get current user
            const {
              data: { user },
              error: authError,
            } = await supabase.auth.getUser();

            if (authError || !user) {
              throw new Error("You must be logged in to create a team");
            }

            // Prepare team data
            const teamData = {
              name: formData.get("teamName")?.trim(),
              league: formData.get("league")?.trim() || null,
              season: formData.get("season")?.trim() || null,
              home_city: formData.get("homeCity")?.trim() || null,
              founded_year: formData.get("foundedYear")
                ? parseInt(formData.get("foundedYear"))
                : null,
              motto: formData.get("motto")?.trim() || null,
              description: formData.get("description")?.trim() || null,
              primary_color: formData.get("primaryColor") || "#667eea",
              secondary_color: formData.get("secondaryColor") || "#764ba2",
              coach_id: user.id,
            };

            // Validate team name
            if (!teamData.name || teamData.name.length === 0) {
              throw new Error("Team name is required");
            }

            // Insert team
            const { data: team, error } = await supabase
              .from("teams")
              .insert([teamData])
              .select()
              .single();

            if (error) {
              // Handle specific error cases
              if (error.code === "23505") {
                throw new Error("A team with this name already exists");
              } else if (error.code === "23503") {
                throw new Error(
                  "Invalid coach ID. Please log out and log back in.",
                );
              } else {
                throw new Error(
                  error.message || "Failed to create team. Please try again.",
                );
              }
            }

            // Show success message
            showSuccess(
              "successMessage",
              `🎉 Team "${team.name}" created successfully! Redirecting to roster...`,
            );

            // Redirect to roster page after 2 seconds
            setTimeout(() => {
              window.location.href = "/roster.html";
            }, 2000);
          } catch (error) {
            console.error("Error creating team:", error);
            showError(
              "errorMessage",
              error.message || "Failed to create team. Please try again.",
            );

            // Re-enable submit button
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnContent;

            if (typeof lucide !== "undefined") {
              lucide.createIcons();
            }
          }
        });
      });
    </script>

    <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
</html>
