    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .create-team-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 700px;
        width: 100%;
        padding: 40px;
      }
      .header {
        text-align: center;
        margin-bottom: 40px;
      }
      .header-icon {
        font-size: 4rem;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 2.5rem;
        color: #1a1a1a;
        margin: 0 0 12px 0;
        font-weight: 700;
      }
      .subtitle {
        color: #666;
        font-size: 1.1rem;
        margin: 0;
      }
      .form-group {
        margin-bottom: 24px;
      }
      label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }
      .required {
        color: #e53e3e;
      }
      input[type="text"],
      input[type="number"],
      textarea,
      select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: 'Poppins', sans-serif;
        transition: border-color 0.2s;
        box-sizing: border-box;
      }
      input[type="text"]:focus,
      input[type="number"]:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      .form-help {
        font-size: 0.85rem;
        color: #666;
        margin-top: 6px;
        display: block;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .color-picker-group {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      input[type="color"] {
        width: 60px;
        height: 45px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
      }
      .color-preview {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Poppins', sans-serif;
      }
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .btn-secondary {
        background: #f0f0f0;
        color: #333;
        margin-top: 12px;
        width: 100%;
      }
      .btn-secondary:hover {
        background: #e0e0e0;
      }
      .success-message,
      .error-message {
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .success-message {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error-message {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      @media (max-width: 600px) {
        .form-row {
          grid-template-columns: 1fr;
        }
        .create-team-container {
          padding: 30px 20px;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="create-team-container">
      <div class="header">
        <div class="header-icon">🏈</div>
        <h1>Create Your Team</h1>
        <p class="subtitle">Set up your team and start inviting players</p>
      </div>

      <div class="success-message" id="successMessage"></div>
      <div class="error-message" id="errorMessage"></div>

      <form id="createTeamForm">
        <div class="form-group">
          <label for="teamName">Team Name <span class="required">*</span></label>
          <input
            type="text"
            id="teamName"
            name="teamName"
            required
            placeholder="Enter your team name"
            maxlength="255"
          />
          <small class="form-help">This will be displayed to all team members</small>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="league">League/Competition</label>
            <input
              type="text"
              id="league"
              name="league"
              placeholder="e.g., City League"
              maxlength="255"
            />
          </div>

          <div class="form-group">
            <label for="season">Season</label>
            <input
              type="text"
              id="season"
              name="season"
              placeholder="e.g., 2025 Spring"
              maxlength="100"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="homeCity">Home City</label>
            <input
              type="text"
              id="homeCity"
              name="homeCity"
              placeholder="e.g., Ljubljana"
              maxlength="255"
            />
          </div>

          <div class="form-group">
            <label for="foundedYear">Founded Year</label>
            <input
              type="number"
              id="foundedYear"
              name="foundedYear"
              placeholder="2025"
              min="1900"
              max="2100"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="motto">Team Motto</label>
          <input
            type="text"
            id="motto"
            name="motto"
            placeholder="e.g., Unity Through Sport"
            maxlength="500"
          />
        </div>

        <div class="form-group">
          <label for="description">Team Description</label>
          <textarea
            id="description"
            name="description"
            placeholder="Tell us about your team, goals, and vision..."
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="primaryColor">Primary Color</label>
            <div class="color-picker-group">
              <input
                type="color"
                id="primaryColor"
                name="primaryColor"
                value="#667eea"
              />
              <div class="color-preview" id="primaryPreview" style="background: #667eea;">
                Primary
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="secondaryColor">Secondary Color</label>
            <div class="color-picker-group">
              <input
                type="color"
                id="secondaryColor"
                name="secondaryColor"
                value="#764ba2"
              />
              <div class="color-preview" id="secondaryPreview" style="background: #764ba2;">
                Secondary
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <i data-lucide="check" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;"></i>
          Create Team
        </button>

        <button type="button" class="btn btn-secondary" onclick="window.location.href='/dashboard.html'">
          Cancel
        </button>
      </form>
    </div>

    <script type="module">
      import { authManager } from './src/auth-manager.js';
      import { getSupabase } from './src/js/services/supabase-client.js';

      // Wait for DOM and auth
      document.addEventListener('DOMContentLoaded', async () => {
        await authManager.waitForInit();

        // Check if user is authenticated and is a coach
        if (!authManager.isAuthenticated()) {
          window.location.href = '/login.html';
          return;
        }

        const user = authManager.getCurrentUser();
        const userRole = user?.user_metadata?.role || user?.role || 'player';

        if (userRole !== 'coach') {
          alert('Only coaches can create teams');
          window.location.href = '/dashboard.html';
          return;
        }

        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // Color preview updates
        document.getElementById('primaryColor').addEventListener('input', (e) => {
          document.getElementById('primaryPreview').style.background = e.target.value;
        });

        document.getElementById('secondaryColor').addEventListener('input', (e) => {
          document.getElementById('secondaryPreview').style.background = e.target.value;
        });

        // Form submission
        document.getElementById('createTeamForm').addEventListener('submit', async (e) => {
          e.preventDefault();

          const submitBtn = document.getElementById('submitBtn');
          const errorMessage = document.getElementById('errorMessage');
          const successMessage = document.getElementById('successMessage');

          // Hide previous messages
          errorMessage.style.display = 'none';
          successMessage.style.display = 'none';

          // Disable submit button
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i data-lucide="loader" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px; animation: spin 1s linear infinite;"></i> Creating Team...';

          try {
            const formData = new FormData(e.target);
            const supabase = getSupabase();

            if (!supabase) {
              throw new Error('Unable to connect to database');
            }

            // Get current user
            const { data: { user } } = await supabase.auth.getUser();

            if (!user) {
              throw new Error('You must be logged in to create a team');
            }

            // Prepare team data
            const teamData = {
              name: formData.get('teamName'),
              league: formData.get('league') || null,
              season: formData.get('season') || null,
              home_city: formData.get('homeCity') || null,
              founded_year: formData.get('foundedYear') ? parseInt(formData.get('foundedYear')) : null,
              motto: formData.get('motto') || null,
              description: formData.get('description') || null,
              primary_color: formData.get('primaryColor') || '#667eea',
              secondary_color: formData.get('secondaryColor') || '#764ba2',
              coach_id: user.id
            };

            // Insert team
            const { data: team, error } = await supabase
              .from('teams')
              .insert([teamData])
              .select()
              .single();

            if (error) {
              throw error;
            }

            // Show success message
            successMessage.textContent = `🎉 Team "${team.name}" created successfully!`;
            successMessage.style.display = 'block';

            // Redirect to roster page after 2 seconds
            setTimeout(() => {
              window.location.href = '/roster.html';
            }, 2000);

          } catch (error) {
            console.error('Error creating team:', error);
            errorMessage.textContent = error.message || 'Failed to create team. Please try again.';
            errorMessage.style.display = 'block';

            // Re-enable submit button
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i data-lucide="check" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;"></i> Create Team';

            if (typeof lucide !== 'undefined') {
              lucide.createIcons();
            }
          }
        });
      });
    </script>
  </body>
</html>
