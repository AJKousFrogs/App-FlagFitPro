<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test - FlagFit Pro</title>
    <link rel="stylesheet" href="./src/ui-design-system.css">
    <link rel="stylesheet" href="./src/dark-theme.css">
    <link rel="stylesheet" href="./src/light-theme.css" id="light-theme" disabled>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-container { max-width: 800px; margin: 0 auto; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: var(--dark-bg-secondary); padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
    <script src="./src/theme-switcher.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="test-container">
        <h1><i data-lucide="football" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Dashboard API Test</h1>
        <p>Testing the Flag Football Training App dashboard functionality...</p>
        
        <div id="test-results"></div>
        
        <h3><i data-lucide="bar-chart-3" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Dashboard Data Preview</h3>
        <div id="dashboard-preview"></div>
        
        <h3>🔗 Quick Navigation</h3>
        <p>
            <a href="./index.html">Home</a> | 
            <a href="./dashboard.html">Dashboard</a> | 
            <a href="./login.html">Login</a>
        </p>
    </div>

    <script type="module">
        import { apiClient, dashboard } from './src/api-config.js';
        
        const results = document.getElementById('test-results');
        const preview = document.getElementById('dashboard-preview');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        function addJsonResult(label, data) {
            const div = document.createElement('div');
            div.innerHTML = `<strong>${label}:</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
            preview.appendChild(div);
        }
        
        async function runTests() {
            addResult('🚀 Starting dashboard tests...', 'info');
            
            try {
                // Test 1: API Base URL
                addResult(`<i data-lucide="check-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> API Base URL: ${apiClient.baseUrl}`, 'success');
                
                // Test 2: Mock authentication
                addResult('🔐 Setting up mock authentication...', 'info');
                localStorage.setItem('authToken', 'demo-token-' + Date.now());
                localStorage.setItem('userData', JSON.stringify({
                    id: '1',
                    email: 'test@flagfitpro.com',
                    name: 'Test User',
                    role: 'player'
                }));
                
                // Test 3: Dashboard API call
                addResult('<i data-lucide="bar-chart-3" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Testing dashboard API...', 'info');
                const dashboardData = await dashboard.getOverview('test-user-1');
                
                if (dashboardData.success) {
                    addResult('<i data-lucide="check-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Dashboard API call successful!', 'success');
                    addJsonResult('Dashboard Data', dashboardData.data);
                } else {
                    addResult('<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Dashboard API call failed', 'error');
                }
                
                // Test 4: Chart.js availability
                addResult('<i data-lucide="bar-chart-3" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Checking Chart.js availability...', 'info');
                if (typeof Chart !== 'undefined') {
                    addResult('<i data-lucide="check-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Chart.js is loaded and ready!', 'success');
                } else {
                    addResult('⚠️ Chart.js not loaded - using fallback', 'error');
                }
                
                addResult('🎉 All tests completed!', 'success');
                
            } catch (error) {
                addResult(`<i data-lucide="x-circle" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Test failed: ${error.message}`, 'error');
                console.error('Test error:', error);
            }
        }
        
        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
