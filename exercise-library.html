<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagFit Pro - Exercise Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- New Modular CSS Architecture -->
    <link rel="stylesheet" href="./src/css/main.css">
    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./src/icon-helper.js"></script>
    <script src="./src/theme-switcher.js"></script>
    <script src="./src/nav-highlight.js"></script>
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: var(--dark-bg-primary);
        }

        

        

        

        .sidebar-nav {
            padding: var(--space-6);
        }

        

        

        

        

        

        .nav-icon {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        .main-content {
            margin-left: 64px;
            margin-top: 70px;
            flex: 1;
            padding: 32px;
            background: var(--dark-bg-primary);
        }

        .header-section {
            background: var(--dark-card-bg);
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-6);
            border: 1px solid var(--dark-border);
        }

        .header-section h1 {
            font-size: var(--text-h1);
            font-weight: var(--font-bold);
            color: var(--dark-text-primary);
            margin-bottom: var(--space-2);
        }

        .search-filter-section {
            background: var(--dark-card-bg);
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-6);
            border: 1px solid var(--dark-border);
        }

        .search-bar {
            position: relative;
            margin-bottom: var(--space-4);
        }

        .search-input {
            width: 100%;
            padding: var(--space-4);
            padding-left: var(--space-12);
            border: 1px solid var(--dark-border);
            border-radius: var(--radius-lg);
            font-size: var(--text-base);
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: var(--text-lg);
        }

        .filter-tabs {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--dark-border);
            background: var(--dark-card-bg);
            border-radius: var(--radius-lg);
            color: var(--dark-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: var(--font-medium);
        }

        .filter-tab.active {
            border-color: var(--primary);
            background: var(--primary);
            color: var(--var(--dark-text-primary));
        }

        .filter-tab:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: var(--space-6);
        }

        .exercise-card {
            background: var(--dark-card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--dark-border);
            overflow: hidden;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .exercise-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .exercise-video {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-text-muted);
            font-size: 3rem;
        }

        .exercise-content {
            padding: var(--space-6);
        }

        .exercise-header {
            margin-bottom: var(--space-4);
        }

        .exercise-title {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            color: var(--dark-text-primary);
            margin-bottom: var(--space-2);
        }

        .exercise-category {
            display: inline-block;
            padding: var(--space-1) var(--space-3);
            background: var(--primary);
            color: var(--var(--dark-text-primary));
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            text-transform: uppercase;
            margin-bottom: var(--space-2);
        }

        .muscle-tags {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
            margin-bottom: var(--space-4);
        }

        .muscle-tag {
            padding: var(--space-1) var(--space-2);
            background: var(--dark-bg-primary);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            color: var(--dark-text-secondary);
        }

        .muscle-tag.primary {
            background: var(--accent);
            color: var(--var(--dark-text-primary));
        }

        .exercise-description {
            color: var(--dark-text-secondary);
            font-size: var(--text-sm);
            line-height: 1.6;
            margin-bottom: var(--space-4);
        }

        .exercise-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--space-4);
            border: 1px solid var(--dark-border);
        }

        .difficulty-badge {
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
        }

        .difficulty-beginner {
            background: var(--success-100);
            color: #166534;
        }

        .difficulty-intermediate {
            background: var(--tertiary-100);
            color: var(--tertiary-700);
        }

        .difficulty-advanced {
            background: var(--error-100);
            color: var(--error-800);
        }

        .equipment-list {
            font-size: var(--text-xs);
            color: var(--dark-text-muted);
        }

        .exercise-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            display: none;
        }

        .modal-content {
            background: var(--dark-card-bg);
            margin: 2rem auto;
            max-width: 800px;
            border-radius: var(--radius-xl);
            position: relative;
        }

        .modal-header {
            padding: var(--space-6);
            border: 1px solid var(--dark-border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--dark-text-muted);
            padding: var(--space-2);
        }

        .modal-close:hover {
            color: var(--dark-text-primary);
        }

        .modal-body {
            padding: var(--space-6);
        }

        .instruction-section {
            margin-bottom: var(--space-6);
        }

        .instruction-title {
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
            color: var(--dark-text-primary);
            margin-bottom: var(--space-3);
        }

        .instruction-list {
            list-style: none;
            padding: 0;
        }

        .instruction-list li {
            padding: var(--space-2) 0;
            border: 1px solid var(--dark-border);
            position: relative;
            padding-left: var(--space-8);
        }

        .instruction-list li:before {
            content: counter(step);
            counter-increment: step;
            position: absolute;
            left: 0;
            top: var(--space-2);
            background: var(--primary);
            color: var(--var(--dark-text-primary));
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
            font-weight: var(--font-bold);
        }

        .instruction-list {
            counter-reset: step;
        }

        .progressions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-4);
        }

        .progression-card {
            padding: var(--space-4);
            border: 1px solid var(--dark-border);
            border-radius: var(--radius-lg);
            text-align: center;
        }

        .progression-level {
            font-weight: var(--font-semibold);
            color: var(--primary);
            margin-bottom: var(--space-2);
        }

        .safety-notes {
            background: var(--error-50);
            border: 1px solid #fecaca;
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-top: var(--space-4);
        }

        .safety-title {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--error-600);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-2);
        }

        .coaching-tips {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-top: var(--space-4);
        }

        .coaching-title {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--primary-600);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-2);
        }

        .stats-section {
            background: var(--dark-card-bg);
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-6);
            border: 1px solid var(--dark-border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-4);
        }

        .stat-card {
            text-align: center;
            padding: var(--space-4);
            background: var(--dark-bg-primary);
            border-radius: var(--radius-lg);
        }

        .stat-number {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            color: var(--primary);
            margin-bottom: var(--space-1);
        }

        .stat-label {
            color: var(--dark-text-secondary);
            font-size: var(--text-sm);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .exercise-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-tabs {
                justify-content: center;
            }
        }
    </style>
</head>

<main class="main-content">

        let currentFilter = 'all';
        let searchTerm = '';

        function initializeExerciseLibrary() {
            console.log('📚 Initializing exercise library...');
            
            setupSearchAndFilter();
            displayExercises();
            updateStats();
        }

        function setupSearchAndFilter() {
            // Search functionality
            const searchInput = document.getElementById('exerciseSearch');
            searchInput.addEventListener('input', function(e) {
                searchTerm = e.target.value.toLowerCase();
                displayExercises();
            });

            // Filter functionality
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // Remove active class from all tabs
                    filterTabs.forEach(t => t.classList.remove('active'));
                    
                    // Add active class to clicked tab
                    this.classList.add('active');
                    
                    // Update filter
                    currentFilter = this.dataset.filter;
                    
                    // Display filtered exercises
                    displayExercises();
                });
            });
        }

        function displayExercises() {
            const exerciseGrid = document.getElementById('exerciseGrid');
            const exercises = Object.entries(COMPLETE_EXERCISE_LIBRARY);
            
            // Filter exercises
            let filteredExercises = exercises.filter(([name, exercise]) => {
                // Apply category filter
                const categoryMatch = currentFilter === 'all' || exercise.category === currentFilter;
                
                // Apply search filter
                const searchMatch = !searchTerm || 
                    name.toLowerCase().includes(searchTerm) ||
                    exercise.category.toLowerCase().includes(searchTerm) ||
                    exercise.primaryMuscles.some(muscle => muscle.toLowerCase().includes(searchTerm)) ||
                    exercise.equipment.some(equip => equip.toLowerCase().includes(searchTerm));
                
                return categoryMatch && searchMatch;
            });

            if (filteredExercises.length === 0) {
                exerciseGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: var(--space-12); color: var(--dark-text-muted);">
                        <div style="font-size: 3rem; margin-bottom: var(--space-4);"><i data-lucide="search" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i></div>
                        <h3>No exercises found</h3>
                        <p>Try adjusting your search terms or filters</p>
                    </div>
                `;
                return;
            }

            exerciseGrid.innerHTML = filteredExercises.map(([name, exercise]) => `
                <div class="exercise-card hover-lift" onclick="openExerciseModal('${name}')">
                    <div class="exercise-video">
                        ${getExerciseIcon(exercise.category)}
                    </div>
                    <div class="exercise-content">
                        <div class="exercise-header">
                            <div class="exercise-category">${exercise.category}</div>
                            <h3 class="exercise-title">${name}</h3>
                        </div>
                        
                        <div class="muscle-tags">
                            ${exercise.primaryMuscles.map(muscle => 
                                `<span class="muscle-tag primary">${muscle}</span>`
                            ).join('')}
                            ${exercise.secondaryMuscles.map(muscle => 
                                `<span class="muscle-tag">${muscle}</span>`
                            ).join('')}
                        </div>
                        
                        <p class="exercise-description">
                            ${exercise.setup}
                        </p>
                        
                        <div class="exercise-meta">
                            <span class="difficulty-badge difficulty-${exercise.difficulty}">
                                ${exercise.difficulty.charAt(0).toUpperCase() + exercise.difficulty.slice(1)}
                            </span>
                            <div class="equipment-list">
                                ${exercise.equipment.slice(0, 2).join(', ')}${exercise.equipment.length > 2 ? '...' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getExerciseIcon(category) {
            const icons = {
                'Posterior Chain': '🦵',
                'Plyometric': '<i data-lucide="zap" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>',
                'Sprint': '🏃‍♂️',
                'Strength': '<i data-lucide="dumbbell" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>',
                'Core': '<i data-lucide="target" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>',
                'Recovery': '🧘',
                'Agility': '<i data-lucide="football" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i>'
            };
            return icons[category] || '🏋️‍♂️';
        }

        function updateStats() {
            const exercises = Object.entries(COMPLETE_EXERCISE_LIBRARY);
            const categories = [...new Set(exercises.map(([_, ex]) => ex.category))];
            const totalProgressions = exercises.reduce((total, [_, ex]) => total + (ex.progressions?.length || 0), 0);
            const totalSafetyNotes = exercises.reduce((total, [_, ex]) => total + (ex.safetyNotes?.length || 0), 0);

            document.getElementById('totalExercises').textContent = exercises.length;
            document.getElementById('categoriesCount').textContent = categories.length;
            document.getElementById('progressionsCount').textContent = totalProgressions;
            document.getElementById('safetyNotesCount').textContent = totalSafetyNotes;
        }

        // Global function for opening exercise modal
        window.openExerciseModal = function(exerciseName) {
            const exercise = COMPLETE_EXERCISE_LIBRARY[exerciseName];
            if (!exercise) return;

            const modal = document.getElementById('exerciseModal');
            const modalTitle = document.getElementById('modalExerciseTitle');
            const modalCategory = document.getElementById('modalExerciseCategory');
            const modalBody = document.getElementById('modalBody');

            modalTitle.textContent = exerciseName;
            modalCategory.innerHTML = `<span class="exercise-category">${exercise.category}</span>`;

            modalBody.innerHTML = `
                <!-- Exercise Video/Animation Placeholder -->
                <div class="exercise-video" style="margin-bottom: var(--space-6);">
                    ${getExerciseIcon(exercise.category)}
                    <div style="position: absolute; bottom: var(--space-2); right: var(--space-2); background: rgba(0,0,0,0.7); color: var(--dark-text-primary); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); font-size: var(--text-xs);">
                        Video Coming Soon
                    </div>
                </div>

                <!-- Muscles & Equipment -->
                <div style="margin-bottom: var(--space-6);">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
                        <div>
                            <h4 style="margin-bottom: var(--space-2);">Primary Muscles</h4>
                            <div class="muscle-tags">
                                ${exercise.primaryMuscles.map(muscle => 
                                    `<span class="muscle-tag primary">${muscle}</span>`
                                ).join('')}
                            </div>
                        </div>
                        <div>
                            <h4 style="margin-bottom: var(--space-2);">Equipment Needed</h4>
                            <ul style="list-style: none; padding: 0;">
                                ${exercise.equipment.map(item => `<li>• ${item}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Setup -->
                <div class="instruction-section">
                    <h3 class="instruction-title"><i data-lucide="target" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Setup</h3>
                    <p>${exercise.setup}</p>
                </div>

                <!-- Execution -->
                <div class="instruction-section">
                    <h3 class="instruction-title"><i data-lucide="zap" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Execution</h3>
                    <ol class="instruction-list">
                        ${exercise.execution.map(step => `<li>${step}</li>`).join('')}
                    </ol>
                </div>

                <!-- Coaching Cues -->
                <div class="coaching-tips">
                    <div class="coaching-title">
                        <span><i data-lucide="target" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i></span>
                        <span>Coaching Cues</span>
                    </div>
                    <ul style="margin: 0; padding-left: var(--space-4);">
                        ${exercise.coaching.map(cue => `<li>${cue}</li>`).join('')}
                    </ul>
                </div>

                <!-- Progressions -->
                ${exercise.progressions ? `
                    <div class="instruction-section">
                        <h3 class="instruction-title"><i data-lucide="bar-chart-3" style="width: 16px;  height: 16px;  display: inline-block;  vertical-align: middle ;   color: var(--icon-color-primary); stroke: var(--icon-color-primary);"></i> Progressions</h3>
                        <div class="progressions-grid">
                            ${exercise.progressions.map((progression, index) => `
                                <div class="progression-card">
                                    <div class="progression-level">Level ${index + 1}</div>
                                    <div>${progression}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <!-- Safety Notes -->
                ${exercise.safetyNotes ? `
                    <div class="safety-notes">
                        <div class="safety-title">
                            <span>⚠️</span>
                            <span>Safety Notes</span>
                        </div>
                        <ul style="margin: 0; padding-left: var(--space-4);">
                            ${exercise.safetyNotes.map(note => `<li>${note}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}

                <!-- Secondary Muscles -->
                ${exercise.secondaryMuscles.length > 0 ? `
                    <div style="margin-top: var(--space-6);">
                        <h4>Secondary Muscles</h4>
                        <div class="muscle-tags">
                            ${exercise.secondaryMuscles.map(muscle => 
                                `<span class="muscle-tag">${muscle}</span>`
                            ).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        // Modal close functionality
        document.getElementById('modalClose').addEventListener('click', function() {
            closeModal();
        });

        document.getElementById('exerciseModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function closeModal() {
            document.getElementById('exerciseModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
