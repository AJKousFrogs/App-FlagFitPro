name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: "22"
  NPM_VERSION: "10"

jobs:
  backend-audits:
    name: Backend Audit Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Error shape audit
        run: node scripts/audit-error-shape-contracts.js

      - name: RLS boundary audit
        run: node scripts/audit-rls-boundaries.js

      - name: Rate-limit audit
        run: node scripts/audit-rate-limit-coverage.js

      - name: DB resilience audit
        run: node scripts/audit-db-resilience.js

      - name: SCSS duplication audit
        run: npm run audit:scss-duplications:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for changed files detection

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Enforce no encapsulation hacks
        run: |
          if rg -n "::ng-deep" angular/src; then
            echo "::ng-deep usage detected. Use global overrides or CSS variables instead."
            exit 1
          fi

  design-system-enforcement:
    name: Design System Enforcement (Changed Files)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for changed files detection

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: cd angular && npm ci --legacy-peer-deps

      - name: Check changed files
        id: changed-files
        run: |
          CHANGED=$(bash scripts/get-changed-files.sh)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then
            echo "Files changed:"
            echo "$CHANGED" | tr ' ' '\n'
          else
            echo "No SCSS/CSS files changed"
          fi

      - name: Lint changed files (strict enforcement)
        if: steps.changed-files.outputs.changed != ''
        run: npm run lint:css:changed
        continue-on-error: false

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test
        env:
          CI: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-reports
          path: angular/coverage/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: Run smoke tests
        run: npm run e2e:smoke
        env:
          CI: true
          BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: playwright-report
          path: angular/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dist
          path: angular/dist/
          retention-days: 7

  a11y-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: angular/package-lock.json

      - name: Restore build
        uses: actions/download-artifact@v4.4.0
        with:
          name: dist

      - name: Install dependencies for audit script
        run: cd angular && npm ci --legacy-peer-deps

      - name: Serve and run a11y audit
        run: |
          npx serve -s flagfit-pro/browser -l 4200 &
          npx wait-on http://localhost:4200 --timeout 60000
          cd angular && BASE_URL=http://localhost:4200 npm run audit:a11y
