name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Node version is pinned in a single place — .nvmrc — and every setup-node
# step below reads it via node-version-file so CI, local dev, and Netlify never drift.

jobs:
  backend-audits:
    name: Backend Audit Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Error shape audit
        run: node scripts/audit-error-shape-contracts.js

      - name: RLS boundary audit
        run: node scripts/audit-rls-boundaries.js

      - name: Rate-limit audit
        run: node scripts/audit-rate-limit-coverage.js

      - name: DB resilience audit
        run: node scripts/audit-db-resilience.js

      - name: SCSS duplication audit
        run: npm run audit:scss-duplications:ci

      - name: Local persistence audit
        run: npm run audit:local-persistence

  backend-tests:
    name: Backend Tests (Netlify functions)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Backend unit suite (pure, no DB)
        run: npm run test:unit:backend
      - name: Backend integration suite (mocked, no DB)
        run: npm run test:backend

  db-integration:
    name: DB Integration (RLS matrix, seed integrity, consent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # The RLS-matrix / seed-integrity / consent suites self-skip without DB
      # creds (describe.skipIf), so this job is SAFE on forks/PRs with no secrets.
      # Configure the DEV_SUPABASE_* repo secrets to point at a DEV / branch
      # Supabase (NEVER production) to make them execute — the RLS matrix seeds
      # and tears down real auth users + teams.
      - name: Privacy / RLS-matrix / seed-integrity suite
        run: npm run test:privacy
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
      - name: ACWR regression (real DB)
        run: npm run test:acwr
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
      - name: Schema-drift guard (fails on NEW column/table drift)
        run: npm run audit:schema-drift
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for changed files detection

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Enforce no encapsulation hacks
        run: |
          if git grep -n "::ng-deep" -- src; then
            echo "::ng-deep usage detected. Use global overrides or CSS variables instead."
            exit 1
          fi

  design-system-enforcement:
    name: Design System Enforcement (Changed Files)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for changed files detection

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Angular dependencies
        run: cd angular && npm ci --legacy-peer-deps

      - name: Check changed files
        id: changed-files
        run: |
          CHANGED=$(bash scripts/get-changed-files.sh)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then
            echo "Files changed:"
            echo "$CHANGED" | tr ' ' '\n'
          else
            echo "No SCSS/CSS files changed"
          fi

      - name: Lint changed files (strict enforcement)
        if: steps.changed-files.outputs.changed != ''
        run: npm run lint:css:changed
        continue-on-error: false

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm test
        run: npm test
        env:
          CI: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: angular/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # Smoke E2E coverage lives in e2e-tests.yml (which also runs the critical-flow
  # suite on the same push/PR triggers) — a separate `e2e-smoke` job here duplicated
  # that full build+serve+Playwright run on every PR. Removed 2026-07-01.

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: angular/dist/
          if-no-files-found: error
          retention-days: 7

  a11y-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Restore build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: angular/dist

      - name: Install dependencies for audit script
        run: cd angular && npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: cd angular && npx playwright install --with-deps chromium

      - name: Serve and run a11y audit
        run: |
          cd angular
          npm run serve:dist &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          node -e "const http=require('http');const start=Date.now();(function ping(){http.get('http://127.0.0.1:4200',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>Date.now()-start>60000?process.exit(1):setTimeout(ping,500));})();"
          BASE_URL=http://127.0.0.1:4200 npm run audit:a11y
