name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (Smoke + Critical Flow)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          cd angular && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: angular

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start application server
        run: |
          npm run start &
          echo "Waiting for server to start..."
          sleep 10
          timeout 60 bash -c 'until curl -f http://localhost:4200; do sleep 2; done'
        env:
          BASE_URL: http://localhost:4200

      - name: Run smoke tests
        run: npx playwright test e2e/smoke.spec.ts --project=chromium
        working-directory: angular
        env:
          BASE_URL: http://localhost:4200
          CI: true

      - name: Run critical flow tests
        run: |
          npx playwright test e2e/critical-flow-morning-training.spec.ts --project=chromium
        working-directory: angular
        env:
          BASE_URL: http://localhost:4200
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          CI: true
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: angular/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: angular/test-results/
          retention-days: 7
