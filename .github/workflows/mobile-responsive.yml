name: Mobile Responsive Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  responsive-tests:
    name: Test Mobile Devices
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      # Both the root tooling (Playwright) AND the Angular app must be installed:
      # the previous workflow only ran the root `npm ci`, so `build:production`
      # (which runs `ng build` inside angular/) failed for lack of @angular/* deps.
      - name: Install dependencies
        run: |
          npm ci
          cd angular && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build production bundle
        run: npm run build:production

      # Serve the built bundle on :4200 and run the tests in the SAME step so the
      # background server stays alive for the test run. (Previously the workflow
      # started `netlify dev` on :8888 but waited on :4200 — a port mismatch that
      # could never come up.) PW_SKIP_WEBSERVER stops Playwright double-starting it.
      - name: Serve bundle and run responsive tests (shard ${{ matrix.shard }}/3)
        run: |
          (cd angular && npm run serve:dist &)
          node -e "const http=require('http');const s=Date.now();(function p(){http.get('http://127.0.0.1:4200',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>Date.now()-s>120000?process.exit(1):setTimeout(p,1000));})();"
          npx playwright test tests/responsive/mobile-devices.test.js --project=chromium --shard=${{ matrix.shard }}/3 --reporter=html,json
        env:
          PW_SKIP_WEBSERVER: "1"
          BASE_URL: http://127.0.0.1:4200
          CI: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 30

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd angular && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build production bundle
        run: npm run build:production

      - name: Serve bundle and run visual regression tests
        run: |
          (cd angular && npm run serve:dist &)
          node -e "const http=require('http');const s=Date.now();(function p(){http.get('http://127.0.0.1:4200',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>Date.now()-s>120000?process.exit(1):setTimeout(p,1000));})();"
          npx playwright test tests/responsive/visual-regression.test.js --project=chromium --reporter=html
        env:
          PW_SKIP_WEBSERVER: "1"
          BASE_URL: http://127.0.0.1:4200
          CI: "true"

      - name: Upload visual test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: tests/responsive/**/*.png
          retention-days: 30

  report:
    name: Generate Test Report
    needs: [responsive-tests, visual-regression]
    runs-on: ubuntu-latest
    if: always()
    # Needed for the PR comment below; without it the default token is read-only.
    permissions:
      pull-requests: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge test results
        run: |
          mkdir -p merged-report
          echo "# 📱 Mobile Responsive Test Results" > merged-report/SUMMARY.md
          echo "" >> merged-report/SUMMARY.md
          echo "## Test Coverage" >> merged-report/SUMMARY.md
          echo "" >> merged-report/SUMMARY.md
          echo "### iPhone Devices ✅" >> merged-report/SUMMARY.md
          echo "- iPhone SE (3rd gen)" >> merged-report/SUMMARY.md
          echo "- iPhone 12/13/14" >> merged-report/SUMMARY.md
          echo "- iPhone 14 Pro Max" >> merged-report/SUMMARY.md
          echo "- iPhone 15 Pro" >> merged-report/SUMMARY.md
          echo "- iPhone 15 Pro Max" >> merged-report/SUMMARY.md
          echo "" >> merged-report/SUMMARY.md
          echo "### Samsung Galaxy Devices ✅" >> merged-report/SUMMARY.md
          echo "- Galaxy S8, S20, S21, S22, S23, S24" >> merged-report/SUMMARY.md
          echo "- Galaxy A52" >> merged-report/SUMMARY.md
          echo "- Galaxy Z Fold 4" >> merged-report/SUMMARY.md
          echo "" >> merged-report/SUMMARY.md
          echo "### Xiaomi Devices ✅" >> merged-report/SUMMARY.md
          echo "- Mi 11" >> merged-report/SUMMARY.md
          echo "- Redmi Note 10, 11" >> merged-report/SUMMARY.md
          echo "- Xiaomi 12, 13" >> merged-report/SUMMARY.md
          echo "- Poco X3" >> merged-report/SUMMARY.md
          echo "" >> merged-report/SUMMARY.md
          echo "**Total:** 22 devices tested" >> merged-report/SUMMARY.md

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: merged-report/
          retention-days: 90

      - name: Comment PR
        # Dependabot PRs run with a read-only GITHUB_TOKEN, so createComment would
        # 403 and fail the job. Skip the (cosmetic) comment for those runs — the
        # summary artifact is still uploaded above for every run.
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('merged-report/SUMMARY.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  performance-check:
    name: Mobile Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            angular/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd angular && npm ci

      - name: Build production bundle
        run: npm run build:production

      # Lighthouse starts/stops its own server via .lighthouserc.json
      # (collect.startServerCommand) so the URLs below are actually reachable.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./.lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check mobile performance budgets
        run: |
          echo "Checking mobile performance metrics..."
          echo "Target: FCP < 1.8s, LCP < 2.5s, TTI < 3.8s"
