name: Scheduled Tasks

on:
  schedule:
    # Run security audit daily at 6 AM UTC
    - cron: "0 6 * * *"
    # Run dependency updates check weekly on Monday at 7 AM UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - security-audit
          - dependency-check
          - all

env:
  NODE_VERSION: "22"

jobs:
  security-audit:
    name: Daily Security Audit
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.task == 'security-audit' || github.event.inputs.task == 'all'
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit-results.json 2>&1 || true
          VULNS=$(cat audit-results.json | jq '.metadata.vulnerabilities | .high + .critical' 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_id }}
          path: audit-results.json
          retention-days: 30

      - name: Create issue for vulnerabilities
        if: steps.audit.outputs.vulnerabilities > 0
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
            const vulns = audit.metadata?.vulnerabilities || {};

            const title = `🔒 Security Alert: ${vulns.high || 0} high, ${vulns.critical || 0} critical vulnerabilities`;
            const body = `## Security Audit Results

            | Severity | Count |
            |----------|-------|
            | Critical | ${vulns.critical || 0} |
            | High | ${vulns.high || 0} |
            | Moderate | ${vulns.moderate || 0} |
            | Low | ${vulns.low || 0} |

            Run \`npm audit\` locally for details.

            ---
            *Generated by scheduled security audit on ${new Date().toISOString()}*`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open'
            });

            const existingIssue = issues.data.find(i => i.title.includes('Security Alert'));

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated']
              });
            }

  dependency-check:
    name: Weekly Dependency Check
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 1' || github.event.inputs.task == 'dependency-check' || github.event.inputs.task == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated.json 2>&1 || true
          OUTDATED_COUNT=$(cat outdated.json | jq 'length' 2>/dev/null || echo "0")
          echo "count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ github.run_id }}
          path: outdated.json
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## 📦 Dependency Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Outdated packages:** ${{ steps.outdated.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`npm outdated\` locally for details." >> $GITHUB_STEP_SUMMARY
