name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0)"
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Angular dependencies
        run: cd angular && npm ci --legacy-peer-deps

      - name: Run npm test
        run: npm test

      - name: Run consent check
        run: npm run check:consent:ci

      - name: Run privacy tests
        run: npm run test:privacy:ci

      - name: Build application for a11y audit
        run: npm run build

      - name: Install Playwright browsers for a11y audit
        run: cd angular && npx playwright install --with-deps chromium

      - name: Run accessibility audit
        run: |
          cd angular
          npm run serve:dist &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          node -e "const http=require('http');const start=Date.now();(function ping(){http.get('http://127.0.0.1:4200',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>Date.now()-start>60000?process.exit(1):setTimeout(ping,500));})();"
          BASE_URL=http://127.0.0.1:4200 npm run audit:a11y

      - name: Run security audit
        run: npm run security:check
        continue-on-error: true

  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Angular dependencies
        run: cd angular && npm ci --legacy-peer-deps

      - name: Build for production
        run: npm run build:production
        env:
          NODE_ENV: production

      - name: Create release archive
        run: |
          cd angular
          tar -czf ../release.tar.gz dist/
          zip -r ../release.zip dist/

      - name: Get version
        id: version
        run: |
          # Priority: explicit dispatch input → tag ref → a safe dev fallback.
          # The fallback matters for workflow_dispatch runs (no tag): without it
          # the version resolved to the raw ref (`refs/heads/main`), whose `/`
          # then made an invalid artifact name and failed the job. Never emit a
          # value with characters disallowed in artifact names.
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" -20 >> CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release.tar.gz
            release.zip
          body_path: CHANGELOG.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-build-${{ steps.version.outputs.version }}
          path: |
            release.tar.gz
            release.zip
          retention-days: 90

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')
    environment:
      name: production
      url: https://flagfit.pro
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Angular dependencies
        run: cd angular && npm ci --legacy-peer-deps

      - name: Build for production
        run: npm run build:production
        env:
          NODE_ENV: production

      - name: Deploy to Netlify Production
        uses: nwtgck/actions-netlify@v4
        with:
          publish-dir: "./angular/dist/flagfit-pro/browser"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy ${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Notify deployment success
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://flagfit.pro" >> $GITHUB_STEP_SUMMARY
