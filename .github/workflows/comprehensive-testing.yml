name: Comprehensive Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily performance tests at 2 AM UTC
    - cron: "0 2 * * *"

env:
  NODE_VERSION: "18"
  POSTGRES_VERSION: "14"
  PLAYWRIGHT_BROWSERS_PATH: 0

jobs:
  # Code Quality and Linting
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js || true

      - name: Run Prettier
        run: npm run lint:format || true

      - name: Run TypeScript checking
        run: npm run type-check || true

      - name: Security audit
        run: npm audit --audit-level high

      - name: Upload code quality results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-results
          path: |
            eslint-report.json
            prettier-report.json
            security-audit.json

  # Unit Testing
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage --reporter=verbose

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unit-tests
          name: unit-tests-node-${{ matrix.node-version }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/

  # Integration Testing
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flagfit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npm run db:migrate:test
          npm run db:seed:test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfit_test
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: npm run test:integration -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfit_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/

  # End-to-End Testing
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        device: [desktop, mobile]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Start application
        run: |
          npm run build
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          NODE_ENV: test

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}-${{ matrix.device }} --reporter=html
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-${{ matrix.browser }}-${{ matrix.device }}

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}-${{ matrix.device }}
          path: |
            playwright-report-*/
            test-results/

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf-test]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: |
          npm run build
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          NODE_ENV: production

      - name: Run performance tests
        run: npm run test:performance
        env:
          PERFORMANCE_TEST_DURATION: 300 # 5 minutes for CI

      - name: Run load tests
        run: npm run test:load
        env:
          MAX_VIRTUAL_USERS: 100 # Limited for CI environment

      - name: Generate performance report
        run: |
          npm run performance:report
          npm run performance:compare # Compare with baseline

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: |
            performance-reports/
            load-test-results/
            performance-comparison.json

  # Security Testing
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run audit:security

      - name: Run dependency check
        run: npm run security:dependency-check

      - name: Run SAST scan
        run: npm run security:sast-scan || true

      - name: Start application for DAST
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          NODE_ENV: test

      - name: Run DAST scan
        run: npm run security:dast-scan || true

      - name: Upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            security-reports/
            vulnerability-scan.json

  # Accessibility Testing
  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          NODE_ENV: test

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Run WCAG compliance check
        run: npm run a11y:wcag-check

      - name: Upload accessibility results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-test-results
          path: |
            accessibility-reports/
            wcag-compliance.json

  # Cross-browser Testing
  cross-browser-tests:
    name: Cross-browser Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chrome, firefox, edge, safari]
        exclude:
          # Safari only runs on macOS
          - os: ubuntu-latest
            browser: safari
          - os: windows-latest
            browser: safari
          # Edge only runs on Windows and macOS
          - os: ubuntu-latest
            browser: edge
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup browser environment
        run: npm run browser:setup:${{ matrix.browser }}

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000

      - name: Run cross-browser tests
        run: npm run test:cross-browser -- --browser=${{ matrix.browser }}

      - name: Upload cross-browser results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cross-browser-results-${{ matrix.os }}-${{ matrix.browser }}
          path: test-results/

  # Mobile Testing
  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [iPhone13, PixelXL, iPadAir, GalaxyTab]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000

      - name: Run mobile tests
        run: npx playwright test --project=${{ matrix.device }}

      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results-${{ matrix.device }}
          path: |
            playwright-report/
            test-results/

  # API Testing
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flagfit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npm run db:migrate:test
          npm run db:seed:test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfit_test

      - name: Start API server
        run: |
          npm run start:api &
          npx wait-on http://localhost:3001/health --timeout 60000
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfit_test
          NODE_ENV: test

      - name: Run API tests
        run: npm run test:api

      - name: Run API contract tests
        run: npm run test:api:contracts

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            api-test-results/
            contract-test-results/

  # Test Results Summary
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        unit-tests,
        integration-tests,
        e2e-tests,
        api-tests,
        accessibility-tests,
      ]
    if: always()
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4

      - name: Generate test summary
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test results
          UNIT_TESTS=$(find . -name "unit-test-results*" -type d | wc -l)
          INTEGRATION_TESTS=$(find . -name "integration-test-results*" -type d | wc -l)
          E2E_TESTS=$(find . -name "e2e-results*" -type d | wc -l)

          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: $UNIT_TESTS node versions tested" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: $INTEGRATION_TESTS test suites" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: $E2E_TESTS browser/device combinations" >> $GITHUB_STEP_SUMMARY

          # Check for failures
          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then
            echo "❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "❌ Integration tests failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "❌ E2E tests failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ E2E tests passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" = "success" ] && [ "${{ needs.integration-tests.result }}" = "success" ] && [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "🚀 Ready for deployment" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Not ready for deployment - tests failing" >> $GITHUB_STEP_SUMMARY
          fi

  # Deployment (only on main branch with passing tests)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: github.ref == 'refs/heads/main' && success()
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to staging
        run: npm run deploy:staging
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          STAGING_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

      - name: Run smoke tests on staging
        run: npm run test:smoke -- --baseURL=${{ env.STAGING_URL }}
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "🎉 Flag Football Training App deployed to staging successfully!"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Workflow notifications
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        unit-tests,
        integration-tests,
        e2e-tests,
        api-tests,
        accessibility-tests,
      ]
    if: failure()
    steps:
      - name: Notify team of test failures
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ Flag Football Training App tests failed. Check the workflow for details."
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
