<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagFit Pro - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- New Modular CSS Architecture -->
    <link rel="stylesheet" href="./src/css/main.css">
    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./src/icon-helper.js"></script>
    <style>
        /* Page-specific styles that can't be replaced with utilities */
        body {
            background: var(--surface-primary);
            min-height: 100vh;
        }
        .register-container {
            max-width: 450px;
            border: 2px solid var(--color-brand-primary);
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border-secondary);
        }
        .register-btn {
            background: linear-gradient(135deg, var(--color-brand-primary) 0%, var(--color-brand-secondary) 100%);
            min-height: 50px;
        }
        .register-btn:hover {
            background: linear-gradient(135deg, var(--color-brand-secondary) 0%, var(--color-brand-tertiary) 100%);
        }
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body class="u-display-flex u-align-center u-justify-center u-padding-20">
    <div class="register-container u-bg-primary u-radius-xl u-shadow-md u-padding-40 u-width-full u-text-center">
        <div class="logo u-text-display-lg u-margin-bottom-10 u-text-brand"><i data-lucide="football" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i></div>
        <h1 class="title u-text-heading-xl u-font-weight-700 u-text-primary u-margin-bottom-30">Create Your Account</h1>
        
        <div class="demo-note u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success" style="border: 1px solid var(--color-brand-primary);">
            <strong>Demo Mode:</strong> Enter any information to create a demo account.
        </div>

        <div class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md" id="errorMessage" style="display: none; border: 1px solid var(--color-status-error);"></div>
        <div class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md" id="successMessage" style="display: none; border: 1px solid var(--color-status-success);"></div>

        <form id="registerForm">
            <div class="form-group u-margin-bottom-20 u-text-left">
                <label for="name" class="u-display-block u-margin-bottom-8 u-font-weight-500 u-text-secondary u-text-label-sm">Full Name</label>
                <input type="text" id="name" name="name" class="u-width-full u-padding-16 u-radius-md u-text-body-md" placeholder="Enter your full name" required style="border: 2px solid var(--color-border-secondary); transition: all 0.3s ease;">
            </div>

            <div class="form-group u-margin-bottom-20 u-text-left">
                <label for="email" class="u-display-block u-margin-bottom-8 u-font-weight-500 u-text-secondary u-text-label-sm">Email</label>
                <input type="email" id="email" name="email" class="u-width-full u-padding-16 u-radius-md u-text-body-md" placeholder="Enter your email" required style="border: 2px solid var(--color-border-secondary); transition: all 0.3s ease;">
            </div>

            <div class="form-group u-margin-bottom-20 u-text-left">
                <label for="password" class="u-display-block u-margin-bottom-8 u-font-weight-500 u-text-secondary u-text-label-sm">Password</label>
                <input type="password" id="password" name="password" class="u-width-full u-padding-16 u-radius-md u-text-body-md" placeholder="Create a password" required style="border: 2px solid var(--color-border-secondary); transition: all 0.3s ease;">
            </div>

            <div class="form-group u-margin-bottom-20 u-text-left">
                <label for="confirmPassword" class="u-display-block u-margin-bottom-8 u-font-weight-500 u-text-secondary u-text-label-sm">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="u-width-full u-padding-16 u-radius-md u-text-body-md" placeholder="Confirm your password" required style="border: 2px solid var(--color-border-secondary); transition: all 0.3s ease;">
            </div>

            <button type="submit" class="register-btn u-width-full u-padding-16 u-text-white u-border-none u-radius-md u-text-body-md u-font-weight-600 u-display-flex u-align-center u-justify-center u-gap-10 u-margin-bottom-20 u-cursor-pointer" style="transition: all 0.3s ease;">
                <span style="display: inline-flex; align-items: center; justify-content: center; line-height: 1em; height: 1em; margin: 0; padding: 0; font-size: 1.2em;">🚀</span>
                <span style="display: inline-flex; align-items: center; justify-content: center; line-height: 1em; height: 1em; margin: 0; padding: 0;">Create Account</span>
            </button>
        </form>

        <div class="divider u-margin-y-20 u-display-flex u-align-center u-text-body-sm u-text-tertiary">
            <span class="u-padding-x-16">Already have an account?</span>
        </div>

        <a href="/login.html" class="login-link u-text-brand u-font-weight-500" style="text-decoration: none;">Sign in here</a>
    </div>

    <script type="module">
        import { authManager } from './src/auth-manager.js';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Hide any existing messages
            hideMessage('errorMessage');
            hideMessage('successMessage');
            
            // Validate all form inputs
            if (!validateRegisterForm(name, email, password, confirmPassword)) {
                return;
            }
            
            // Show loading state
            const submitButton = this.querySelector('button[type="submit"]');
            const originalText = submitButton.innerHTML;
            submitButton.innerHTML = '<span>⏳</span> Creating Account...';
            submitButton.disabled = true;
            
            const result = await authManager.register({
                name: name,
                email: email,
                password: password
            });
            
            if (result.success) {
                setTimeout(() => {
                    authManager.redirectToDashboard();
                }, 1500);
            }
        });

        // Pre-fill with demo data for easy testing (development only)
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Lucide icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            const isDemoMode = window.location.hostname === 'localhost' || 
                              window.location.hostname === '127.0.0.1' ||
                              window.location.search.includes('demo=true');
            
            if (isDemoMode) {
                document.getElementById('name').value = 'Demo User';
                document.getElementById('email').value = 'demo@flagfitpro.com';
                document.getElementById('password').value = 'demo123';
                document.getElementById('confirmPassword').value = 'demo123';
            }
        });

        // Form validation functions
        function validateRegisterForm(name, email, password, confirmPassword) {
            // Name validation
            if (!name || name.trim().length < 2) {
                showMessage('errorMessage', 'Please enter a valid full name (at least 2 characters).');
                return false;
            }
            
            // Email validation
            if (!email || email.trim() === '') {
                showMessage('errorMessage', 'Please enter your email address.');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('errorMessage', 'Please enter a valid email address.');
                return false;
            }
            
            // Password validation
            if (!password || password.length < 8) {
                showMessage('errorMessage', 'Password must be at least 8 characters long.');
                return false;
            }
            
            // Password strength validation
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /\d/.test(password);
            
            if (!hasUpperCase || !hasLowerCase || !hasNumbers) {
                showMessage('errorMessage', 'Password must contain at least one uppercase letter, one lowercase letter, and one number.');
                return false;
            }
            
            // Password confirmation validation
            if (password !== confirmPassword) {
                showMessage('errorMessage', 'Passwords do not match.');
                return false;
            }
            
            return true;
        }
        
        function showMessage(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
        
        function hideMessage(elementId) {
            const element = document.getElementById(elementId);
            element.style.display = 'none';
        }
    </script>
</body>
</html>
