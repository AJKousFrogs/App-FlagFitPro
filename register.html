<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Create Account</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- New Modular CSS Architecture -->
    <link rel="stylesheet" href="./src/css/main.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="./src/css/pages/register.css" />
    <!-- Auth footer styles -->
    <link rel="stylesheet" href="./src/css/components/footer-auth.css" />

    <!-- Lucide Icons - Modern icon library similar to Radix UI -->
    <script
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./src/icon-helper.js" defer></script>
    <!-- Universal Components -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- Universal Form Validator -->
    <script type="module" src="./src/js/components/universal-form-validator.js" defer></script>
    <!-- Footer Loader (Dynamic Component) -->
    <script type="module" src="./src/js/components/footer-loader.js" defer></script>
  </head>
  <body class="page-auth">
    <div
      class="register-container card card-elevated w-full max-w-md mx-auto text-center"
    >
      <div class="register-logo mb-6 text-primary">
        <i data-lucide="activity" aria-hidden="true" class="icon-24"></i>
      </div>
      <h1 class="register-title text-2xl font-bold text-primary mb-6">
        Create Your Account
      </h1>

      <div
        class="demo-note u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success"
        style="border: 1px solid var(--color-brand-primary)"
      >
        <strong>Demo Mode:</strong> Enter any information to create a demo
        account.
      </div>

      <div
        class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md"
        id="errorMessage"
        style="display: none; border: 1px solid var(--color-status-error)"
      ></div>
      <div
        class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md"
        id="successMessage"
        style="display: none; border: 1px solid var(--color-status-success)"
      ></div>

      <form id="registerForm">
        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="name" class="form-label required">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-input"
            placeholder="Enter your full name"
            required
            autocomplete="name"
            aria-describedby="name-error name-success"
            aria-invalid="false"
          />
          <div
            id="name-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small id="name-success" class="form-success" style="display: none"
            >Valid name</small
          >
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="email" class="form-label required">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter your email"
            required
            autocomplete="email"
            aria-describedby="email-error email-success"
            aria-invalid="false"
          />
          <div
            id="email-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small id="email-success" class="form-success" style="display: none"
            >Valid email</small
          >
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="password" class="form-label required">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Create a password"
            required
            autocomplete="new-password"
            aria-describedby="password-error password-success password-requirements-register"
            aria-invalid="false"
          />
          <div
            id="password-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small
            id="password-success"
            class="form-success"
            style="display: none"
            >Password is valid</small
          >
          <div
            id="password-requirements-register"
            class="password-requirements u-margin-top-4 u-text-body-sm u-text-tertiary"
            role="note"
          >
            Password must be at least 8 characters and include uppercase,
            lowercase, number, and special character.
          </div>
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="confirmPassword" class="form-label required"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="Confirm your password"
            required
            autocomplete="new-password"
            aria-describedby="confirmPassword-error confirmPassword-success"
            aria-invalid="false"
          />
          <div
            id="confirmPassword-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small
            id="confirmPassword-success"
            class="form-success"
            style="display: none"
            >Passwords match</small
          >
        </div>

        <button
          type="submit"
          class="register-btn u-width-full u-padding-16 u-text-white u-border-none u-radius-md u-text-body-md u-font-weight-600 u-display-flex u-align-center u-justify-center u-gap-10 u-margin-bottom-20 u-cursor-pointer"
          style="transition: all 0.3s ease"
        >
          <span
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              line-height: 1em;
              height: 1em;
              margin: 0;
              padding: 0;
              font-size: 1.2em;
            "
            >🚀</span
          >
          <span
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              line-height: 1em;
              height: 1em;
              margin: 0;
              padding: 0;
            "
            >Create Account</span
          >
        </button>
      </form>

      <div
        class="divider u-margin-y-20 u-display-flex u-align-center u-text-body-sm u-text-tertiary"
      >
        <span class="u-padding-x-16">Already have an account?</span>
      </div>

      <a
        href="/login.html"
        class="login-link u-text-brand u-font-weight-500"
        style="text-decoration: none"
        >Sign in here</a
      >
    </div>

    <script type="module">
      import { authManager } from "./src/auth-manager.js";
      import { profileCompletionManager } from "./src/profile-completion.js";
      import { validateEmail } from "./src/js/utils/shared.js";
      import { showMessage, hideMessage, clearMessages, showSuccess, showError } from "./src/js/utils/message-utils.js";

      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // Hide any existing messages
          clearMessages("errorMessage", "successMessage");

          // Validate all form inputs
          if (!validateRegisterForm(name, email, password, confirmPassword)) {
            return;
          }

          // Show loading state
          const submitButton = this.querySelector('button[type="submit"]');
          const originalText = submitButton.innerHTML;
          submitButton.innerHTML =
            '<span class="spinner-mini" style="display: inline-block; margin-right: 8px;"></span> Creating Account...';
          submitButton.disabled = true;

          const result = await authManager.register({
            name: name,
            email: email,
            password: password,
          });

          if (result.success) {
            // Show success message with email verification instructions
            showSuccess("successMessage",
              "Account created successfully! Please check your email to verify your account before signing in.",
              null // Don't auto-hide success messages
            );

            // Clear the form
            document.getElementById("registerForm").reset();

            // Reset button state
            submitButton.innerHTML = originalText;
            submitButton.disabled = false;

            // Redirect to login after 5 seconds
            setTimeout(() => {
              window.location.href = "/login.html?registered=true";
            }, 5000);
          } else {
            submitButton.innerHTML = originalText;
            submitButton.disabled = false;
          }
        });

      // Pre-fill with demo data for easy testing (development only)
      document.addEventListener("DOMContentLoaded", function () {
        const isDemoMode =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.search.includes("demo=true");

        if (isDemoMode) {
          document.getElementById("name").value = "Demo User";
          document.getElementById("email").value = "demo@flagfitpro.com";
          document.getElementById("password").value = "demo123";
          document.getElementById("confirmPassword").value = "demo123";
        }

        // Form validation is handled by UniversalFormValidator (auto-initialized)
      });

      // Form validation is handled by UniversalFormValidator
      function validateRegisterForm(name, email, password, confirmPassword) {
        // Basic validation - detailed validation handled by UniversalFormValidator
        if (!name || name.trim() === "") {
          showError("errorMessage", "Please enter your name.");
          return false;
        }
        if (!email || email.trim() === "") {
          showError("errorMessage", "Please enter your email address.");
          return false;
        }
        if (!password || password.trim() === "") {
          showError("errorMessage", "Please enter a password.");
          return false;
        }
        if (password !== confirmPassword) {
          showError("errorMessage", "Passwords do not match.");
          return false;
        }
        return true;
      }
    </script>

        <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
</html>
