  <body class="page-auth">
    <div
      class="register-container card card-elevated w-full max-w-md mx-auto text-center"
    >
      <div class="register-logo mb-6 text-primary">
        <i data-lucide="activity" aria-hidden="true" class="icon-24"></i>
      </div>
      <h1 class="register-title text-2xl font-bold text-primary mb-6">
        Create Your Account
      </h1>

      <div
        class="error-message u-bg-error u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-error u-radius-md"
        id="errorMessage"
        style="display: none; border: 1px solid var(--color-status-error)"
      ></div>
      <div
        class="success-message u-bg-success u-padding-16 u-margin-bottom-20 u-text-body-sm u-text-success u-radius-md"
        id="successMessage"
        style="display: none; border: 1px solid var(--color-status-success)"
      ></div>

      <form id="registerForm">
        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="name" class="form-label required">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-input"
            placeholder="Enter your full name"
            required
            autocomplete="name"
            aria-describedby="name-error name-success"
            aria-invalid="false"
          />
          <div
            id="name-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small id="name-success" class="form-success" style="display: none"
            >Valid name</small
          >
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="email" class="form-label required">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter your email"
            required
            autocomplete="email"
            aria-describedby="email-error email-success"
            aria-invalid="false"
          />
          <div
            id="email-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small id="email-success" class="form-success" style="display: none"
            >Valid email</small
          >
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="password" class="form-label required">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Create a password"
            required
            autocomplete="new-password"
            aria-describedby="password-error password-success password-requirements-register"
            aria-invalid="false"
          />
          <div
            id="password-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small
            id="password-success"
            class="form-success"
            style="display: none"
            >Password is valid</small
          >
          <div
            id="password-requirements-register"
            class="password-requirements u-margin-top-4 u-text-body-sm u-text-tertiary"
            role="note"
          >
            Password must be at least 8 characters and include uppercase,
            lowercase, number, and special character.
          </div>
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label for="confirmPassword" class="form-label required"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="Confirm your password"
            required
            autocomplete="new-password"
            aria-describedby="confirmPassword-error confirmPassword-success"
            aria-invalid="false"
          />
          <div
            id="confirmPassword-error"
            class="form-error"
            role="alert"
            style="display: none"
          ></div>
          <small
            id="confirmPassword-success"
            class="form-success"
            style="display: none"
            >Passwords match</small
          >
        </div>

        <div class="form-group u-margin-bottom-20 u-text-left">
          <label class="form-label required">I am registering as</label>
          <div class="role-selector" style="display: flex; gap: 16px; margin-top: 8px;">
            <label class="role-option" style="flex: 1; padding: 16px; border: 2px solid var(--color-border-primary, #e0e0e0); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 8px;">
              <input
                type="radio"
                name="role"
                value="player"
                id="rolePlayer"
                checked
                required
                style="margin: 0;"
                aria-describedby="role-help"
              />
              <span style="font-weight: 600; font-size: 1.1em;">🏈 Player</span>
              <span style="font-size: 0.9em; color: var(--color-text-secondary, #666); text-align: center;">Track performance, join teams, train</span>
            </label>
            <label class="role-option" style="flex: 1; padding: 16px; border: 2px solid var(--color-border-primary, #e0e0e0); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 8px;">
              <input
                type="radio"
                name="role"
                value="coach"
                id="roleCoach"
                required
                style="margin: 0;"
                aria-describedby="role-help"
              />
              <span style="font-weight: 600; font-size: 1.1em;">👔 Coach</span>
              <span style="font-size: 0.9em; color: var(--color-text-secondary, #666); text-align: center;">Manage teams, create training plans</span>
            </label>
          </div>
          <small id="role-help" class="form-help" style="display: block; margin-top: 8px;">Select your role to customize your experience</small>
        </div>

        <button
          type="submit"
          class="register-btn u-width-full u-padding-16 u-text-white u-border-none u-radius-md u-text-body-md u-font-weight-600 u-display-flex u-align-center u-justify-center u-gap-10 u-margin-bottom-20 u-cursor-pointer"
          style="transition: all 0.3s ease"
        >
          <span
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              line-height: 1em;
              height: 1em;
              margin: 0;
              padding: 0;
              font-size: 1.2em;
            "
            >🚀</span
          >
          <span
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              line-height: 1em;
              height: 1em;
              margin: 0;
              padding: 0;
            "
            >Create Account</span
          >
        </button>
      </form>

      <!-- OAuth Social Login Buttons - Disabled (using email/password only) -->
      <!-- <div id="oauthContainer"></div> -->

      <div
        class="divider u-margin-y-20 u-display-flex u-align-center u-text-body-sm u-text-tertiary"
      >
        <span class="u-padding-x-16">Already have an account?</span>
      </div>

      <a
        href="/login.html"
        class="login-link u-text-brand u-font-weight-500"
        style="text-decoration: none"
        >Sign in here</a
      >
    </div>

    <script type="module">
      import { authManager } from "./src/auth-manager.js";
      import { profileCompletionManager } from "./src/profile-completion.js";
      import { validateEmail } from "./src/js/utils/shared.js";
      import { showMessage, hideMessage, clearMessages, showSuccess, showError } from "./src/js/utils/message-utils.js";
      // OAuth disabled - using email/password only
      // import { OAuthButtons } from "./src/components/oauth-buttons.js";

      // OAuth buttons disabled - using email/password authentication only
      // const oauthButtons = new OAuthButtons('#oauthContainer', {
      //   onRoleSelect: async (provider, role) => {
      //     console.log(`🔐 OAuth registration initiated: ${provider} as ${role}`);
      //     await authManager.signInWithOAuth(provider, role);
      //   }
      // });

      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const role = document.querySelector('input[name="role"]:checked')?.value || 'player';

          // Hide any existing messages
          clearMessages("errorMessage", "successMessage");

          // Validate all form inputs
          if (!validateRegisterForm(name, email, password, confirmPassword)) {
            return;
          }

          // Show loading state
          const submitButton = this.querySelector('button[type="submit"]');
          const originalText = submitButton.innerHTML;
          submitButton.innerHTML =
            '<span class="spinner-mini" style="display: inline-block; margin-right: 8px;"></span> Creating Account...';
          submitButton.disabled = true;

          const result = await authManager.register({
            name: name,
            email: email,
            password: password,
            role: role,
          });

          if (result.success) {
            // Show success message with email verification instructions
            showSuccess("successMessage",
              "Account created successfully! Please check your email to verify your account before signing in.",
              null // Don't auto-hide success messages
            );

            // Clear the form
            document.getElementById("registerForm").reset();

            // Reset button state
            submitButton.innerHTML = originalText;
            submitButton.disabled = false;

            // Redirect to login after 5 seconds
            setTimeout(() => {
              window.location.href = "/login.html?registered=true";
            }, 5000);
          } else {
            submitButton.innerHTML = originalText;
            submitButton.disabled = false;
          }
        });

      // Initialize page
      document.addEventListener("DOMContentLoaded", function () {
        // Add role selector styling and interaction
        const roleOptions = document.querySelectorAll('.role-option');
        roleOptions.forEach(option => {
          const radio = option.querySelector('input[type="radio"]');
          
          // Update visual state when radio is checked
          radio.addEventListener('change', () => {
            roleOptions.forEach(opt => {
              const optRadio = opt.querySelector('input[type="radio"]');
              if (optRadio.checked) {
                opt.style.borderColor = 'var(--color-brand-primary, #007bff)';
                opt.style.backgroundColor = 'var(--color-brand-primary-light, rgba(0, 123, 255, 0.05))';
              } else {
                opt.style.borderColor = 'var(--color-border-primary, #e0e0e0)';
                opt.style.backgroundColor = 'transparent';
              }
            });
          });

          // Hover effect
          option.addEventListener('mouseenter', () => {
            if (!radio.checked) {
              option.style.borderColor = 'var(--color-border-hover, #ccc)';
            }
          });
          option.addEventListener('mouseleave', () => {
            if (!radio.checked) {
              option.style.borderColor = 'var(--color-border-primary, #e0e0e0)';
            }
          });

          // Click on label should check radio
          option.addEventListener('click', (e) => {
            if (e.target !== radio) {
              radio.checked = true;
              radio.dispatchEvent(new Event('change'));
            }
          });
        });

        // Set initial selected state
        const checkedRadio = document.querySelector('input[name="role"]:checked');
        if (checkedRadio) {
          checkedRadio.dispatchEvent(new Event('change'));
        }

        // Form validation is handled by UniversalFormValidator (auto-initialized)
      });

      // Form validation is handled by UniversalFormValidator
      function validateRegisterForm(name, email, password, confirmPassword) {
        // Basic validation - detailed validation handled by UniversalFormValidator
        if (!name || name.trim() === "") {
          showError("errorMessage", "Please enter your name.");
          return false;
        }
        if (!email || email.trim() === "") {
          showError("errorMessage", "Please enter your email address.");
          return false;
        }
        if (!password || password.trim() === "") {
          showError("errorMessage", "Please enter a password.");
          return false;
        }
        if (password !== confirmPassword) {
          showError("errorMessage", "Passwords do not match.");
          return false;
        }
        return true;
      }
    </script>

        <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
