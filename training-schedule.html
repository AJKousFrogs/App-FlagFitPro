<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Training Schedule</title>
    <meta http-equiv="refresh" content="0; url=/training.html#schedule" />
    <link rel="canonical" href="/training.html#schedule" />
    <script>
      // Preserve URL parameters and hash when redirecting
      const urlParams = new URLSearchParams(window.location.search);
      const hash = window.location.hash || '#schedule';
      const params = urlParams.toString();
      const redirectUrl = '/training.html' + (params ? '?' + params : '') + hash;
      window.location.replace(redirectUrl);
    </script>
    <!-- Footer Loader (Dynamic Component) -->
    <script type="module" src="./src/js/components/footer-loader.js" defer></script>
  </head>
  <body>
    <p>Redirecting to <a href="/training.html#schedule">Training Schedule</a>...</p>
  </body>
</html>
