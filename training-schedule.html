<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Schedule - FlagFit Pro</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Design System CSS -->
    <link rel="stylesheet" href="./src/css/main.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="./src/css/pages/auth.css" />

    <!-- Lucide Icons -->
    <script
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./src/icon-helper.js" defer></script>
    <script src="./src/theme-switcher.js" defer></script>

    <!-- Supabase Configuration (Centralized) -->
    <script src="./src/js/config/supabase-config.js" defer></script>
    
    <!-- Supabase JS SDK from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.88.0" defer></script>

    <!-- Universal Components -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- Footer Loader (Dynamic Component) -->
    <script type="module" src="./src/js/components/footer-loader.js" defer></script>

    <style>
      body {
        background: linear-gradient(135deg, var(--color-brand-primary, #667eea) 0%, var(--color-brand-secondary, #764ba2) 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-layout-md, 20px);
      }

      .redirect-container {
        background: var(--surface-primary, white);
        border-radius: var(--radius-lg, 20px);
        box-shadow: var(--shadow-xl, 0 20px 60px rgba(0, 0, 0, 0.3));
        max-width: 500px;
        width: 100%;
        padding: var(--spacing-layout-lg, 40px);
        text-align: center;
      }

      .redirect-icon {
        font-size: 4rem;
        margin-bottom: var(--spacing-component-md, 16px);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .redirect-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid var(--color-border-primary, #e0e0e0);
        border-top-color: var(--color-brand-primary, #667eea);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: var(--spacing-component-md, 16px) 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="page-auth">
    <div class="redirect-container card card-elevated">
      <div class="redirect-icon" aria-hidden="true">📅</div>
      <h1 class="u-text-primary u-font-weight-700 u-margin-bottom-12">Redirecting to Training Schedule</h1>
      <p class="u-text-secondary u-text-body-md u-margin-bottom-24">
        Taking you to your personalized training schedule...
      </p>
      <div class="redirect-spinner" role="status" aria-label="Loading"></div>
      <p class="u-text-body-sm u-text-tertiary u-margin-top-16">
        If you're not redirected automatically,
        <a href="/training.html#schedule" class="u-text-brand u-font-weight-600" id="manualLink">click here</a>.
      </p>
    </div>

    <script>
      // Preserve URL parameters and hash when redirecting
      const urlParams = new URLSearchParams(window.location.search);
      const hash = window.location.hash || '#schedule';
      const params = urlParams.toString();
      const redirectUrl = '/training.html' + (params ? '?' + params : '') + hash;
      
      // Redirect after a short delay for better UX
      setTimeout(() => {
        window.location.replace(redirectUrl);
      }, 500);

      // Make manual link work immediately
      document.getElementById('manualLink').href = redirectUrl;
    </script>

    <!-- Footer (Loaded Dynamically) -->
    <div data-footer-container></div>
  </body>
</html>
