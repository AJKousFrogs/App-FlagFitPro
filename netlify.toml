[build]
  publish = "."

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Handle direct page access (not SPA routing)
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 301

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 301

[[redirects]]
  from = "/training"
  to = "/training.html"
  status = 301

[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 301

[[redirects]]
  from = "/tournaments"
  to = "/tournaments.html"
  status = 301

[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 301