[build]
  base = "."
  command = "cd angular && npm ci && npm run build && cd .. && node scripts/inject-env-into-html-angular.js"
  publish = "angular/dist/flagfit-pro/browser"

[dev]
  framework = "#custom"
  command = "node scripts/netlify-angular-dev.mjs"
  targetPort = 4200
  port = 8888
  publish = "angular/dist/flagfit-pro/browser"

# Cache purge plugin - ensures fresh content on every deploy
[[plugins]]
  package = "./netlify/plugins/cache-purge"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"
  # Ensure devDependencies are installed (needed for @angular/cli, @angular-devkit/build-angular)
  NPM_CONFIG_PRODUCTION = "false"
  VITE_APP_ENVIRONMENT = "production"
  VITE_APP_NAME = "FlagFit Pro"
  VITE_APP_VERSION = "1.0.7"
  # Supabase Configuration
  # IMPORTANT: These should be set in Netlify UI (Site Settings → Environment Variables)
  # Hardcoded values below are for reference only - Netlify UI takes precedence
  # Required variables (single source of truth):
  #   - SUPABASE_URL
  #   - SUPABASE_ANON_KEY
  #   - SUPABASE_SERVICE_ROLE_KEY (backend only, NEVER expose to frontend)
  # Optional legacy compatibility:
  #   - VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY (not required)
  # 
  # For production, set these in Netlify UI to avoid committing secrets
  # SUPABASE_URL = "https://your-project-ref.supabase.co"
  # SUPABASE_ANON_KEY = "sb_publishable_..."
  VITE_ENABLE_ANALYTICS = "false"
  # Sentry Error Monitoring - Set VITE_SENTRY_DSN in Netlify UI for production
  # To enable: Set VITE_SENTRY_DSN to your Sentry DSN in Netlify Environment Variables
  VITE_ENABLE_SENTRY = "true"

# SECURITY: Enhanced security headers for production
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options = "DENY"

    # Enable XSS filtering (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Force HTTPS (HSTS)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Permissions policy - disable unnecessary features, allow geolocation for weather
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Cross-Origin policies for additional isolation
    # Using credentialless instead of require-corp to allow external resources
    # (fonts, CDN scripts) without CORP headers while maintaining security
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"
    # CORP header for same-site resources
    Cross-Origin-Resource-Policy = "same-site"

    # Content Security Policy - defense in depth against XSS
    # 'unsafe-inline' removed from script-src: Angular 17+ ESBuild output uses module scripts,
    # no inline <script> tags. If a future change reintroduces inline scripts, use nonces instead.
    # 'unsafe-inline' retained in style-src: Angular ViewEncapsulation injects component styles
    # at runtime. Removing it would require nonce configuration in the Angular CLI build.
    # Sentry domains added for error reporting (https://*.ingest.sentry.io for event ingestion)
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.netlify.app https://*.netlify.com https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com wss://*.supabase.co https://*.ingest.sentry.io https://sentry.io; object-src 'none'; media-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# CORP headers for static resources (CSS, JS, images)
# Using /**/* pattern to match nested paths (e.g., /assets/chunks/*.js)
[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-site"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-site"
    Cache-Control = "public, max-age=31536000, immutable"

# Legacy src/ headers removed (January 2026) - src/ directory is legacy code

# PWA Service Worker - NEVER cache (critical for updates)
[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Service worker hash file - never cache
[[headers]]
  for = "/ngsw-*.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# PWA Manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# Static assets - long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts - long cache with CORS for preloading (using /**/* pattern for nested paths)
[[headers]]
  for = "/**/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/**/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/**/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Images - long cache (using /**/* pattern for nested paths)
[[headers]]
  for = "/**/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML - Short cache for SPA with revalidation (balances freshness with performance)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    # Preload critical resources for faster LCP
    Link = "</assets/icons/icon-192x192.svg>; rel=preload; as=image, <https://grfjmnjpzvknmsxrwesx.supabase.co>; rel=preconnect; crossorigin"

# All HTML files - short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

