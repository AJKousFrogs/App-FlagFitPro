[build]
  command = "npm install && npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"
  FLAGFIT_ENVIRONMENT = "production"
  FLAGFIT_APP_NAME = "FlagFit Pro"
  FLAGFIT_APP_VERSION = "1.0.8"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache icons and manifest
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# Service worker - no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# HTML files - short cache
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

# PWA offline page
[[headers]]
  for = "/offline.html"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Preload critical resources
[[headers]]
  for = "/index.html"
  [headers.values]
    Link = "</icons/icon.svg>; rel=preload; as=image; type=image/svg+xml, </manifest.json>; rel=preload; as=manifest, </assets/index-*.css>; rel=preload; as=style, </assets/react-core-*.js>; rel=preload; as=script; crossorigin, </assets/router-*.js>; rel=preload; as=script; crossorigin"

# SPA routing - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true