[build]
  command = "cd angular && npm ci && npm run build && cd .. && node scripts/inject-env-into-html-angular.js"
  publish = "angular/dist/flagfit-pro/browser"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  VITE_APP_ENVIRONMENT = "production"
  VITE_APP_NAME = "FlagFit Pro"
  VITE_APP_VERSION = "1.0.7"
  # Supabase Configuration
  # These variables are injected into HTML files during build via scripts/inject-env-into-html.js
  # IMPORTANT: Also set these in Netlify UI (Site Settings → Environment Variables) for redundancy
  # This ensures they're available even if netlify.toml is not read properly
  VITE_SUPABASE_URL = "https://pvziciccwxgftcielknm.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2emljaWNjd3hnZnRjaWVsa25tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk1MzcwNTgsImV4cCI6MjA3NTExMzA1OH0.1nfJrtWPl6DrAwvjGvM1-CZBeyYgCaV9oDdaadpqhLU"
  VITE_ENABLE_ANALYTICS = "false"
  # Sentry Error Monitoring - Set VITE_SENTRY_DSN in Netlify UI for production
  # To enable: Set VITE_SENTRY_DSN to your Sentry DSN in Netlify Environment Variables
  VITE_ENABLE_SENTRY = "true"

# SECURITY: Enhanced security headers for production
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options = "DENY"

    # Enable XSS filtering (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Force HTTPS (HSTS)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Permissions policy - disable unnecessary features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Cross-Origin policies for additional isolation
    # Using credentialless instead of require-corp to allow external resources
    # (fonts, CDN scripts) without CORP headers while maintaining security
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"
    # CORP header for same-site resources
    Cross-Origin-Resource-Policy = "same-site"

    # Content Security Policy - defense in depth against XSS
    # Note: 'unsafe-inline' is used for inline scripts/styles - consider moving to external files with nonces in production
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.netlify.app https://*.netlify.com https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com wss://*.supabase.co; object-src 'none'; media-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# CORP headers for static resources (CSS, JS, images)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-site"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-site"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/**/*"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-site"

# PWA Service Worker - no caching
[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"

# PWA Manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# Static assets - long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts - long cache
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images - long cache
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML - short cache for SPA
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

