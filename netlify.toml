# ============================================================================
# STATIC FILES - Serve before SPA fallback
# ============================================================================
# robots.txt - Must be served before SPA fallback
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# ============================================================================
# SPA FALLBACK (200 Rewrite)
# All non-asset, non-API paths → Angular index.html for Angular Router
# Netlify automatically excludes /api/* and static assets
# ============================================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Environment variables for Netlify Functions
# NOTE: Sensitive values (SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY / SUPABASE_SERVICE_ROLE_KEY)
# should be set in the Netlify UI, NOT in this file, to keep them out of source control.

# Production context: all deploys from the Production branch
[context.production.environment]
  NODE_ENV = "production"

# Deploy preview context: pull/merge request deploys
[context.deploy-preview.environment]
  NODE_ENV = "development"

# Branch deploy context: all other branch deploys
[context.branch-deploy.environment]
  NODE_ENV = "development"
