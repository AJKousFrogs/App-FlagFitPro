<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlagFit — Stats (hi-fi)</title>
<link rel="stylesheet" href="../01-system/system.css"></head>
<body>
<p style="max-width:412px;margin:12px auto;color:var(--text-faint);font-size:12px;text-align:center">HI-FI · Stats <a href="index.html">· all hi-fi</a></p>
<div class="phone">
  <div class="topbar"><div><div class="eyebrow">Last 28 days</div><h1 style="font-size:21px">Stats</h1></div>
    <div class="inline"><span class="icon-btn">🔔<span class="dot"></span></span><span class="avatar">AK</span></div></div>
  <div class="screen">
    <div class="section-h"><h2>Load (ACWR)</h2></div>
    <div class="hero">
      <div class="row"><span class="band good">1.18 · Sweet spot</span><small>lowest injury risk</small></div>
      <svg width="100%" height="120" viewBox="0 0 360 120" preserveAspectRatio="none" style="margin-top:12px">
        <rect x="0" y="46" width="360" height="38" fill="var(--good-soft)"/><text x="6" y="60" font-size="10" fill="var(--text-faint)">sweet 0.8–1.3</text>
        <line x1="0" y1="28" x2="360" y2="28" stroke="var(--danger)" stroke-dasharray="5 3" opacity=".7"/><text x="6" y="24" font-size="10" fill="var(--text-faint)">danger 1.5</text>
        <polyline fill="none" stroke="var(--accent)" stroke-width="2.5" points="0,72 50,64 100,58 150,55 200,60 250,52 300,57 359,59"/>
        <circle cx="359" cy="59" r="4" fill="var(--accent)"/>
      </svg>
    </div>

    <div class="section-h"><h2>Readiness history</h2></div>
    <div class="card">
      <svg width="100%" height="110" viewBox="0 0 360 110" preserveAspectRatio="none">
        <line x1="0" y1="42" x2="360" y2="42" stroke="var(--border)" stroke-dasharray="3 3"/><text x="6" y="38" font-size="10" fill="var(--text-faint)">75</text>
        <line x1="0" y1="66" x2="360" y2="66" stroke="var(--border)" stroke-dasharray="3 3"/><text x="6" y="62" font-size="10" fill="var(--text-faint)">55</text>
        <polyline fill="none" stroke="var(--info)" stroke-width="2.5" points="0,62 50,52 100,72 150,48 200,40 250,58 300,46 359,50"/>
        <circle cx="359" cy="50" r="4" fill="var(--info)"/>
      </svg>
    </div>

    <div class="section-h"><h2>Performance</h2></div>
    <div class="card">
      <div class="lrow"><span>40-yd dash</span><span class="inline">4.9s <span class="band good">↓0.1</span></span></div>
      <div class="lrow"><span>Vertical</span><span class="inline">71 cm <span class="band good">↑2</span></span></div>
      <div class="lrow"><span>Sessions / wk</span><span>4</span></div>
    </div>
    <a class="btn ghost block" href="#">Full dashboard →</a>
  </div>
  <nav class="tabbar">
    <a><span class="ic">▦</span>Today</a><a><span class="ic">⚡</span>Training</a>
    <a><span class="ic">♥</span>Wellness</a><a class="active"><span class="ic">📈</span>Stats</a><a><span class="ic">⋯</span>More</a>
  </nav>
</div>
</body></html>
