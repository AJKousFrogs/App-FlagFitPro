<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email - FlagFit Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>" />
    <link rel="stylesheet" href="./src/css/main.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        font-family: 'Inter', 'Poppins', sans-serif;
      }
      .verify-container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      .logo {
        font-size: 4rem;
        margin-bottom: 20px;
      }
      .title {
        font-size: 2rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 10px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      .success-message, .error-message {
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .success-message {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error-message {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #10c96b;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .btn {
        background: linear-gradient(135deg, #10c96b 0%, #0ab85a 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
      }
      .btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 201, 107, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="verify-container">
      <div class="logo">📧</div>
      <h1 class="title">Verify Your Email</h1>
      <p class="subtitle">Please wait while we verify your email address...</p>
      
      <div class="success-message" id="successMessage"></div>
      <div class="error-message" id="errorMessage"></div>
      
      <div class="spinner" id="spinner"></div>
      
      <div id="content" style="display: none;">
        <a href="/login.html" class="btn">Go to Login</a>
      </div>
    </div>

    <script type="module">
      import { auth } from './src/api-config.js';
      import { authManager } from './src/auth-manager.js';

      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      const successMessage = document.getElementById('successMessage');
      const errorMessage = document.getElementById('errorMessage');
      const spinner = document.getElementById('spinner');
      const content = document.getElementById('content');

      async function verifyEmail() {
        if (!token) {
          showError('No verification token provided. Please check your email and click the verification link.');
          spinner.style.display = 'none';
          return;
        }

        try {
          const response = await fetch('/.netlify/functions/auth-verify-email', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ token }),
          });

          const result = await response.json();

          spinner.style.display = 'none';

          if (result.success && result.data) {
            const { token: authToken, user } = result.data;

            // Store authentication data
            if (authToken && user) {
              authManager.token = authToken;
              authManager.user = user;
              localStorage.setItem('authToken', authToken);
              localStorage.setItem('userData', JSON.stringify(user));
            }

            showSuccess(result.data.message || 'Email verified successfully! You can now log in.');
            content.style.display = 'block';
          } else {
            showError(result.error || 'Failed to verify email. The link may have expired.');
          }
        } catch (error) {
          spinner.style.display = 'none';
          showError('Network error. Please check your connection and try again.');
          console.error('Verification error:', error);
        }
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
        successMessage.style.display = 'none';
      }

      // Start verification on page load
      verifyEmail();
    </script>
  </body>
</html>
