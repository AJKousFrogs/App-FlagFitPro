<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="./src/css/main.css" />

      };

    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        font-family: 'Inter', 'Poppins', sans-serif;
      }
      .verify-container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      .logo {
        font-size: 4rem;
        margin-bottom: 20px;
      }
      .title {
        font-size: 2rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 10px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      .success-message, .error-message {
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .success-message {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error-message {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #10c96b;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .btn {
        background: linear-gradient(135deg, #10c96b 0%, #0ab85a 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
      }
      .btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 201, 107, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="verify-container">
      <div class="logo">📧</div>
      <h1 class="title">Verify Your Email</h1>
      <p class="subtitle">Please wait while we verify your email address...</p>
      
      <div class="success-message" id="successMessage"></div>
      <div class="error-message" id="errorMessage"></div>
      
      <div class="spinner" id="spinner"></div>
      
      <div id="content" style="display: none;">
        <a href="/login.html" class="btn">Go to Login</a>
      </div>
    </div>

    <script type="module">
      import { getSupabase } from './src/js/services/supabase-client.js';

      // Get verification parameters from URL
      const urlParams = new URLSearchParams(window.location.search);
      const tokenHash = urlParams.get('token_hash');
      const type = urlParams.get('type');

      const successMessage = document.getElementById('successMessage');
      const errorMessage = document.getElementById('errorMessage');
      const spinner = document.getElementById('spinner');
      const content = document.getElementById('content');

      async function verifyEmail() {
        if (!tokenHash || !type) {
          showError('Invalid verification link. Please check your email and click the verification link.');
          spinner.style.display = 'none';
          return;
        }

        try {
          const supabase = getSupabase();

          if (!supabase) {
            throw new Error('Unable to connect to authentication service');
          }

          // Use Supabase Auth to verify the email
          const { data, error } = await supabase.auth.verifyOtp({
            token_hash: tokenHash,
            type: type
          });

          spinner.style.display = 'none';

          if (error) {
            showError(error.message || 'Verification failed. The link may have expired.');
            return;
          }

          showSuccess('Email verified successfully! Redirecting to login...');
          content.style.display = 'block';

          // Redirect to login page after 2 seconds
          setTimeout(() => {
            window.location.href = '/login.html?verified=true';
          }, 2000);
        } catch (error) {
          spinner.style.display = 'none';
          showError('Network error. Please check your connection and try again.');
          console.error('Verification error:', error);
        }
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
        successMessage.style.display = 'none';
      }

      // Start verification on page load
      verifyEmail();
    </script>
  </body>
</html>
