<!-- 
    Roster Table Component - FlagFit Pro
    
    Usage: Copy this snippet for displaying athlete rosters
    Includes sorting, filtering, and actions
-->

<div class="roster-table-card card">
    <div class="card-header">
        <h3>Team Roster</h3>
        <div class="table-actions">
            <button class="btn btn-primary btn-sm">
                <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
                Add Player
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="roster-table" role="table">
                <thead>
                    <tr>
                        <th>
                            <button class="table-sort" data-sort="name">
                                Name
                                <i data-lucide="chevron-up" style="width: 16px; height: 16px;"></i>
                            </button>
                        </th>
                        <th>
                            <button class="table-sort" data-sort="position">
                                Position
                            </button>
                        </th>
                        <th>
                            <button class="table-sort" data-sort="number">
                                Number
                            </button>
                        </th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: var(--spacing-component-sm);">
                                <img src="/path/to/avatar.jpg" alt="Player avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                                <span>John Smith</span>
                            </div>
                        </td>
                        <td>Quarterback</td>
                        <td>12</td>
                        <td>
                            <span class="badge badge-success">Active</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: var(--spacing-component-xs);">
                                <button class="btn btn-tertiary btn-xs" aria-label="Edit">
                                    <i data-lucide="edit" style="width: 14px; height: 14px;"></i>
                                </button>
                                <button class="btn btn-tertiary btn-xs" aria-label="View">
                                    <i data-lucide="eye" style="width: 14px; height: 14px;"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: var(--spacing-component-sm);">
                                <img src="/path/to/avatar.jpg" alt="Player avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                                <span>Jane Doe</span>
                            </div>
                        </td>
                        <td>Wide Receiver</td>
                        <td>88</td>
                        <td>
                            <span class="badge badge-success">Active</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: var(--spacing-component-xs);">
                                <button class="btn btn-tertiary btn-xs" aria-label="Edit">
                                    <i data-lucide="edit" style="width: 14px; height: 14px;"></i>
                                </button>
                                <button class="btn btn-tertiary btn-xs" aria-label="View">
                                    <i data-lucide="eye" style="width: 14px; height: 14px;"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer">
        <div class="table-pagination">
            <span>Showing 1-10 of 25 players</span>
            <div class="pagination-controls">
                <button class="btn btn-tertiary btn-sm" disabled>Previous</button>
                <button class="btn btn-tertiary btn-sm">Next</button>
            </div>
        </div>
    </div>
</div>

<!-- 
    CSS Classes Required:
    - .roster-table-card - Card wrapper
    - .table-wrapper - Scrollable container
    - .roster-table - Table element
    - .table-sort - Sortable header button
    - .table-actions - Action buttons container
    - .table-pagination - Pagination container
    - .pagination-controls - Pagination buttons
-->
