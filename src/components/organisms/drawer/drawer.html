<!-- 
    Drawer Component - FlagFit Pro
    
    Usage: Copy this snippet for slide-out drawer panels
    Features: Multiple positions, overlay, animations
    Accessibility:
    - Use aria-modal for modal drawers
    - Support keyboard navigation (ESC to close)
    - Focus trap when open
-->

<!-- Left Drawer -->
<button type="button" class="btn btn-primary btn-md" onclick="openDrawer('drawer-left')">
  Open Left Drawer
</button>

<div class="drawer-overlay" id="drawer-overlay-left" onclick="closeDrawer('drawer-left')"></div>
<div class="drawer drawer-left" id="drawer-left">
  <div class="drawer-header">
    <h2 class="drawer-title">Left Drawer</h2>
    <button type="button" class="drawer-close" onclick="closeDrawer('drawer-left')" aria-label="Close drawer">
      <i data-lucide="x" style="width: 24px; height: 24px"></i>
    </button>
  </div>
  <div class="drawer-content">
    <p>This is a left drawer with some content.</p>
    <p>You can add any content here.</p>
  </div>
  <div class="drawer-footer">
    <button type="button" class="btn btn-secondary btn-md" onclick="closeDrawer('drawer-left')">Cancel</button>
    <button type="button" class="btn btn-primary btn-md">Save</button>
  </div>
</div>

<!-- Right Drawer -->
<button type="button" class="btn btn-primary btn-md" onclick="openDrawer('drawer-right')">
  Open Right Drawer
</button>

<div class="drawer-overlay" id="drawer-overlay-right" onclick="closeDrawer('drawer-right')"></div>
<div class="drawer drawer-right" id="drawer-right">
  <div class="drawer-header">
    <h2 class="drawer-title">Right Drawer</h2>
    <button type="button" class="drawer-close" onclick="closeDrawer('drawer-right')" aria-label="Close drawer">
      <i data-lucide="x" style="width: 24px; height: 24px"></i>
    </button>
  </div>
  <div class="drawer-content">
    <p>This is a right drawer with some content.</p>
    <p>You can add any content here.</p>
  </div>
</div>

<!-- Top Drawer -->
<button type="button" class="btn btn-primary btn-md" onclick="openDrawer('drawer-top')">
  Open Top Drawer
</button>

<div class="drawer-overlay" id="drawer-overlay-top" onclick="closeDrawer('drawer-top')"></div>
<div class="drawer drawer-top" id="drawer-top">
  <div class="drawer-header">
    <h2 class="drawer-title">Top Drawer</h2>
    <button type="button" class="drawer-close" onclick="closeDrawer('drawer-top')" aria-label="Close drawer">
      <i data-lucide="x" style="width: 24px; height: 24px"></i>
    </button>
  </div>
  <div class="drawer-content">
    <p>This is a top drawer with some content.</p>
  </div>
</div>

<!-- Bottom Drawer -->
<button type="button" class="btn btn-primary btn-md" onclick="openDrawer('drawer-bottom')">
  Open Bottom Drawer
</button>

<div class="drawer-overlay" id="drawer-overlay-bottom" onclick="closeDrawer('drawer-bottom')"></div>
<div class="drawer drawer-bottom" id="drawer-bottom">
  <div class="drawer-header">
    <h2 class="drawer-title">Bottom Drawer</h2>
    <button type="button" class="drawer-close" onclick="closeDrawer('drawer-bottom')" aria-label="Close drawer">
      <i data-lucide="x" style="width: 24px; height: 24px"></i>
    </button>
  </div>
  <div class="drawer-content">
    <p>This is a bottom drawer with some content.</p>
  </div>
</div>

<style>
  .drawer-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .drawer-overlay.show {
    opacity: 1;
    visibility: visible;
  }

  .drawer {
    position: fixed;
    z-index: 1000;
    background: var(--p-surface-0, #ffffff);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    max-width: 100%;
    max-height: 100%;
    overflow: hidden;
  }

  .drawer-left {
    top: 0;
    left: 0;
    bottom: 0;
    width: 400px;
    max-width: 90vw;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .drawer-left.open {
    transform: translateX(0);
  }

  .drawer-right {
    top: 0;
    right: 0;
    bottom: 0;
    width: 400px;
    max-width: 90vw;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .drawer-right.open {
    transform: translateX(0);
  }

  .drawer-top {
    top: 0;
    left: 0;
    right: 0;
    height: 400px;
    max-height: 90vh;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
  }

  .drawer-top.open {
    transform: translateY(0);
  }

  .drawer-bottom {
    bottom: 0;
    left: 0;
    right: 0;
    height: 400px;
    max-height: 90vh;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .drawer-bottom.open {
    transform: translateY(0);
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem;
    border-bottom: 1px solid var(--p-surface-border, #dee2e6);
  }

  .drawer-title {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
  }

  .drawer-close {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    color: var(--text-secondary, #6b7280);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--p-border-radius, 0.5rem);
    transition: background 0.2s;
  }

  .drawer-close:hover {
    background: var(--p-surface-100, #f0f0f0);
  }

  .drawer-content {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
  }

  .drawer-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.75rem;
    padding: 1.5rem;
    border-top: 1px solid var(--p-surface-border, #dee2e6);
  }
</style>

<script>
  function openDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById(drawerId.replace('drawer-', 'drawer-overlay-'));
    
    if (drawer && overlay) {
      drawer.classList.add('open');
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      
      // Focus trap
      const firstFocusable = drawer.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      if (firstFocusable) {
        firstFocusable.focus();
      }
    }
  }
  
  function closeDrawer(drawerId) {
    const drawer = document.getElementById(drawerId);
    const overlay = document.getElementById(drawerId.replace('drawer-', 'drawer-overlay-'));
    
    if (drawer && overlay) {
      drawer.classList.remove('open');
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }
  }
  
  // Close on ESC key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.drawer.open').forEach(drawer => {
        closeDrawer(drawer.id);
      });
    }
  });
  
  // Initialize lucide icons
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) {
      window.lucide.createIcons();
    }
  });
</script>
