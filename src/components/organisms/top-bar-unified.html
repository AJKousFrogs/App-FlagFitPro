<!-- Top Bar Component (Unified Header) - Upgraded -->
<!-- This file is loaded dynamically by top-bar-loader.js -->
<div class="top-bar" role="banner">
  <div class="header-left">
    <!-- Mobile Hamburger Menu Button -->
    <button
      id="mobile-menu-toggle"
      class="mobile-menu-toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="sidebar"
      onclick="toggleSidebar()"
    >
      <i data-lucide="menu" class="icon-20"></i>
    </button>

    <!-- Enhanced Global Search -->
    <div class="search-box">
      <label for="global-search" class="sr-only"
        >Search for players, teams and more</label
      >
      <span class="search-icon" aria-hidden="true">
        <i data-lucide="search" class="icon-16"></i>
      </span>

      <input
        id="global-search"
        name="search"
        class="search-input"
        type="text"
        placeholder="Search for players, teams & more"
        role="combobox"
        aria-autocomplete="list"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-owns="search-results"
        aria-controls="search-results"
        autocomplete="off"
        inputmode="search"
      />

      <!-- Keyboard Shortcut Hint -->
      <div class="search-shortcut-hint" aria-hidden="true">
        <kbd class="kbd-shortcut">⌘</kbd>
        <kbd class="kbd-shortcut">K</kbd>
      </div>

      <!-- Clear Search Button -->
      <button
        id="search-clear"
        class="search-clear"
        type="button"
        aria-label="Clear search"
        hidden
      >
        <i data-lucide="x" class="icon-16"></i>
      </button>

      <div id="search-status" class="sr-only" aria-live="polite"></div>

      <!-- Enhanced Search Results -->
      <div id="search-results" class="search-results" role="listbox" hidden>
        <div class="search-results-header">
          <span class="search-results-title">Search Results</span>
          <button
            class="search-results-close"
            aria-label="Close search results"
          >
            <i data-lucide="x" class="icon-16"></i>
          </button>
        </div>
        <div class="search-results-content" id="search-results-content"></div>
        <div class="search-results-footer">
          <span class="search-results-hint">
            <kbd>↑</kbd><kbd>↓</kbd> Navigate • <kbd>Enter</kbd> Select •
            <kbd>Esc</kbd> Close
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="header-right">
    <!-- Enhanced Notifications -->
    <div class="header-icon-wrap notification-wrap">
      <button
        id="notification-bell"
        class="header-icon notification-button"
        type="button"
        aria-label="Notifications"
        aria-controls="notification-panel"
        aria-expanded="false"
      >
        <i data-lucide="bell" class="icon-18"></i>
        <span id="notification-badge" class="notification-badge" hidden>0</span>
        <span class="notification-pulse" aria-hidden="true"></span>
      </button>
      <span id="notification-live" class="sr-only" aria-live="polite"></span>
    </div>

    <!-- Settings Button -->
    <button
      class="header-icon"
      type="button"
      aria-label="Settings"
      onclick="window.location.href = '/settings.html'"
      title="Settings"
    >
      <i data-lucide="settings" class="icon-18"></i>
    </button>

    <!-- Enhanced Theme Toggle -->
    <div class="theme-toggle-container" aria-label="Theme toggle">
      <button
        id="header-theme-toggle-button"
        class="theme-toggle-button"
        type="button"
        aria-label="Toggle theme"
        title="Toggle theme"
      >
        <span class="theme-toggle-icon-light" aria-hidden="true">
          <i data-lucide="sun" class="icon-18"></i>
        </span>
        <span class="theme-toggle-icon-dark" aria-hidden="true">
          <i data-lucide="moon" class="icon-18"></i>
        </span>
      </button>
    </div>

    <!-- Enhanced User Menu -->
    <div class="user-menu-wrapper">
      <button
        id="user-menu-button"
        class="user-menu-button"
        type="button"
        aria-label="User menu"
        aria-haspopup="menu"
        aria-controls="user-menu"
        aria-expanded="false"
      >
        <div class="user-avatar" id="user-avatar" aria-hidden="true">
          <span class="user-avatar-initials">JD</span>
        </div>
        <div class="user-menu-info" id="user-menu-info">
          <span class="user-menu-name" id="user-menu-name">User</span>
          <span class="user-menu-role" id="user-menu-role">Player</span>
        </div>
        <i data-lucide="chevron-down" class="user-menu-chevron icon-16"></i>
      </button>

      <!-- Enhanced User Menu Dropdown -->
      <ul id="user-menu" class="user-menu-dropdown" role="menu" hidden>
        <li class="user-menu-header" role="none">
          <div class="user-menu-header-content">
            <div class="user-menu-header-avatar">
              <span
                class="user-menu-header-initials"
                id="user-menu-header-initials"
                >JD</span
              >
            </div>
            <div class="user-menu-header-info">
              <div class="user-menu-header-name" id="user-menu-header-name">
                User Name
              </div>
              <div class="user-menu-header-email" id="user-menu-header-email">
                user@example.com
              </div>
            </div>
          </div>
        </li>
        <li role="separator" class="user-menu-separator"></li>
        <li role="menuitem">
          <a href="/profile.html" class="user-menu-item">
            <i data-lucide="user" class="icon-18"></i>
            <span>Profile</span>
          </a>
        </li>
        <li role="menuitem">
          <a href="/settings.html" class="user-menu-item">
            <i data-lucide="settings" class="icon-18"></i>
            <span>Settings</span>
          </a>
        </li>
        <li role="menuitem">
          <a href="/help.html" class="user-menu-item">
            <i data-lucide="help-circle" class="icon-18"></i>
            <span>Help & Support</span>
          </a>
        </li>
        <li role="separator" class="user-menu-separator"></li>
        <li role="menuitem">
          <button
            class="user-menu-item user-menu-item-danger"
            onclick="
              event.preventDefault();
              if (window.authManager) {
                window.authManager.logout();
              } else if (window.handleLogout) {
                window.handleLogout();
              } else {
                window.location.href = '/login.html';
              }
            "
          >
            <i data-lucide="log-out" class="icon-18"></i>
            <span>Sign Out</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>

<!-- Scroll to Top Button -->
<button
  id="scroll-to-top"
  class="scroll-to-top"
  type="button"
  aria-label="Scroll to top"
  hidden
>
  <i data-lucide="arrow-up" class="icon-20"></i>
</button>
