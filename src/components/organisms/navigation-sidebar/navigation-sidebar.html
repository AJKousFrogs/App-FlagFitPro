<!-- 
    Navigation Sidebar Component - FlagFit Pro
    
    DEPRECATED: This is a simpler version of the sidebar.
    Use src/components/organisms/sidebar-navigation.html instead for the full-featured version.
    
    This file is kept for legacy support only.
-->

<!-- Mobile Overlay/Scrim (for closing sidebar on mobile) -->
<div class="menu-scrim" aria-hidden="true" onclick="closeMenu()"></div>

<div
  class="sidebar"
  id="sidebar"
  role="navigation"
  aria-label="Main navigation"
>
  <!-- Logo/Brand -->
  <div
    class="sidebar-logo"
    onclick="window.location.href='/dashboard.html'"
    title="FlagFit Pro"
    aria-label="Go to dashboard"
  >
    <i data-lucide="activity" class="icon-20 icon-inline"></i>
  </div>

  <!-- Dashboard Navigation -->
  <nav class="nav-section" aria-label="Dashboard navigation">
    <a
      href="/dashboard.html"
      class="nav-item"
      aria-label="Dashboard Overview"
      id="nav-dashboard"
    >
      <span class="nav-item-icon">
        <i data-lucide="layout-dashboard" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Overview</span>
    </a>
    <a
      href="/analytics.html"
      class="nav-item"
      aria-label="Analytics"
      id="nav-analytics"
    >
      <span class="nav-item-icon">
        <i data-lucide="bar-chart-3" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Analytics</span>
    </a>
  </nav>

  <!-- Team Navigation -->
  <nav class="nav-section" aria-label="Team navigation">
    <a
      href="/roster.html"
      class="nav-item"
      aria-label="Team Roster"
      id="nav-roster"
    >
      <span class="nav-item-icon">
        <i data-lucide="users" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Roster</span>
    </a>
    <a
      href="/training.html"
      class="nav-item"
      aria-label="Training"
      id="nav-training"
    >
      <span class="nav-item-icon">
        <i data-lucide="zap" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Training</span>
    </a>
    <a
      href="/tournaments.html"
      class="nav-item"
      aria-label="Tournaments"
      id="nav-tournaments"
    >
      <span class="nav-item-icon">
        <i data-lucide="trophy" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Tournaments</span>
    </a>
  </nav>

  <!-- Community Navigation -->
  <nav class="nav-section" aria-label="Community navigation">
    <a
      href="/community.html"
      class="nav-item"
      aria-label="Community"
      id="nav-community"
    >
      <span class="nav-item-icon">
        <i data-lucide="message-circle" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Community</span>
    </a>
    <a href="/chat.html" class="nav-item" aria-label="Chat" id="nav-chat">
      <span class="nav-item-icon">
        <i data-lucide="message-square" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Chat</span>
    </a>
  </nav>

  <!-- Personal Navigation -->
  <nav class="nav-section" aria-label="Personal navigation">
    <a
      href="/settings.html"
      class="nav-item"
      aria-label="Settings"
      id="nav-settings"
    >
      <span class="nav-item-icon">
        <i data-lucide="settings" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Settings</span>
    </a>
    <a
      href="/profile.html"
      class="nav-item"
      aria-label="Profile"
      id="nav-profile"
    >
      <span class="nav-item-icon">
        <i data-lucide="user" class="icon-24"></i>
      </span>
      <span class="nav-item-label">Profile</span>
    </a>
  </nav>
</div>

<!-- 
    CSS Classes Required:
    - .sidebar - Main container
    - .sidebar-logo - Logo container (clickable)
    - .nav-section - Navigation group container
    - .nav-item - Navigation link
    - .nav-item.active - Active state
    - .nav-item-icon - Icon wrapper span
    - .nav-item-label - Text label span
    - .icon-20, .icon-24 - Icon size utility classes
    - .icon-inline - Icon display utility class
-->
