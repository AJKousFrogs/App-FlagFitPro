<!-- 
    Top Bar Component - Tailwind CSS Version
    This is an EXAMPLE showing how you could rewrite the top-bar using Tailwind
    while still using your design tokens.
    
    Compare this with top-bar.html to see the difference!
-->

<!-- Top Bar - Tailwind Version -->
<div
  class="sticky top-0 z-sticky flex justify-between items-center h-72 px-16 px-32 bg-surface-primary border-b border-border-primary shadow-sm transition-all"
  role="banner"
>
  <div class="flex items-center flex-1 min-w-0">
    <!-- Global Search -->
    <div class="relative flex items-center w-full max-w-400">
      <label for="global-search-tw" class="sr-only"
        >Search for players, teams and more</label
      >
      <span
        class="absolute left-12 flex items-center pointer-events-none z-1 text-icon-secondary"
        aria-hidden="true"
      >
        <i data-lucide="search" class="w-16 h-16"></i>
      </span>

      <input
        id="global-search-tw"
        class="w-full px-12 py-12 pl-40 border border-border-secondary rounded-md bg-surface-secondary text-text-primary text-body-sm transition-all focus:outline-none focus:border-brand-primary focus:ring-3 focus:ring-brand-primary/10 focus:bg-surface-primary"
        type="text"
        placeholder="Search for players, teams & more"
        role="combobox"
        aria-autocomplete="list"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-owns="search-results-tw"
        aria-controls="search-results-tw"
        autocomplete="off"
        inputmode="search"
      />

      <div id="search-status-tw" class="sr-only" aria-live="polite"></div>
      <div
        id="search-results-tw"
        class="absolute top-full left-0 right-0 mt-4 bg-surface-primary border border-border-primary rounded-md shadow-medium z-dropdown max-h-400 overflow-y-auto p-4 hidden"
        role="listbox"
      ></div>
    </div>
  </div>

  <div class="flex items-center gap-16">
    <!-- Notifications -->
    <div class="relative">
      <button
        id="notification-bell-tw"
        class="flex items-center justify-center min-w-44 min-h-44 w-44 h-44 rounded-md bg-transparent text-icon-primary transition-all hover:bg-surface-secondary active:scale-95 focus:outline-2 focus:outline-border-focus focus:outline-offset-2"
        type="button"
        aria-label="Notifications"
        aria-controls="notification-panel-tw"
        aria-expanded="false"
      >
        <i data-lucide="bell" class="w-18 h-18 stroke-current fill-none"></i>
        <span
          id="notification-badge-tw"
          class="absolute -top-4 -right-4 w-20 h-20 rounded-full bg-error-500 text-text-on-primary font-bold text-11 grid place-items-center border-2 border-surface-primary hidden"
          >3</span
        >
      </button>
      <span id="notification-live-tw" class="sr-only" aria-live="polite"></span>
    </div>

    <!-- Settings -->
    <button
      class="flex items-center justify-center min-w-44 min-h-44 w-44 h-44 rounded-md bg-transparent text-icon-primary transition-all hover:bg-surface-secondary active:scale-95 focus:outline-2 focus:outline-border-focus focus:outline-offset-2"
      type="button"
      aria-label="Settings"
    >
      <i data-lucide="settings" class="w-18 h-18 stroke-current fill-none"></i>
    </button>

    <!-- Theme Toggle -->
    <div class="theme-toggle-container" aria-label="Theme toggle">
      <button
        class="theme-toggle-fallback hidden min-w-44 min-h-44 px-8 py-12 border border-border-secondary rounded-md bg-surface-secondary text-text-primary text-body-sm cursor-pointer hover:bg-surface-tertiary"
        type="button"
        data-theme-toggle
      >
        Theme
      </button>
    </div>

    <!-- User Menu -->
    <div class="relative user-menu-wrapper">
      <button
        id="user-menu-button-tw"
        class="flex items-center justify-center min-w-44 min-h-44 p-4 rounded-md bg-transparent text-icon-primary transition-all hover:bg-surface-secondary active:scale-95 focus:outline-2 focus:outline-border-focus focus:outline-offset-2"
        type="button"
        aria-label="User menu"
        aria-haspopup="menu"
        aria-controls="user-menu-tw"
        aria-expanded="false"
      >
        <div
          class="w-40 h-40 rounded-full bg-brand-primary text-text-on-primary flex items-center justify-center font-semibold text-body-md"
          id="user-avatar-tw"
          aria-hidden="true"
        >
          U
        </div>
      </button>

      <!-- User Menu Dropdown -->
      <ul
        id="user-menu-tw"
        class="absolute top-full right-0 mt-8 min-w-200 max-w-280 bg-surface-primary border border-border-primary rounded-md shadow-medium p-4 m-0 list-none z-dropdown opacity-0 -translate-y-8 transition-all invisible pointer-events-none hidden"
        role="menu"
      >
        <li role="menuitem" class="m-0 p-0">
          <a
            href="/profile"
            class="flex items-center gap-12 px-12 py-12 px-16 rounded-sm text-text-primary no-underline text-body-sm font-normal transition-all hover:bg-surface-secondary hover:text-text-primary cursor-pointer w-full"
          >
            <i
              data-lucide="user"
              class="w-16 h-16 stroke-current fill-none flex-shrink-0"
            ></i>
            <span>Profile</span>
          </a>
        </li>
        <li role="menuitem" class="m-0 p-0">
          <a
            href="/settings"
            class="flex items-center gap-12 px-12 py-12 px-16 rounded-sm text-text-primary no-underline text-body-sm font-normal transition-all hover:bg-surface-secondary hover:text-text-primary cursor-pointer w-full"
          >
            <i
              data-lucide="settings"
              class="w-16 h-16 stroke-current fill-none flex-shrink-0"
            ></i>
            <span>Settings</span>
          </a>
        </li>
        <li
          role="separator"
          class="h-1 bg-border-primary my-8 p-0 list-none"
        ></li>
        <li role="menuitem" class="m-0 p-0">
          <a
            href="/logout"
            class="flex items-center gap-12 px-12 py-12 px-16 rounded-sm text-error-600 no-underline text-body-sm font-normal transition-all hover:bg-error-50 hover:text-error-700 cursor-pointer w-full"
          >
            <i
              data-lucide="log-out"
              class="w-16 h-16 stroke-current fill-none flex-shrink-0"
            ></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>

<!-- 
    COMPARISON:
    
    Vanilla CSS (top-bar.html):
    - Uses semantic classes: .top-bar, .header-left, .search-box
    - CSS file: ~400 lines
    - More maintainable for complex components
    - Better for team collaboration
    
    Tailwind CSS (this file):
    - Uses utility classes: flex, justify-between, items-center
    - No separate CSS needed (uses your tokens)
    - Faster to write and iterate
    - More verbose HTML
    
    RECOMMENDATION:
    - Use Tailwind for: layouts, spacing, quick styling
    - Keep CSS for: complex components, animations, design system
    - Hybrid approach is best!
-->
