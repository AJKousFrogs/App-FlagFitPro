<!-- 
    Top Bar Component - FlagFit Pro
    Standardized top navigation bar for all pages
    
    Usage: Copy this snippet into your page's main-content area
    All pages should use this consistent structure
-->

<!-- Top Bar -->
<div class="top-bar" role="banner">
  <div class="header-left">
    <!-- Mobile Menu Toggle Button -->
    <button
      id="mobile-menu-toggle"
      class="mobile-menu-toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="sidebar"
      onclick="toggleSidebar()"
    >
      <i data-lucide="menu" class="icon-20"></i>
    </button>

    <!-- Global Search (combobox pattern) -->
    <div class="search-box">
      <label for="global-search" class="sr-only"
        >Search for players, teams and more</label
      >
      <span class="search-icon" aria-hidden="true">
        <i data-lucide="search" class="icon-16"></i>
      </span>

      <input
        id="global-search"
        name="search"
        class="search-input"
        type="text"
        placeholder="Search for players, teams & more"
        role="combobox"
        aria-autocomplete="list"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-owns="search-results"
        aria-controls="search-results"
        aria-activedescendant=""
        autocomplete="off"
        inputmode="search"
      />

      <div id="search-status" class="sr-only" aria-live="polite"></div>

      <div
        id="search-results"
        class="search-results"
        role="listbox"
        hidden
      ></div>
    </div>

    <!-- Optional page title block (for pages like Analytics) -->
    <!-- 
        <div class="page-title-section">
            <h1 class="page-title">Page Title</h1>
            <p class="page-subtitle">Page subtitle</p>
        </div>
        -->
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <div class="header-icon-wrap">
      <button
        id="notification-bell"
        class="header-icon"
        type="button"
        aria-label="Notifications"
        aria-controls="notification-panel"
        aria-expanded="false"
      >
        <i data-lucide="bell" class="icon-18"></i>
        <span id="notification-badge" class="badge" hidden>3</span>
      </button>
      <span id="notification-live" class="sr-only" aria-live="polite"></span>
    </div>

    <!-- Settings -->
    <button class="header-icon" type="button" aria-label="Settings">
      <i data-lucide="settings" class="icon-18"></i>
    </button>

    <!-- Theme Toggle -->
    <div class="theme-toggle-container" aria-label="Theme toggle">
      <label class="theme-toggle-label" title="Toggle theme">
        <input
          type="checkbox"
          id="header-theme-toggle"
          class="theme-toggle-input"
          aria-label="Toggle theme"
        />
        <span class="theme-toggle-slider">
          <span class="theme-toggle-dot" id="theme-toggle-dot"></span>
        </span>
        <span class="theme-toggle-text">🌙 Dark</span>
      </label>
    </div>

    <!-- User Menu -->
    <div class="user-menu-wrapper">
      <button
        id="user-menu-button"
        class="user-menu"
        type="button"
        aria-label="User menu"
        aria-haspopup="menu"
        aria-controls="user-menu"
        aria-expanded="false"
      >
        <div class="user-avatar" id="user-avatar" aria-hidden="true">U</div>
      </button>

      <!-- User Menu Dropdown -->
      <ul id="user-menu" class="user-menu-dropdown" role="menu" hidden>
        <li role="menuitem">
          <a href="/profile" class="user-menu-item">
            <i data-lucide="user" class="icon-16"></i>
            <span>Profile</span>
          </a>
        </li>
        <li role="menuitem">
          <a href="/settings" class="user-menu-item">
            <i data-lucide="settings" class="icon-16"></i>
            <span>Settings</span>
          </a>
        </li>
        <li role="separator" class="user-menu-separator"></li>
        <li role="menuitem">
          <a href="/logout" class="user-menu-item user-menu-item-danger">
            <i data-lucide="log-out" class="icon-16"></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>

<!-- Scroll to Top Button -->
<button
  id="scroll-to-top"
  class="scroll-to-top"
  type="button"
  aria-label="Scroll to top"
  hidden
>
  <i data-lucide="arrow-up" class="icon-20"></i>
</button>
