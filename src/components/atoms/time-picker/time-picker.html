<!-- 
    Time Picker Component - FlagFit Pro
    
    Usage: Copy this snippet for time selection
    States: default, focus, error, disabled
    Accessibility:
    - Always include <label> element
    - Use aria-describedby for help text
-->

<!-- Basic Time Picker -->
<div class="form-group">
  <label for="time-basic" class="form-label">Time</label>
  <input
    type="time"
    id="time-basic"
    name="time-basic"
    class="form-input time-picker"
    aria-describedby="time-basic-help"
  />
  <small id="time-basic-help" class="form-help">Select a time</small>
</div>

<!-- Time Picker with Default Value -->
<div class="form-group">
  <label for="time-default" class="form-label">Default Time</label>
  <input
    type="time"
    id="time-default"
    name="time-default"
    class="form-input time-picker"
    value="14:30"
  />
</div>

<!-- Time Picker with Min/Max -->
<div class="form-group">
  <label for="time-constrained" class="form-label">Business Hours (9 AM - 5 PM)</label>
  <input
    type="time"
    id="time-constrained"
    name="time-constrained"
    class="form-input time-picker"
    min="09:00"
    max="17:00"
    step="900"
    aria-describedby="time-constrained-help"
  />
  <small id="time-constrained-help" class="form-help">Select time between 9 AM and 5 PM</small>
</div>

<!-- Time Picker with Error -->
<div class="form-group">
  <label for="time-error" class="form-label">Time with Error</label>
  <input
    type="time"
    id="time-error"
    name="time-error"
    class="form-input time-picker error"
    aria-invalid="true"
    aria-describedby="time-error-msg"
  />
  <div class="form-error" id="time-error-msg" role="alert">Please select a valid time</div>
</div>

<!-- Disabled Time Picker -->
<div class="form-group">
  <label for="time-disabled" class="form-label">Disabled Time Picker</label>
  <input
    type="time"
    id="time-disabled"
    name="time-disabled"
    class="form-input time-picker"
    disabled
  />
</div>

<!-- Time Picker with Step (15 minutes) -->
<div class="form-group">
  <label for="time-step" class="form-label">Time (15 minute intervals)</label>
  <input
    type="time"
    id="time-step"
    name="time-step"
    class="form-input time-picker"
    step="900"
    aria-describedby="time-step-help"
  />
  <small id="time-step-help" class="form-help">Time selection in 15 minute intervals</small>
</div>

<style>
  .time-picker {
    width: 100%;
    max-width: 200px;
  }

  .time-picker:focus {
    outline: 2px solid var(--color-brand-primary, #089949);
    outline-offset: 2px;
  }

  .time-picker.error {
    border-color: var(--p-error-color, #ef4444);
  }

  .time-picker:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
</style>
