<!-- 
    Button Component Examples - FlagFit Pro
    Real-world usage examples
-->

<!-- Example 1: Training Action Button -->
<button class="btn btn-primary btn-lg">
  <i data-lucide="play" style="width: 20px; height: 20px"></i>
  Start Training Session
</button>

<!-- Example 2: Form Actions -->
<div
  style="
    display: flex;
    gap: var(--spacing-component-md);
    margin-top: var(--spacing-component-lg);
  "
>
  <button type="submit" class="btn btn-primary btn-md">Save Changes</button>
  <button type="button" class="btn btn-secondary btn-md">Cancel</button>
</div>

<!-- Example 3: Icon-only Button (for toolbars) -->
<button class="btn btn-tertiary btn-sm" aria-label="Settings">
  <i data-lucide="settings" style="width: 18px; height: 18px"></i>
</button>

<!-- Example 4: Navigation Button -->
<button class="btn btn-secondary btn-md">
  <i data-lucide="arrow-left" style="width: 18px; height: 18px"></i>
  Back to Dashboard
</button>

<!-- Example 5: Destructive Action -->
<button class="btn btn-error btn-md">
  <i data-lucide="trash-2" style="width: 18px; height: 18px"></i>
  Delete Account
</button>
