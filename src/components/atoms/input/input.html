<!-- 
    Input Component - FlagFit Pro
    
    Usage: Copy this snippet into your forms
    States: default, focus, error, success, disabled
    Accessibility:
    - Always include <label> with matching id
    - Error messages have role="alert"
    - Font size: 16px (prevents iOS zoom)
-->

<!-- Basic Input -->
<input
  type="text"
  id="input-basic"
  name="input-basic"
  class="form-input"
  placeholder="Enter text..."
/>

<!-- Input with Error -->
<input
  type="text"
  id="input-error"
  name="input-error"
  class="form-input error"
  placeholder="Error state"
  value="Invalid input"
/>

<!-- Input with Success -->
<input
  type="text"
  id="input-success"
  name="input-success"
  class="form-input success"
  placeholder="Success state"
  value="Valid input"
/>

<!-- Disabled Input -->
<input
  type="text"
  id="input-disabled"
  name="input-disabled"
  class="form-input"
  placeholder="Disabled"
  value="Cannot edit"
  disabled
/>

<!-- Input Types -->
<input type="text" class="form-input" placeholder="Text" />
<input type="email" class="form-input" placeholder="Email" />
<input type="password" class="form-input" placeholder="Password" />
<input type="number" class="form-input" placeholder="Number" />
<input type="tel" class="form-input" placeholder="Phone" />
<input type="url" class="form-input" placeholder="URL" />
<input type="search" class="form-input" placeholder="Search" />

<!-- Required Field -->
<input
  type="text"
  id="input-required"
  name="input-required"
  class="form-input"
  placeholder="Required field"
  required
/>
