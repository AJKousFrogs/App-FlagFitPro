<!-- 
    Textarea Component - FlagFit Pro
    
    Usage: Copy this snippet for multi-line text inputs
    States: default, focus, error, success, disabled
    Accessibility:
    - Always include <label> with matching id
    - Error messages have role="alert"
-->

<!-- Basic Textarea -->
<textarea 
    id="textarea-basic" 
    name="textarea-basic"
    class="form-input form-textarea"
    placeholder="Enter text..."
    rows="4"
></textarea>

<!-- Textarea with Label -->
<div class="form-group">
    <label for="textarea-label" class="form-label">Description</label>
    <textarea 
        id="textarea-label" 
        name="description"
        class="form-input form-textarea"
        placeholder="Enter description..."
        rows="4"
    ></textarea>
</div>

<!-- Textarea with Error -->
<div class="form-group">
    <label for="textarea-error" class="form-label required">Comments</label>
    <textarea 
        id="textarea-error" 
        name="comments"
        class="form-input form-textarea error"
        rows="4"
    >Too short</textarea>
    <div class="form-error" role="alert">Please provide at least 10 characters</div>
</div>

<!-- Textarea with Success -->
<div class="form-group">
    <label for="textarea-success" class="form-label">Notes</label>
    <textarea 
        id="textarea-success" 
        name="notes"
        class="form-input form-textarea success"
        rows="4"
    >Valid content here</textarea>
    <small class="form-success">✓ Valid</small>
</div>

<!-- Disabled Textarea -->
<div class="form-group">
    <label for="textarea-disabled" class="form-label">Disabled Field</label>
    <textarea 
        id="textarea-disabled" 
        name="disabled"
        class="form-input form-textarea"
        rows="4"
        disabled
    >Cannot edit</textarea>
</div>

<!-- Resizable Textarea -->
<textarea 
    id="textarea-resize" 
    name="resize"
    class="form-input form-textarea"
    placeholder="This textarea can be resized..."
    rows="4"
    style="resize: vertical;"
></textarea>
