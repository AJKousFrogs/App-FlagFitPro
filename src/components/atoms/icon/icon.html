<!-- 
    Icon Component - FlagFit Pro
    
    Usage: Lucide icons via data-lucide attribute
    Always set explicit width and height
    Icons are initialized automatically via icon-helper.js
-->

<!-- Basic Icon -->
<i data-lucide="home" style="width: 24px; height: 24px"></i>

<!-- Icon with Color -->
<i
  data-lucide="football"
  style="width: 24px; height: 24px; color: var(--color-brand-primary)"
></i>

<!-- Common Icons -->
<i data-lucide="user" style="width: 20px; height: 20px"></i>
<i data-lucide="settings" style="width: 20px; height: 20px"></i>
<i data-lucide="bell" style="width: 20px; height: 20px"></i>
<i data-lucide="search" style="width: 20px; height: 20px"></i>
<i data-lucide="menu" style="width: 20px; height: 20px"></i>
<i data-lucide="x" style="width: 20px; height: 20px"></i>

<!-- Icon Sizes -->
<i data-lucide="home" style="width: 16px; height: 16px"></i>
<!-- Small -->
<i data-lucide="home" style="width: 20px; height: 20px"></i>
<!-- Medium -->
<i data-lucide="home" style="width: 24px; height: 24px"></i>
<!-- Large -->
<i data-lucide="home" style="width: 32px; height: 32px"></i>
<!-- Extra Large -->

<!-- Icon in Button -->
<button class="btn btn-primary btn-md">
  <i data-lucide="play" style="width: 18px; height: 18px"></i>
  Start
</button>

<!-- Icon-only Button -->
<button class="btn btn-tertiary btn-sm" aria-label="Settings">
  <i data-lucide="settings" style="width: 18px; height: 18px"></i>
</button>
