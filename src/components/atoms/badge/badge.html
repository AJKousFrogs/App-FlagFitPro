<!-- 
    Badge Component - FlagFit Pro
    
    Usage: Copy this snippet for status indicators, labels, and tags
    Variants: badge-primary, badge-secondary, badge-success, badge-warning, badge-error
    Sizes: badge-sm, badge-md (default), badge-lg
-->

<!-- Primary Badge -->
<span class="badge badge-primary">Primary</span>

<!-- Status Badges -->
<span class="badge badge-success">Success</span>
<span class="badge badge-warning">Warning</span>
<span class="badge badge-error">Error</span>

<!-- Badge Sizes -->
<span class="badge badge-primary badge-sm">Small</span>
<span class="badge badge-primary badge-md">Medium</span>
<span class="badge badge-primary badge-lg">Large</span>

<!-- Badge with Icon -->
<span class="badge badge-primary">
    <i data-lucide="check" style="width: 14px; height: 14px;"></i>
    Verified
</span>

<!-- Badge Examples -->
<span class="badge badge-success">Active</span>
<span class="badge badge-error">Inactive</span>
<span class="badge badge-warning">Pending</span>
<span class="badge badge-primary">New</span>
