<!--
  Standard HTML <head> Template for FlagFit Pro
  Copy this into the <head> section of new pages
  Customize the title and page-specific styles as needed
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="FlagFit Pro - Professional flag football training and analytics platform"
  />
  <meta name="theme-color" content="#10c96b" />

  <!-- Page Title - Customize for each page -->
  <title>FlagFit Pro - [Page Name]</title>

  <!-- Favicon and App Icons -->
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
  />
  <link
    rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>"
  />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect to External Resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts - Poppins (Primary Brand Font) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Core Styles -->
  <link rel="stylesheet" href="./src/css/main.css" />

  <!-- Page-Specific Styles - Uncomment and customize as needed -->
  <!-- <link rel="stylesheet" href="./src/css/pages/[page-name].css" /> -->

  <!-- Supabase Configuration (Centralized) -->
  <script src="./src/js/config/supabase-config.js"></script>

  <!-- Supabase JS SDK from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.88.0"></script>

  <!-- Lucide Icons (CDN - must be loaded as script tag) -->
  <script
    src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
    crossorigin="anonymous"
    defer
  ></script>

  <!-- Core Scripts -->
  <script src="./src/icon-helper.js" defer></script>
  <script src="./src/theme-switcher.js" defer></script>

  <!-- Common Component Loaders (Optional - for dashboard pages) -->
  <!-- Uncomment for pages that need sidebar, topbar, and footer: -->
  <!-- <script type="module" src="./src/js/components/common-loaders.js" defer></script> -->

  <!-- Page-Specific Scripts - Add as needed -->
  <!-- <script type="module" src="./src/js/[page-script].js"></script> -->
</head>
