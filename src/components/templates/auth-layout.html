<!-- 
    Auth Layout Template - FlagFit Pro
    
    Usage: Copy this structure for login/register pages
    Centered layout with form
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlagFit Pro - Login</title>

    <!-- Design System CSS -->
    <link rel="stylesheet" href="./src/css/main.css" />

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" crossorigin="anonymous" defer>
    <script src="./src/icon-helper.js"></script>
    <script src="./src/theme-switcher.js"></script>
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo/Brand -->
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <i
            data-lucide="football"
            style="width: 48px; height: 48px; color: var(--color-brand-primary)"
          ></i>
        </a>
        <h1 class="auth-title">FlagFit Pro</h1>
        <p class="auth-subtitle">Olympic-Level Flag Football Training</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card card">
        <div class="card-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your account</p>
        </div>
        <div class="card-body">
          <!-- Include: src/components/molecules/form-input/form-input.html -->
          <form class="auth-form">
            <div class="form-group">
              <label for="email" class="form-label">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="athlete@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password" class="form-label required">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
              />
            </div>

            <div
              class="form-group"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <label class="form-checkbox">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>
              <a href="/reset-password" class="form-link">Forgot password?</a>
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-lg"
              style="width: 100%; margin-top: var(--spacing-component-lg)"
            >
              Sign In
            </button>
          </form>
        </div>
        <div class="card-footer">
          <p style="text-align: center; margin: 0">
            Don't have an account?
            <a href="/register" class="form-link">Sign up</a>
          </p>
        </div>
      </div>

      <!-- Footer Links -->
      <div class="auth-footer">
        <a href="/privacy">Privacy Policy</a>
        <span>•</span>
        <a href="/terms">Terms of Service</a>
      </div>
    </div>

    <script>
      // Initialize icons
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }
    </script>
  </body>
</html>

<!-- 
    Layout Structure:
    - .auth-container - Main wrapper (centered)
    - .auth-header - Logo and branding
    - .auth-card - Form card
    - .auth-form - Form container
    - .auth-footer - Footer links
-->
