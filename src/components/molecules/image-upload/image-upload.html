<!-- 
    Image Upload Component - FlagFit Pro
    
    Usage: Copy this snippet for image upload functionality
    Features: Drag & drop, preview, validation
    Accessibility:
    - Use aria-label for upload area
    - Provide clear error messages
-->

<!-- Basic Image Upload -->
<div class="form-group">
  <label class="form-label">Upload Image</label>
  <div class="image-upload-container">
    <div class="image-upload-area" id="image-upload-basic">
      <input
        type="file"
        id="image-input-basic"
        name="image-basic"
        accept="image/*"
        class="image-input-hidden"
        aria-label="Upload image"
      />
      <div class="upload-content">
        <i data-lucide="upload" style="width: 48px; height: 48px"></i>
        <p class="upload-label">Drop image here or click to browse</p>
        <p class="upload-hint">Supported: JPG, PNG, GIF, WebP (Max 5MB)</p>
      </div>
    </div>
    <div class="image-preview" id="preview-basic" style="display: none;">
      <img id="preview-image-basic" src="" alt="Preview" />
      <button type="button" class="remove-image-btn" aria-label="Remove image">
        <i data-lucide="x" style="width: 20px; height: 20px"></i>
      </button>
    </div>
    <div class="upload-error" id="error-basic" role="alert" style="display: none;"></div>
  </div>
</div>

<!-- Image Upload with Multiple -->
<div class="form-group">
  <label class="form-label">Upload Multiple Images</label>
  <div class="image-upload-container">
    <div class="image-upload-area" id="image-upload-multiple">
      <input
        type="file"
        id="image-input-multiple"
        name="image-multiple"
        accept="image/*"
        multiple
        class="image-input-hidden"
        aria-label="Upload images"
      />
      <div class="upload-content">
        <i data-lucide="images" style="width: 48px; height: 48px"></i>
        <p class="upload-label">Drop images here or click to browse</p>
        <p class="upload-hint">You can select multiple images</p>
      </div>
    </div>
    <div class="image-preview-grid" id="preview-multiple"></div>
    <div class="upload-error" id="error-multiple" role="alert" style="display: none;"></div>
  </div>
</div>

<style>
  .image-upload-container {
    width: 100%;
  }

  .image-upload-area {
    border: 2px dashed var(--p-surface-border, #dee2e6);
    border-radius: var(--p-border-radius, 0.5rem);
    padding: 2rem;
    background: var(--p-surface-0, #ffffff);
    cursor: pointer;
    transition: all 0.3s ease;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .image-upload-area:hover {
    border-color: var(--color-brand-primary, #089949);
    background: var(--p-surface-50, #f8faf9);
  }

  .image-upload-area.drag-over {
    border-color: var(--color-brand-primary, #089949);
    background: var(--p-surface-100, #f0f0f0);
  }

  .image-input-hidden {
    display: none;
  }

  .upload-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .upload-content i {
    color: var(--color-brand-primary, #089949);
  }

  .upload-label {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
    margin: 0;
  }

  .upload-hint {
    font-size: 0.875rem;
    color: var(--text-secondary, #6b7280);
    margin: 0;
  }

  .image-preview {
    position: relative;
    display: inline-block;
    margin-top: 1rem;
    border-radius: var(--p-border-radius, 0.5rem);
    overflow: hidden;
    border: 1px solid var(--p-surface-border, #dee2e6);
  }

  .image-preview img {
    display: block;
    max-width: 100%;
    max-height: 400px;
    height: auto;
  }

  .remove-image-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: rgba(239, 68, 68, 0.9);
    border: none;
    color: white;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: 50%;
    width: 2rem;
    height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .remove-image-btn:hover {
    background: rgba(239, 68, 68, 1);
  }

  .image-preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }

  .image-preview-grid .image-preview {
    margin-top: 0;
  }

  .upload-error {
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--p-error-color, #ef4444);
    color: white;
    border-radius: var(--p-border-radius, 0.5rem);
    font-size: 0.875rem;
  }
</style>

<script>
  // Image upload functionality
  document.addEventListener('DOMContentLoaded', function() {
    function setupImageUpload(containerId, inputId, previewId, errorId, multiple = false) {
      const container = document.getElementById(containerId);
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      const error = document.getElementById(errorId);
      const uploadArea = container.querySelector('.image-upload-area');
      
      if (!container || !input || !preview || !error || !uploadArea) return;
      
      const maxSize = 5 * 1024 * 1024; // 5MB
      const acceptedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];
      
      // Click to upload
      uploadArea.addEventListener('click', () => {
        input.click();
      });
      
      // Drag and drop
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.add('drag-over');
      });
      
      uploadArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.remove('drag-over');
      });
      
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.remove('drag-over');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFiles(Array.from(files));
        }
      });
      
      // File input change
      input.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          handleFiles(Array.from(files));
        }
      });
      
      function handleFiles(files) {
        error.style.display = 'none';
        error.textContent = '';
        
        const validFiles = [];
        
        for (const file of files) {
          // Validate file type
          if (!acceptedTypes.includes(file.type)) {
            error.style.display = 'block';
            error.textContent = `File "${file.name}" is not a supported image format`;
            continue;
          }
          
          // Validate file size
          if (file.size > maxSize) {
            error.style.display = 'block';
            error.textContent = `File "${file.name}" exceeds maximum size of 5MB`;
            continue;
          }
          
          validFiles.push(file);
        }
        
        if (validFiles.length > 0) {
          displayPreview(validFiles);
        }
      }
      
      function displayPreview(files) {
        if (multiple) {
          preview.innerHTML = '';
          files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const div = document.createElement('div');
              div.className = 'image-preview';
              div.innerHTML = `
                <img src="${e.target.result}" alt="${file.name}" />
                <button type="button" class="remove-image-btn" aria-label="Remove image">
                  <i data-lucide="x" style="width: 20px; height: 20px"></i>
                </button>
              `;
              preview.appendChild(div);
              
              // Initialize lucide icons
              if (window.lucide) {
                window.lucide.createIcons();
              }
              
              // Remove button
              div.querySelector('.remove-image-btn').addEventListener('click', () => {
                div.remove();
              });
            };
            reader.readAsDataURL(file);
          });
        } else {
          const file = files[0];
          const reader = new FileReader();
          reader.onload = (e) => {
            preview.innerHTML = `
              <img id="preview-image-${inputId}" src="${e.target.result}" alt="${file.name}" />
              <button type="button" class="remove-image-btn" aria-label="Remove image">
                <i data-lucide="x" style="width: 20px; height: 20px"></i>
              </button>
            `;
            preview.style.display = 'block';
            
            // Initialize lucide icons
            if (window.lucide) {
              window.lucide.createIcons();
            }
            
            // Remove button
            preview.querySelector('.remove-image-btn').addEventListener('click', () => {
              preview.style.display = 'none';
              preview.innerHTML = '';
              input.value = '';
            });
          };
          reader.readAsDataURL(file);
        }
      }
    }
    
    // Setup upload areas
    setupImageUpload('image-upload-basic', 'image-input-basic', 'preview-basic', 'error-basic', false);
    setupImageUpload('image-upload-multiple', 'image-input-multiple', 'preview-multiple', 'error-multiple', true);
  });
</script>
