<!-- 
    Form Group Component - FlagFit Pro
    
    Usage: Container for form fields with consistent spacing
    Wraps label, input, and helper/error messages
-->

<!-- Basic Form Group -->
<div class="form-group">
    <label for="field1" class="form-label">Field Label</label>
    <input type="text" id="field1" name="field1" class="form-input" placeholder="Enter value...">
</div>

<!-- Form Group with Helper Text -->
<div class="form-group">
    <label for="field2" class="form-label">Email</label>
    <input type="email" id="field2" name="field2" class="form-input" placeholder="email@example.com">
    <small class="form-hint">We'll never share your email</small>
</div>

<!-- Form Group with Error -->
<div class="form-group">
    <label for="field3" class="form-label required">Password</label>
    <input type="password" id="field3" name="field3" class="form-input error">
    <div class="form-error" role="alert">Password must be at least 8 characters</div>
</div>

<!-- Multiple Form Groups (Form Layout) -->
<form>
    <div class="form-group">
        <label for="first-name" class="form-label">First Name</label>
        <input type="text" id="first-name" name="first-name" class="form-input" required>
    </div>
    
    <div class="form-group">
        <label for="last-name" class="form-label">Last Name</label>
        <input type="text" id="last-name" name="last-name" class="form-input" required>
    </div>
    
    <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-input" required>
    </div>
    
    <div style="display: flex; gap: var(--spacing-component-md); margin-top: var(--spacing-component-lg);">
        <button type="submit" class="btn btn-primary btn-md">Submit</button>
        <button type="button" class="btn btn-secondary btn-md">Cancel</button>
    </div>
</form>
