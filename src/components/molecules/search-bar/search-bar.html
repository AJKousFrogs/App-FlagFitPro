<!-- 
    Search Bar Component - FlagFit Pro
    
    Usage: Copy this snippet for search inputs
    Includes icon and input field
-->

<!-- Basic Search Bar -->
<div class="search-bar">
  <i
    data-lucide="search"
    style="width: 20px; height: 20px; color: var(--color-text-secondary)"
  ></i>
  <input
    type="search"
    class="search-input"
    placeholder="Search athletes, teams..."
  />
</div>

<!-- Search Bar with Clear Button -->
<div class="search-bar" style="position: relative">
  <i
    data-lucide="search"
    style="width: 20px; height: 20px; color: var(--color-text-secondary)"
  ></i>
  <input
    type="search"
    class="search-input"
    placeholder="Search..."
    id="search-input"
  />
  <button
    type="button"
    class="search-clear"
    aria-label="Clear search"
    style="display: none"
  >
    <i data-lucide="x" style="width: 18px; height: 18px"></i>
  </button>
</div>

<!-- Search Bar in Header -->
<div class="search-bar" style="max-width: 400px">
  <i
    data-lucide="search"
    style="width: 20px; height: 20px; color: var(--color-text-secondary)"
  ></i>
  <input type="search" class="search-input" placeholder="Search..." />
</div>
