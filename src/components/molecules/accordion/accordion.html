<!-- 
    Accordion Component - FlagFit Pro
    
    Usage: Copy this snippet for collapsible content sections

<!-- Basic Accordion -->
<div class="accordion" data-accordion="basic-accordion">
  <div class="accordion-item">
    <button
      class="accordion-trigger"
      aria-expanded="true"
      aria-controls="accordion-panel-1"
      id="accordion-trigger-1"
    >
      <span>Section 1</span>
      <i
        data-lucide="chevron-down"
        class="accordion-icon"
        style="width: 20px; height: 20px"
      ></i>
    </button>
    <div
      class="accordion-panel accordion-open"
      role="region"
      aria-labelledby="accordion-trigger-1"
      id="accordion-panel-1"
    >
      <div class="accordion-content">
        <p>
          This is the content for section 1. It can contain any HTML content.
        </p>
      </div>
    </div>
  </div>

  <div class="accordion-item">
    <button
      class="accordion-trigger"
      aria-expanded="false"
      aria-controls="accordion-panel-2"
      id="accordion-trigger-2"
    >
      <span>Section 2</span>
      <i
        data-lucide="chevron-down"
        class="accordion-icon"
        style="width: 20px; height: 20px"
      ></i>
    </button>
    <div
      class="accordion-panel"
      role="region"
      aria-labelledby="accordion-trigger-2"
      id="accordion-panel-2"
    >
      <div class="accordion-content">
        <p>This is the content for section 2.</p>
      </div>
    </div>
  </div>

  <div class="accordion-item">
    <button
      class="accordion-trigger"
      aria-expanded="false"
      aria-controls="accordion-panel-3"
      id="accordion-trigger-3"
    >
      <span>Section 3</span>
      <i
        data-lucide="chevron-down"
        class="accordion-icon"
        style="width: 20px; height: 20px"
      ></i>
    </button>
    <div
      class="accordion-panel"
      role="region"
      aria-labelledby="accordion-trigger-3"
      id="accordion-panel-3"
    >
      <div class="accordion-content">
        <p>This is the content for section 3.</p>
      </div>
    </div>
  </div>
</div>

<!-- FAQ Accordion Example -->
<div class="accordion" data-accordion="faq-accordion">
  <div class="accordion-item">
    <button
      class="accordion-trigger"
      aria-expanded="false"
      aria-controls="faq-1"
      id="faq-trigger-1"
    >
      <span>What is FlagFit Pro?</span>
      <i
        data-lucide="chevron-down"
        class="accordion-icon"
        style="width: 20px; height: 20px"
      ></i>
    </button>
    <div
      class="accordion-panel"
      role="region"
      aria-labelledby="faq-trigger-1"
      id="faq-1"
    >
      <div class="accordion-content">
        <p>
          FlagFit Pro is an Olympic-level flag football training application.
        </p>
      </div>
    </div>
  </div>

  <div class="accordion-item">
    <button
      class="accordion-trigger"
      aria-expanded="false"
      aria-controls="faq-2"
      id="faq-trigger-2"
    >
      <span>How do I get started?</span>
      <i
        data-lucide="chevron-down"
        class="accordion-icon"
        style="width: 20px; height: 20px"
      ></i>
    </button>
    <div
      class="accordion-panel"
      role="region"
      aria-labelledby="faq-trigger-2"

    >

        <p>Create an account and complete your profile to get started.</p>
      </div>
    </div>
  </div>
</div>

<script>
  // Accordion Component JavaScript
  class Accordion {
    constructor(container) {
      this.container = container;
      this.items = container.querySelectorAll(".accordion-item");
      this.triggers = container.querySelectorAll(".accordion-trigger");

      this.init();
    }

    init() {
      this.triggers.forEach((trigger) => {
        trigger.addEventListener("click", () => this.toggle(trigger));
        trigger.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            this.toggle(trigger);
          }
        });
      });
    }

    toggle(trigger) {
      const panel = document.getElementById(
        trigger.getAttribute("aria-controls"),
      );
      const isExpanded = trigger.getAttribute("aria-expanded") === "true";

      // Close all panels if needed (for single-open mode)
      // Or allow multiple open (current implementation)

      // Toggle current panel
      trigger.setAttribute("aria-expanded", !isExpanded);
      panel.classList.toggle("accordion-open");

      // Rotate icon
      const icon = trigger.querySelector(".accordion-icon");
      if (icon) {
        icon.style.transform = isExpanded ? "rotate(0deg)" : "rotate(180deg)";
      }
    }
  }

  // Initialize all accordions
  document.addEventListener("DOMContentLoaded", function () {
    document
      .querySelectorAll(".accordion[data-accordion]")
      .forEach((container) => {
        new Accordion(container);
      });
  });
</script>
