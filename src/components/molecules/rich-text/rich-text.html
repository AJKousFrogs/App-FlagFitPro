<!-- 
    Rich Text Editor Component - FlagFit Pro
    
    Usage: Copy this snippet for rich text editing
    Features: Bold, italic, lists, links, formatting toolbar
    Accessibility:
    - Use aria-label for toolbar buttons
    - Support keyboard shortcuts
-->

<!-- Basic Rich Text Editor -->
<div class="form-group">
  <label class="form-label">Rich Text Editor</label>
  <div class="rich-text-editor" id="rich-text-editor-1">
    <div class="rich-text-toolbar" role="toolbar" aria-label="Text formatting">
      <button type="button" class="toolbar-btn" data-command="bold" aria-label="Bold">
        <i data-lucide="bold" style="width: 18px; height: 18px"></i>
      </button>
      <button type="button" class="toolbar-btn" data-command="italic" aria-label="Italic">
        <i data-lucide="italic" style="width: 18px; height: 18px"></i>
      </button>
      <button type="button" class="toolbar-btn" data-command="underline" aria-label="Underline">
        <i data-lucide="underline" style="width: 18px; height: 18px"></i>
      </button>
      <div class="toolbar-separator"></div>
      <button type="button" class="toolbar-btn" data-command="insertUnorderedList" aria-label="Bullet list">
        <i data-lucide="list" style="width: 18px; height: 18px"></i>
      </button>
      <button type="button" class="toolbar-btn" data-command="insertOrderedList" aria-label="Numbered list">
        <i data-lucide="list-ordered" style="width: 18px; height: 18px"></i>
      </button>
      <div class="toolbar-separator"></div>
      <button type="button" class="toolbar-btn" data-command="createLink" aria-label="Insert link">
        <i data-lucide="link" style="width: 18px; height: 18px"></i>
      </button>
      <button type="button" class="toolbar-btn" data-command="formatBlock" data-value="h2" aria-label="Heading">
        <i data-lucide="heading" style="width: 18px; height: 18px"></i>
      </button>
    </div>
    <div
      class="rich-text-content"
      contenteditable="true"
      id="rich-text-content-1"
      role="textbox"
      aria-multiline="true"
      aria-label="Rich text editor"
      spellcheck="true"
    >
      <p>Start typing your content here...</p>
    </div>
  </div>
</div>

<style>
  .rich-text-editor {
    border: 1px solid var(--p-surface-border, #dee2e6);
    border-radius: var(--p-border-radius, 0.5rem);
    background: var(--p-surface-0, #ffffff);
    overflow: hidden;
  }

  .rich-text-toolbar {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem;
    border-bottom: 1px solid var(--p-surface-border, #dee2e6);
    background: var(--p-surface-50, #f8faf9);
    flex-wrap: wrap;
  }

  .toolbar-btn {
    background: none;
    border: none;
    padding: 0.5rem;
    cursor: pointer;
    border-radius: var(--p-border-radius, 0.5rem);
    color: var(--text-secondary, #6b7280);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toolbar-btn:hover {
    background: var(--p-surface-100, #f0f0f0);
    color: var(--text-primary, #1a1a1a);
  }

  .toolbar-btn.active {
    background: var(--color-brand-primary, #089949);
    color: white;
  }

  .toolbar-separator {
    width: 1px;
    height: 1.5rem;
    background: var(--p-surface-border, #dee2e6);
    margin: 0 0.25rem;
  }

  .rich-text-content {
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    padding: 1rem;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--text-primary, #1a1a1a);
    outline: none;
  }

  .rich-text-content:focus {
    outline: 2px solid var(--color-brand-primary, #089949);
    outline-offset: -2px;
  }

  .rich-text-content p {
    margin: 0 0 0.75rem 0;
  }

  .rich-text-content p:last-child {
    margin-bottom: 0;
  }

  .rich-text-content ul,
  .rich-text-content ol {
    margin: 0.75rem 0;
    padding-left: 2rem;
  }

  .rich-text-content a {
    color: var(--color-brand-primary, #089949);
    text-decoration: underline;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    function initRichTextEditor(editorId) {
      const editor = document.getElementById(editorId);
      if (!editor) return;
      
      const toolbar = editor.querySelector('.rich-text-toolbar');
      const content = editor.querySelector('.rich-text-content');
      
      if (!toolbar || !content) return;
      
      // Toolbar button clicks
      toolbar.addEventListener('click', (e) => {
        const btn = e.target.closest('.toolbar-btn');
        if (!btn) return;
        
        e.preventDefault();
        const command = btn.getAttribute('data-command');
        const value = btn.getAttribute('data-value');
        
        document.execCommand(command, false, value || null);
        content.focus();
        updateToolbarState();
      });
  
      // Update toolbar button states
      function updateToolbarState() {
        toolbar.querySelectorAll('.toolbar-btn').forEach(btn => {
          const command = btn.getAttribute('data-command');
          if (command && document.queryCommandSupported(command)) {
            const isActive = document.queryCommandState(command);
            btn.classList.toggle('active', isActive);
          }
        });
      }
      
      // Update on selection change
      content.addEventListener('mouseup', updateToolbarState);
      content.addEventListener('keyup', updateToolbarState);
      
      // Link creation
      toolbar.querySelector('[data-command="createLink"]')?.addEventListener('click', (e) => {
        e.preventDefault();
        const url = prompt('Enter URL:');
        if (url) {
          document.execCommand('createLink', false, url);
        }
      });
    }
    
    // Initialize editors
    initRichTextEditor('rich-text-editor-1');
    
    // Initialize lucide icons
    if (window.lucide) {
      window.lucide.createIcons();
    }
  });
</script>
