<!-- File Upload Component -->
<div class="file-upload-container">
  <!-- Drop Zone -->
  <div class="upload-dropzone" data-drag-over="false">
    <input
      type="file"
      id="file-input"
      multiple
      accept="*/*"
      class="file-input-hidden"
      aria-label="File upload"
    />

    <div class="upload-content">
      <div class="upload-placeholder">
        <i data-lucide="upload-cloud" style="width: 48px; height: 48px"></i>
        <p class="upload-label">Drop files here or click to browse</p>
        <p class="upload-hint">Supported formats: PDF, DOC, DOCX, CSV, JSON</p>
      </div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="upload-progress" style="display: none">
    <div class="progress-bar">
      <div class="progress-fill" style="width: 0%"></div>
    </div>
    <span class="progress-text">0%</span>
  </div>

  <!-- Error Message -->
  <div class="upload-error" style="display: none"></div>
</div>
