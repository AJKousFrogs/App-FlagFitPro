<!-- 
    Popover Component - FlagFit Pro
    
    Usage: Copy this snippet for popover tooltips
    Features: Position control, trigger options, content customization
    Accessibility:
    - Use aria-describedby to link trigger with popover
    - Support keyboard navigation
-->

<!-- Basic Popover -->
<div class="popover-container">
  <button
    type="button"
    class="btn btn-primary btn-md popover-trigger"
    id="popover-trigger-1"
    aria-describedby="popover-1"
    aria-expanded="false"
  >
    Hover for Popover
  </button>
  <div class="popover" id="popover-1" role="tooltip" aria-hidden="true">
    <div class="popover-content">
      <h4 class="popover-title">Popover Title</h4>
      <p class="popover-text">This is a basic popover with some content.</p>
    </div>
    <div class="popover-arrow"></div>
  </div>
</div>

<!-- Popover with Click Trigger -->
<div class="popover-container">
  <button
    type="button"
    class="btn btn-secondary btn-md popover-trigger-click"
    id="popover-trigger-2"
    aria-describedby="popover-2"
    aria-expanded="false"
  >
    Click for Popover
  </button>
  <div class="popover" id="popover-2" role="tooltip" aria-hidden="true">
    <div class="popover-content">
      <h4 class="popover-title">Click Popover</h4>
      <p class="popover-text">This popover appears on click.</p>
      <button type="button" class="btn btn-sm btn-primary" onclick="closePopover('popover-2')">Close</button>
    </div>
    <div class="popover-arrow"></div>
  </div>
</div>

<!-- Popover Positions -->
<div class="popover-examples">
  <div class="popover-container popover-top">
    <button type="button" class="btn btn-tertiary btn-sm popover-trigger" id="popover-top">
      Top
    </button>
    <div class="popover" id="popover-top-content" role="tooltip">
      <div class="popover-content">Popover on top</div>
      <div class="popover-arrow"></div>
    </div>
  </div>
  
  <div class="popover-container popover-right">
    <button type="button" class="btn btn-tertiary btn-sm popover-trigger" id="popover-right">
      Right
    </button>
    <div class="popover" id="popover-right-content" role="tooltip">
      <div class="popover-content">Popover on right</div>
      <div class="popover-arrow"></div>
    </div>
  </div>
  
  <div class="popover-container popover-bottom">
    <button type="button" class="btn btn-tertiary btn-sm popover-trigger" id="popover-bottom">
      Bottom
    </button>
    <div class="popover" id="popover-bottom-content" role="tooltip">
      <div class="popover-content">Popover on bottom</div>
      <div class="popover-arrow"></div>
    </div>
  </div>
  
  <div class="popover-container popover-left">
    <button type="button" class="btn btn-tertiary btn-sm popover-trigger" id="popover-left">
      Left
    </button>
    <div class="popover" id="popover-left-content" role="tooltip">
      <div class="popover-content">Popover on left</div>
      <div class="popover-arrow"></div>
    </div>
  </div>
</div>

<style>
  .popover-container {
    position: relative;
    display: inline-block;
  }

  .popover {
    position: absolute;
    z-index: 1000;
    display: none;
    min-width: 200px;
    max-width: 300px;
    background: var(--p-surface-0, #ffffff);
    border: 1px solid var(--p-surface-border, #dee2e6);
    border-radius: var(--p-border-radius, 0.5rem);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .popover.show {
    display: block;
    opacity: 1;
    transform: scale(1);
  }

  .popover-content {
    padding: 1rem;
  }

  .popover-title {
    margin: 0 0 0.5rem 0;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
  }

  .popover-text {
    margin: 0;
    font-size: 0.875rem;
    color: var(--text-secondary, #6b7280);
    line-height: 1.5;
  }

  .popover-arrow {
    position: absolute;
    width: 0;
    height: 0;
    border-style: solid;
  }

  /* Top position */
  .popover-top .popover {
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(-0.5rem);
    margin-bottom: 0.5rem;
  }

  .popover-top .popover.show {
    transform: translateX(-50%) translateY(0);
  }

  .popover-top .popover-arrow {
    bottom: -0.5rem;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0.5rem 0.5rem 0;
    border-color: var(--p-surface-border, #dee2e6) transparent transparent transparent;
  }

  .popover-top .popover-arrow::after {
    content: '';
    position: absolute;
    bottom: 1px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0.5rem 0.5rem 0;
    border-color: var(--p-surface-0, #ffffff) transparent transparent transparent;
  }

  /* Right position */
  .popover-right .popover {
    left: 100%;
    top: 50%;
    transform: translateY(-50%) translateX(0.5rem);
    margin-left: 0.5rem;
  }

  .popover-right .popover.show {
    transform: translateY(-50%) translateX(0);
  }

  .popover-right .popover-arrow {
    left: -0.5rem;
    top: 50%;
    transform: translateY(-50%);
    border-width: 0.5rem 0.5rem 0.5rem 0;
    border-color: transparent var(--p-surface-border, #dee2e6) transparent transparent;
  }

  /* Bottom position (default) */
  .popover-bottom .popover,
  .popover-container .popover {
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(0.5rem);
    margin-top: 0.5rem;
  }

  .popover-bottom .popover.show,
  .popover-container .popover.show {
    transform: translateX(-50%) translateY(0);
  }

  .popover-bottom .popover-arrow,
  .popover-container .popover-arrow {
    top: -0.5rem;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 0.5rem 0.5rem 0.5rem;
    border-color: transparent transparent var(--p-surface-border, #dee2e6) transparent;
  }

  /* Left position */
  .popover-left .popover {
    right: 100%;
    top: 50%;
    transform: translateY(-50%) translateX(-0.5rem);
    margin-right: 0.5rem;
  }

  .popover-left .popover.show {
    transform: translateY(-50%) translateX(0);
  }

  .popover-left .popover-arrow {
    right: -0.5rem;
    top: 50%;
    transform: translateY(-50%);
    border-width: 0.5rem 0 0.5rem 0.5rem;
    border-color: transparent transparent transparent var(--p-surface-border, #dee2e6);
  }

  .popover-examples {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-top: 2rem;
    justify-content: center;
  }
</style>

<script>
  // Popover functionality
  document.addEventListener('DOMContentLoaded', function() {
    // Hover triggers
    const hoverTriggers = document.querySelectorAll('.popover-trigger');
    hoverTriggers.forEach(trigger => {
      const popoverId = trigger.getAttribute('aria-describedby');
      const popover = document.getElementById(popoverId);
      
      if (!popover) return;
      
      trigger.addEventListener('mouseenter', () => {
        popover.classList.add('show');
        popover.setAttribute('aria-hidden', 'false');
        trigger.setAttribute('aria-expanded', 'true');
      });
      
      trigger.addEventListener('mouseleave', () => {
        popover.classList.remove('show');
        popover.setAttribute('aria-hidden', 'true');
        trigger.setAttribute('aria-expanded', 'false');
      });
    });
    
    // Click triggers
    const clickTriggers = document.querySelectorAll('.popover-trigger-click');
    clickTriggers.forEach(trigger => {
      const popoverId = trigger.getAttribute('aria-describedby');
      const popover = document.getElementById(popoverId);
      
      if (!popover) return;
      
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = popover.classList.contains('show');
        
        // Close all popovers
        document.querySelectorAll('.popover').forEach(p => p.classList.remove('show'));
        
        if (!isOpen) {
          popover.classList.add('show');
          popover.setAttribute('aria-hidden', 'false');
          trigger.setAttribute('aria-expanded', 'true');
        } else {
          trigger.setAttribute('aria-expanded', 'false');
        }
      });
    });
    
    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.popover-container')) {
        document.querySelectorAll('.popover').forEach(p => {
          p.classList.remove('show');
          p.setAttribute('aria-hidden', 'true');
        });
        document.querySelectorAll('.popover-trigger-click').forEach(t => {
          t.setAttribute('aria-expanded', 'false');
        });
      }
    });
  });
  
  function closePopover(id) {
    const popover = document.getElementById(id);
    if (popover) {
      popover.classList.remove('show');
      popover.setAttribute('aria-hidden', 'true');
      const trigger = document.querySelector(`[aria-describedby="${id}"]`);
      if (trigger) {
        trigger.setAttribute('aria-expanded', 'false');
      }
    }
  }
</script>
