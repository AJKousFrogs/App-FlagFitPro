<!-- 
    Tabs Component - FlagFit Pro
    
    Usage: Copy this snippet for tabbed interfaces
    Requires JavaScript for functionality
    Accessibility: Full keyboard navigation and ARIA support
-->

<!-- Basic Tabs -->
<div class="tabs" data-tabs="basic-tabs">
    <div class="tabs-list" role="tablist" aria-label="Content sections">
        <button class="tabs-trigger tabs-active" role="tab" aria-selected="true" aria-controls="tab-panel-1" id="tab-trigger-1" tabindex="0">
            Overview
        </button>
        <button class="tabs-trigger" role="tab" aria-selected="false" aria-controls="tab-panel-2" id="tab-trigger-2" tabindex="-1">
            Training
        </button>
        <button class="tabs-trigger" role="tab" aria-selected="false" aria-controls="tab-panel-3" id="tab-trigger-3" tabindex="-1">
            Performance
        </button>
        <button class="tabs-trigger" role="tab" aria-selected="false" aria-controls="tab-panel-4" id="tab-trigger-4" tabindex="-1">
            Settings
        </button>
    </div>
    
    <div class="tabs-content">
        <div class="tabs-panel tabs-active" role="tabpanel" aria-labelledby="tab-trigger-1" id="tab-panel-1">
            <h3>Overview Content</h3>
            <p>This is the overview tab content.</p>
        </div>
        <div class="tabs-panel" role="tabpanel" aria-labelledby="tab-trigger-2" id="tab-panel-2">
            <h3>Training Content</h3>
            <p>This is the training tab content.</p>
        </div>
        <div class="tabs-panel" role="tabpanel" aria-labelledby="tab-trigger-3" id="tab-panel-3">
            <h3>Performance Content</h3>
            <p>This is the performance tab content.</p>
        </div>
        <div class="tabs-panel" role="tabpanel" aria-labelledby="tab-trigger-4" id="tab-panel-4">
            <h3>Settings Content</h3>
            <p>This is the settings tab content.</p>
        </div>
    </div>
</div>

<!-- Tabs with Icons -->
<div class="tabs" data-tabs="icon-tabs">
    <div class="tabs-list" role="tablist" aria-label="Navigation tabs">
        <button class="tabs-trigger tabs-active" role="tab" aria-selected="true" aria-controls="icon-panel-1" id="icon-trigger-1">
            <i data-lucide="home" style="width: 18px; height: 18px;"></i>
            <span>Home</span>
        </button>
        <button class="tabs-trigger" role="tab" aria-selected="false" aria-controls="icon-panel-2" id="icon-trigger-2">
            <i data-lucide="user" style="width: 18px; height: 18px;"></i>
            <span>Profile</span>
        </button>
        <button class="tabs-trigger" role="tab" aria-selected="false" aria-controls="icon-panel-3" id="icon-trigger-3">
            <i data-lucide="settings" style="width: 18px; height: 18px;"></i>
            <span>Settings</span>
        </button>
    </div>
    
    <div class="tabs-content">
        <div class="tabs-panel tabs-active" role="tabpanel" aria-labelledby="icon-trigger-1" id="icon-panel-1">
            Home content
        </div>
        <div class="tabs-panel" role="tabpanel" aria-labelledby="icon-trigger-2" id="icon-panel-2">
            Profile content
        </div>
        <div class="tabs-panel" role="tabpanel" aria-labelledby="icon-trigger-3" id="icon-panel-3">
            Settings content
        </div>
    </div>
</div>

<script>
// Tabs Component JavaScript
class Tabs {
    constructor(container) {
        this.container = container;
        this.triggers = container.querySelectorAll('.tabs-trigger');
        this.panels = container.querySelectorAll('.tabs-panel');
        this.activeIndex = 0;
        
        this.init();
    }
    
    init() {
        this.triggers.forEach((trigger, index) => {
            trigger.addEventListener('click', () => this.selectTab(index));
            trigger.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    this.selectTab((index + 1) % this.triggers.length);
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    this.selectTab((index - 1 + this.triggers.length) % this.triggers.length);
                } else if (e.key === 'Home') {
                    e.preventDefault();
                    this.selectTab(0);
                } else if (e.key === 'End') {
                    e.preventDefault();
                    this.selectTab(this.triggers.length - 1);
                }
            });
        });
    }
    
    selectTab(index) {
        // Update triggers
        this.triggers.forEach((trigger, i) => {
            const isActive = i === index;
            trigger.classList.toggle('tabs-active', isActive);
            trigger.setAttribute('aria-selected', isActive);
            trigger.setAttribute('tabindex', isActive ? '0' : '-1');
        });
        
        // Update panels
        this.panels.forEach((panel, i) => {
            panel.classList.toggle('tabs-active', i === index);
        });
        
        this.activeIndex = index;
        
        // Focus the active trigger
        this.triggers[index].focus();
    }
}

// Initialize all tabs
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.tabs[data-tabs]').forEach(container => {
        new Tabs(container);
    });
});
</script>
