<!-- 
    Progress Component - FlagFit Pro
    
    Usage: Copy this snippet for progress indicators
    Variants: Linear, Circular, Steps
    Accessibility:
    - Use aria-valuenow, aria-valuemin, aria-valuemax
    - Include aria-label for screen readers
-->

<!-- Linear Progress Bar -->
<div class="form-group">
  <label class="form-label">Linear Progress</label>
  <div class="progress-container">
    <div class="progress-header">
      <span class="progress-label">Upload Progress</span>
      <span class="progress-value">75%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div
        class="progress-bar"
        role="progressbar"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Upload progress"
      >
        <div class="progress-fill" style="width: 75%"></div>
      </div>
    </div>
  </div>
</div>

<!-- Circular Progress -->
<div class="form-group">
  <label class="form-label">Circular Progress</label>
  <div class="progress-container">
    <div class="circular-progress-wrapper">
      <svg class="circular-progress" viewBox="0 0 100 100">
        <circle
          class="circular-background"
          cx="50"
          cy="50"
          r="45"
          fill="none"
          stroke-width="8"
        ></circle>
        <circle
          class="circular-fill"
          cx="50"
          cy="50"
          r="45"
          fill="none"
          stroke-width="8"
          stroke-dasharray="283"
          stroke-dashoffset="70.75"
        ></circle>
      </svg>
      <div class="circular-value">75%</div>
    </div>
    <div class="progress-label">Completion</div>
  </div>
</div>

<!-- Steps Progress -->
<div class="form-group">
  <label class="form-label">Steps Progress</label>
  <div class="progress-container">
    <div class="steps-progress">
      <div class="step-item completed">
        <div class="step-marker">
          <i data-lucide="check" style="width: 16px; height: 16px"></i>
        </div>
        <div class="step-label">Step 1</div>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <div class="step-marker">
          <i data-lucide="check" style="width: 16px; height: 16px"></i>
        </div>
        <div class="step-label">Step 2</div>
        <div class="step-connector"></div>
      </div>
      <div class="step-item active">
        <div class="step-marker">3</div>
        <div class="step-label">Step 3</div>
        <div class="step-connector"></div>
      </div>
      <div class="step-item">
        <div class="step-marker">4</div>
        <div class="step-label">Step 4</div>
      </div>
    </div>
  </div>
</div>

<!-- Progress with Helper Text -->
<div class="form-group">
  <label class="form-label">Progress with Helper</label>
  <div class="progress-container">
    <div class="progress-header">
      <span class="progress-label">Training Progress</span>
      <span class="progress-value">60%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div
        class="progress-bar"
        role="progressbar"
        aria-valuenow="60"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-fill" style="width: 60%"></div>
      </div>
    </div>
    <div class="progress-helper">6 of 10 sessions completed</div>
  </div>
</div>

<!-- Small Progress -->
<div class="form-group">
  <label class="form-label">Small Progress</label>
  <div class="progress-container progress-sm">
    <div class="progress-bar-wrapper">
      <div
        class="progress-bar"
        role="progressbar"
        aria-valuenow="45"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-fill" style="width: 45%"></div>
      </div>
    </div>
  </div>
</div>

<!-- Large Progress -->
<div class="form-group">
  <label class="form-label">Large Progress</label>
  <div class="progress-container progress-lg">
    <div class="progress-header">
      <span class="progress-label">Overall Progress</span>
      <span class="progress-value">90%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div
        class="progress-bar"
        role="progressbar"
        aria-valuenow="90"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-fill" style="width: 90%"></div>
      </div>
    </div>
  </div>
</div>

<style>
  .progress-container {
    width: 100%;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .progress-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-primary, #1a1a1a);
  }

  .progress-value {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-brand-primary, #089949);
  }

  .progress-bar-wrapper {
    width: 100%;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--p-surface-200, #e5e7eb);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--color-brand-primary, #089949);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .progress-helper {
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--text-secondary, #6b7280);
  }

  /* Circular Progress */
  .circular-progress-wrapper {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 1rem;
  }

  .circular-progress {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .circular-background {
    stroke: var(--p-surface-200, #e5e7eb);
    opacity: 0.3;
  }

  .circular-fill {
    stroke: var(--color-brand-primary, #089949);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s ease;
  }

  .circular-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
  }

  /* Steps Progress */
  .steps-progress {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    position: relative;
  }

  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }

  .step-marker {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--p-surface-200, #e5e7eb);
    color: var(--text-secondary, #6b7280);
    font-weight: 600;
    margin-bottom: 0.5rem;
    transition: all 0.3s ease;
  }

  .step-item.active .step-marker {
    background: var(--color-brand-primary, #089949);
    color: white;
  }

  .step-item.completed .step-marker {
    background: var(--p-success-color, #10c96b);
    color: white;
  }

  .step-label {
    font-size: 0.75rem;
    color: var(--text-secondary, #6b7280);
    text-align: center;
    max-width: 100px;
  }

  .step-item.active .step-label {
    color: var(--text-primary, #1a1a1a);
    font-weight: 500;
  }

  .step-connector {
    position: absolute;
    top: 1.25rem;
    left: calc(50% + 1.25rem);
    right: calc(-50% + 1.25rem);
    height: 2px;
    background: var(--p-surface-200, #e5e7eb);
    z-index: -1;
  }

  .step-item.completed .step-connector {
    background: var(--p-success-color, #10c96b);
  }

  /* Size variants */
  .progress-sm .progress-bar {
    height: 4px;
  }

  .progress-sm .progress-label,
  .progress-sm .progress-value {
    font-size: 0.75rem;
  }

  .progress-lg .progress-bar {
    height: 12px;
  }

  .progress-lg .progress-label,
  .progress-lg .progress-value {
    font-size: 1rem;
  }
</style>

<script>
  // Initialize lucide icons
  document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) {
      window.lucide.createIcons();
    }
  });
</script>
