<!-- 
    Stepper Component - FlagFit Pro
    
    Usage: Copy this snippet for multi-step forms/wizards
    Features: Step navigation, validation, progress tracking
    Accessibility:
    - Use aria-current for active step
    - Include aria-label for step buttons
-->

<!-- Basic Stepper -->
<div class="stepper-container">
  <div class="stepper-header">
    <div class="stepper-steps">
      <div class="stepper-step completed" aria-current="false">
        <div class="step-number">1</div>
        <div class="step-label">Personal Info</div>
      </div>
      <div class="stepper-step active" aria-current="step">
        <div class="step-number">2</div>
        <div class="step-label">Training Goals</div>
      </div>
      <div class="stepper-step">
        <div class="step-number">3</div>
        <div class="step-label">Review</div>
      </div>
    </div>
  </div>

  <div class="stepper-content">
    <div class="step-panel active">
      <h3>Step 2: Training Goals</h3>
      <p>Configure your training goals and preferences.</p>
      <!-- Step content goes here -->
    </div>
  </div>

  <div class="stepper-actions">
    <button type="button" class="btn btn-secondary btn-md">Previous</button>
    <button type="button" class="btn btn-primary btn-md">Next</button>
  </div>
</div>

<!-- Vertical Stepper -->
<div class="stepper-container stepper-vertical">
  <div class="stepper-steps">
    <div class="stepper-step completed">
      <div class="step-marker">
        <i data-lucide="check" style="width: 20px; height: 20px"></i>
      </div>
      <div class="step-content">
        <div class="step-title">Account Setup</div>
        <div class="step-description">Create your account and verify email</div>
      </div>
      <div class="step-connector"></div>
    </div>

    <div class="stepper-step active">
      <div class="step-marker">2</div>
      <div class="step-content">
        <div class="step-title">Profile Information</div>
        <div class="step-description">Tell us about yourself</div>
      </div>
      <div class="step-connector"></div>
    </div>

    <div class="stepper-step">
      <div class="step-marker">3</div>
      <div class="step-content">
        <div class="step-title">Training Preferences</div>
        <div class="step-description">Set your training goals</div>
      </div>
      <div class="step-connector"></div>
    </div>

    <div class="stepper-step">
      <div class="step-marker">4</div>
      <div class="step-content">
        <div class="step-title">Complete</div>
        <div class="step-description">Review and finish</div>
      </div>
    </div>
  </div>
</div>

<!-- Stepper with Clickable Steps -->
<div class="stepper-container">
  <div class="stepper-header">
    <div class="stepper-steps">
      <button
        type="button"
        class="stepper-step completed"
        onclick="goToStep(1)"
        aria-label="Go to step 1"
      >
        <div class="step-number">
          <i data-lucide="check" style="width: 16px; height: 16px"></i>
        </div>
        <div class="step-label">Step 1</div>
      </button>
      <button
        type="button"
        class="stepper-step active"
        onclick="goToStep(2)"
        aria-label="Go to step 2"
      >
        <div class="step-number">2</div>
        <div class="step-label">Step 2</div>
      </button>
      <button
        type="button"
        class="stepper-step"
        onclick="goToStep(3)"
        aria-label="Go to step 3"
      >
        <div class="step-number">3</div>
        <div class="step-label">Step 3</div>
      </button>
    </div>
  </div>
</div>

<style>
  .stepper-container {
    width: 100%;
  }

  .stepper-header {
    margin-bottom: 2rem;
  }

  .stepper-steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  .stepper-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .stepper-step:not(button) {
    cursor: default;
  }

  .step-number {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--p-surface-200, #e5e7eb);
    color: var(--text-secondary, #6b7280);
    font-weight: 600;
    margin-bottom: 0.5rem;
    transition: all 0.3s ease;
  }

  .stepper-step.active .step-number {
    background: var(--color-brand-primary, #089949);
    color: white;
  }

  .stepper-step.completed .step-number {
    background: var(--p-success-color, #10c96b);
    color: white;
  }

  .step-label {
    font-size: 0.875rem;
    color: var(--text-secondary, #6b7280);
    text-align: center;
  }

  .stepper-step.active .step-label {
    color: var(--text-primary, #1a1a1a);
    font-weight: 500;
  }

  .stepper-step::after {
    content: "";
    position: absolute;
    top: 1.25rem;
    left: calc(50% + 1.25rem);
    right: calc(-50% + 1.25rem);
    height: 2px;
    background: var(--p-surface-200, #e5e7eb);
    z-index: -1;
  }

  .stepper-step:last-child::after {
    display: none;
  }

  .stepper-step.completed::after {
    background: var(--p-success-color, #10c96b);
  }

  .stepper-content {
    min-height: 200px;
    padding: 1.5rem 0;
  }

  .step-panel {
    display: none;
  }

  .step-panel.active {
    display: block;
  }

  .stepper-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--p-surface-border, #dee2e6);
  }

  /* Vertical Stepper */
  .stepper-vertical .stepper-steps {
    flex-direction: column;
    align-items: flex-start;
  }

  .stepper-vertical .stepper-step {
    flex-direction: row;
    width: 100%;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .stepper-vertical .stepper-step::after {
    display: none;
  }

  .stepper-vertical .step-marker {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--p-surface-200, #e5e7eb);
    color: var(--text-secondary, #6b7280);
    font-weight: 600;
    margin-right: 1rem;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .stepper-vertical .stepper-step.active .step-marker {
    background: var(--color-brand-primary, #089949);
    color: white;
  }

  .stepper-vertical .stepper-step.completed .step-marker {
    background: var(--p-success-color, #10c96b);
    color: white;
  }

  .stepper-vertical .step-content {
    flex: 1;
  }

  .stepper-vertical .step-title {
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
    margin-bottom: 0.25rem;
  }

  .stepper-vertical .step-description {
    font-size: 0.875rem;
    color: var(--text-secondary, #6b7280);
  }

  .stepper-vertical .step-connector {
    position: absolute;
    left: 1.25rem;
    top: 2.5rem;
    bottom: -1.5rem;
    width: 2px;
    background: var(--p-surface-200, #e5e7eb);
    z-index: -1;
  }

  .stepper-vertical .stepper-step:last-child .step-connector {
    display: none;
  }

  .stepper-vertical .stepper-step.completed .step-connector {
    background: var(--p-success-color, #10c96b);
  }
</style>
